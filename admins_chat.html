<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinnogram STAFF — Чат Администрации</title>
    <style>
        :root {
            --bg-chat-light: #ffffff;    /* Белоснежный фон ChatGPT */
            --bg-bubble-other: #f4f4f7;  /* Темно-белый/светло-серый пузырь чужих сообщений */
            --text-main: #1d1d1f;
            --text-muted: #86868b;
            --border-color: #e5e5ea;
        }

        body {
            margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-chat-light); color: var(--text-main);
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        /* ГЛАВНЫЙ КОНТЕЙНЕР ЧАТА */
        .chat-app-wrapper {
            display: flex; flex-direction: column; height: 100%; width: 100%;
            max-width: 1000px; margin: 0 auto; border-left: 1px solid var(--border-color); border-right: 1px solid var(--border-color);
            background-color: var(--bg-chat-light); box-sizing: border-box;
        }

        /* ШАПКА ЧАТА */
        .chat-header-bar {
            padding: 16px 24px; border-bottom: 1px solid var(--border-color);
            display: flex; align-items: center; justify-content: space-between; background: #fff;
        }
        .chat-title-info { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 16px; }
        .online-status-pulse { width: 8px; height: 8px; background-color: #34c759; border-radius: 50%; display: inline-block; }

        /* ОБЛАСТЬ СООБЩЕНИЙ */
        .chat-messages-timeline {
            flex: 1; padding: 24px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 20px; box-sizing: border-box;
        }

        /* СТРУКТУРА ПУЗЫРЯ СООБЩЕНИЯ */
        .msg-row-layout { display: flex; gap: 12px; max-width: 85%; width: fit-content; align-items: flex-end; }
        .msg-row-layout.my-msg-row { margin-left: auto; flex-direction: row-reverse; }

        /* АВАТАРКА ВОЗЛЕ ПУЗЫРЯ */
        .msg-user-avatar {
            width: 36px; height: 36px; border-radius: 50%; overflow: hidden; cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); flex-shrink: 0; transition: transform 0.2s;
        }
        .msg-user-avatar:hover { transform: scale(1.05); }
        .msg-user-avatar img { width: 100%; height: 100%; object-fit: cover; }

        .msg-content-container { display: flex; flex-direction: column; gap: 4px; }

        /* 🎯 УЛУЧШЕННЫЕ СТИЛИ ПУЗЫРЕЙ ДЛЯ ЗАЩИТЫ ОТ ВЫХОДА ЗА РАМКИ ЭКРАНА */
        .msg-bubble-card {
            padding: 12px 18px; border-radius: 18px; font-size: 15px; line-height: 1.4;
            word-wrap: break-word;       /* Форсирует перенос длинных слов */
            word-break: break-word;      /* Защита для старых браузеров */
            overflow-wrap: break-word;   /* Современный стандарт переносов */
            max-width: 100%;             /* Никогда не станет шире своего контейнера */
            box-sizing: border-box;
        }

        /* 📱 МОБИЛЬНАЯ АДАПТАЦИЯ (ПОЛНЫЙ УКОМПЛЕКТ ДЛЯ СМАРТФОНОВ) */
        @media (max-width: 768px) {
            .chat-app-wrapper { border: none; height: 100vh; width: 100vw; }
            .chat-header-bar { padding: 10px 14px; }
            .chat-messages-timeline { padding: 12px; gap: 12px; }
            
            /* Сужаем максимальную ширину строки сообщения на смартфонах */
            .msg-row-layout { max-width: 90%; gap: 8px; }
            .msg-bubble-card { padding: 9px 14px; font-size: 14px; }
            
            /* Компактная аватарка для экономии места на мобилках */
            .msg-user-avatar { width: 32px; height: 32px; }
            
            .chat-input-footer { padding: 10px 12px 14px 12px; background: #fff; }
            .chat-input-container { padding: 4px 8px 4px 14px; border-radius: 20px; }
            .chat-text-field { font-size: 14px; padding: 6px 0; }
            .chat-send-btn { width: 30px; height: 30px; }
            
            /* Компактная карточка модального окна профиля */
            .profile-modal-card { max-width: 90%; padding: 18px; margin: 0 10px; }
            .modal-role-tag { font-size: 11px; padding: 3px 8px; margin: 3px; }
        }


        /* 🔵 МОИ СООБЩЕНИЯ: СИНИЕ И ПЕРЕЛИВАЮТСЯ */
        .my-msg-row .msg-bubble-card {
            background: linear-gradient(135deg, #007aff 0%, #00c6ff 100%);
            color: #ffffff; border-bottom-right-radius: 4px;
            animation: textGlowFlow 6s ease infinite; background-size: 200% 200%;
        }

        /* ⚪ ЧУЖИЕ СООБЩЕНИЯ: ТЕМНО-БЕЛЫЕ */
        .other-msg-row .msg-bubble-card {
            background-color: var(--bg-bubble-other); color: var(--text-main);
            border-bottom-left-radius: 4px;
        }

        /* 👑 ЗОЛОТИСТАЯ СВЕТЯЩАЯСЯ ОКАНТОВКА СООБЩЕНИЙ ВЛАДЕЛЬЦА СЕРВЕРА */
        .owner-gold-shield {
            border: 2px solid #ffd700 !important;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.4) !important;
            animation: goldGlowFlow 3s linear infinite !important;
        }

        /* НИЖНЯЯ ПАНЕЛЬ ВВОДА СТРОГО КАК У CHAT GPT */
        .chat-input-footer {
            padding: 16px 24px 24px 24px; border-top: 1px solid var(--border-color); background: #fff;
        }
        .chat-input-container {
            display: flex; align-items: center; background-color: #f4f4f7;
            border: 1px solid var(--border-color); border-radius: 24px; padding: 6px 12px 6px 20px;
        }
        .chat-text-field {
            flex: 1; background: none; border: none; outline: none; padding: 8px 0;
            font-size: 15px; color: var(--text-main); font-family: inherit;
        }
        .chat-send-btn {
            background-color: #007aff; color: #fff; border: none; width: 34px; height: 34px;
            border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: 0.2s; flex-shrink: 0;
        }
        .chat-send-btn:hover { background-color: #0063cc; transform: scale(1.05); }

        /* МОДАЛЬНОЕ ОКНО ПРОФИЛЯ С РОЛЯМИ DISCORD */
        .profile-modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); backdrop-filter: blur(4px);
            display: none; align-items: center; justify-content: center; z-index: 100;
        }
        .profile-modal-card {
            background: #fff; border-radius: 20px; width: 100%; max-width: 340px;
            padding: 24px; box-sizing: border-box; box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            text-align: center; border: 1px solid var(--border-color);
        }
        .modal-role-tag {
            display: inline-block; background-color: #f4f4f7; color: #55555c;
            padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: 600; margin: 4px;
        }

        /* АНИМАЦИИ ПЕРЕЛИВОВ ДЛЯ СИНЕГО И ЗОЛОТОГО НЕОНА */
        @keyframes textGlowFlow {
            0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; }
        }
        @keyframes goldGlowFlow {
            0% { border-color: #ffd700; box-shadow: 0 0 10px rgba(255, 215, 0, 0.3); }
            50% { border-color: #ffb700; box-shadow: 0 0 20px rgba(255, 183, 0, 0.6); }
            100% { border-color: #ffd700; box-shadow: 0 0 10px rgba(255, 215, 0, 0.3); }
        }

        /* 🎯 НОВАЯ АНИМАЦИЯ ДЛЯ ГРАДИЕНТНЫХ РОЛЕЙ ДИСКОРДА */
        @keyframes discordRoleGradientFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

    </style>
</head>
<body>

    <!-- ГЛАВНЫЙ АДАПТИВНЫЙ КОНТЕЙНЕР ДЛЯ ВСЕХ УСТРОЙСТВ -->
    <div class="chat-app-wrapper">
        
        <!-- ШАПКА ЧАТА С КНОПКОЙ ПОДКЛЮЧЕНИЯ В ВОЙС -->
        <div class="chat-header-bar">
            <div class="chat-title-info">
                <span class="online-status-pulse"></span>
                <span>STAFF — Чат и Голосовой сбор</span>
            </div>
            
            <!-- КНОПКА КРУГЛОГО СТОЛА/ГОЛОСОВОГО ЧАТА -->
            <button id="voice-connect-trigger-btn" onclick="toggleVoiceAssemblyChannel()" style="background:#34c759; color:#fff; border:none; padding:8px 16px; border-radius:14px; cursor:pointer; font-size:13px; font-weight:700; display:flex; align-items:center; gap:8px; transition:0.2s; box-shadow: 0 4px 10px rgba(52, 199, 89, 0.2);">
                <svg width="14" height="14" fill="currentColor" viewBox="0 0 16 16"><path d="M3.5 6.5A.5.5 0 0 1 4 7v1a4 4 0 0 0 8 0V7a.5.5 0 0 1 1 0v1a5 5 0 0 1-4.5 4.975V15h3a.5.5 0 0 1 0 1h-7a.5.5 0 0 1 0-1h3v-2.025A5 5 0 0 1 3 8V7a.5.5 0 0 1 .5-.5z"/><path d="M5 3a3 3 0 0 1 6 0v5a3 3 0 0 1-6 0V3z"/></svg>
                Войти в голосовой сбор
            </button>

            <button onclick="location.href='/forum'" style="background:none; border:1px solid var(--border-color); padding:8px 14px; border-radius:14px; cursor:pointer; font-size:13px; font-weight:600; color:var(--text-muted); transition:0.2s;">Назад</button>
        </div>

        <!-- 🎙️ ДИНАМИЧЕСКАЯ ПАНЕЛЬ ОТОБРАЖЕНИЯ УЧАСТНИКОВ В ГОЛОСОВОМ ЧАТЕ -->
        <div id="voice-assembly-users-panel" style="display: none; background: #fafafa; border-bottom: 1px solid var(--border-color); padding: 16px 24px; box-sizing: border-box; flex-direction: column; gap: 12px; transition: 0.3s;">
            <div style="display: flex; align-items: center; justify-content: space-between;">
                <span style="font-size: 12px; font-weight: 700; color: #34c759; text-transform: uppercase; letter-spacing: 0.5px; display: flex; align-items: center; gap: 6px;">
                    <span class="online-status-pulse" style="animation: pulse 1.5s infinite;"></span> На связи в голосовом собрании:
                </span>
                
                <!-- ЦЕНТРАЛЬНАЯ КРАСНАЯ КНОПКА ВЫХОДА -->
                <button onclick="leaveVoiceAssemblyChannel()" style="background:#ff3b30; color:#fff; border:none; padding:6px 14px; border-radius:10px; font-weight:700; font-size:12px; cursor:pointer; display:flex; align-items:center; gap:6px; box-shadow:0 4px 10px rgba(255, 59, 48, 0.25);">
                    🛑 Покинуть сбор
                </button>
            </div>
            
            <!-- Контейнер для аватарок подключенных админов -->
            <div id="voice-users-avatar-grid" style="display: flex; flex-wrap: wrap; gap: 12px; padding-top: 6px;">
                <!-- Аватарки генерируются через JS -->
            </div>
        </div>

        <!-- ТЕХНИЧЕСКИЙ КОНТЕЙНЕР ДЛЯ АУДИО-ПОТОКОВ (СКРЫТЫЙ) -->
        <div id="remote-audio-streams-container" style="display:none;"></div>


        <!-- ЛЕНТА СООБЩЕНИЙ ЧАТА (ОБНОВЛЯЕТСЯ ЧЕРЕЗ WEBSOCKET) -->
        <div class="chat-messages-timeline" id="chat-flow-container">
            <div style="text-align: center; color: var(--text-muted); font-size: 13px; padding: 40px 0;">
                🔒 Безопасное сквозное соединение установлено. Сообщения видны только верифицированной администрации.
            </div>
        </div>

        <!-- НИЖНЯЯ СТРОКА ВВОДА В СТИЛЕ CHAT GPT -->
        <div class="chat-input-footer">
            <div class="chat-input-container">
                <input type="text" id="admin-message-input" class="chat-text-field" placeholder="Сообщение администрации..." onkeydown="if(event.key === 'Enter') sendAdminWSMessage()">
                <button class="chat-send-btn" onclick="sendAdminWSMessage()">
                    <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M15.854.146a.5.5 0 0 1 .11.54l-5.819 14.547a.75.75 0 0 1-1.329.124l-3.178-4.995L.643 7.184a.75.75 0 0 1 .124-1.33L15.314.037a.5.5 0 0 1 .54.11ZM6.636 10.07l2.761 4.338L14.13 2.576zm6.787-8.201L1.591 6.602l4.339 2.76z"/></svg>
                </button>
            </div>
        </div>

    </div>

    <!-- МОДАЛЬНОЕ ОКНО ПРОФИЛЯ С РОЛЯМИ DISCORD -->
    <div class="profile-modal-overlay" id="user-profile-modal" onclick="closeAdminProfileModal()">
        <!-- Клик внутри карточки не должен закрывать окно -->
        <div class="profile-modal-card" onclick="event.stopPropagation()">
            <div style="width: 80px; height: 80px; border-radius: 50%; overflow: hidden; margin: 0 auto 12px auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
                <img id="modal-user-avatar" src="" style="width:100%; height:100%; object-fit:cover;">
            </div>
            <h3 id="modal-user-name" style="margin: 0 0 4px 0; font-size: 18px; font-weight: 700; color: var(--text-main);">Никнейм</h3>
            <p style="margin: 0 0 16px 0; font-size: 12px; color: var(--text-muted); font-weight: 500;">Участник команды STAFF</p>
            
            <div style="border-top: 1px solid var(--border-color); padding-top: 14px; text-align: left;">
                <div style="font-size: 11px; color: var(--text-muted); text-transform: uppercase; font-weight: 700; letter-spacing: 0.5px; margin-bottom: 8px;">Роли на сервере</div>
                <div id="modal-roles-container">
                    <!-- Сюда JS вставит теги ролей -->
                </div>
            </div>
            
            <button onclick="closeAdminProfileModal()" style="margin-top: 20px; width: 100%; background-color: var(--bg-bubble-other); border: none; padding: 10px; border-radius: 10px; font-weight: 600; color: var(--text-main); cursor: pointer; transition: 0.2s;">Закрыть профиль</button>
        </div>
    </div>
    <!-- ⚙️ ИНТЕЛЛЕКТУАЛЬНЫЙ СЦЕНАРИЙ УПРАВЛЕНИЯ АДМИН-ЧАТОМ И РОЛЯМИ -->
    <script>
        const API_URL = window.location.origin;
        // Автоматически переключаем протокол сокета: ws:// для локального ПК и wss:// для безопасного Render
        const WS_PROTOCOL = window.location.protocol === "https:" ? "wss:" : "ws:";
        const WS_URL = `${WS_PROTOCOL}//${window.location.host}/ws/admins_chat`;

        let socket = null;
        // Достаем ник текущего пользователя из кук браузера, чтобы разделять свои/чужие сообщения
        const currentUserNameFromCookie = getCookieValueByName("forum_user_name") || "Анонимный Админ";

        // 1. ПОДКЛЮЧЕНИЕ К WEBSOCKET ШЛЮЗУ НА RENDER
        function connectAdminWebSocket() {
            socket = new WebSocket(WS_URL);

            socket.onopen = () => {
                console.log("📡 Успешное WebSocket-соединение с комнатой админов установлено.");
            };

            socket.onmessage = (event) => {
                try {
                    const payload = JSON.parse(event.data);
                    
                    // 🎯 ИСПРАВЛЕНО: Перехватываем сигналы голосового чата. 
                    // Если это технический пакет WebRTC — завершаем обработку, чтобы он не летел в текстовую ленту!
                    if (handleIncomingVoiceSignals(payload) === true) return;

                    // Обычный рендеринг текстовых пузырей сообщений
                    appendNewAdminMessageBubble(payload);
                } catch (e) {
                    console.error("Ошибка парсинга входящего сообщения:", e);
                }
            };

            socket.onclose = () => {
                console.warn("⚠️ Соединение потеряно. Попытка реконнекта через 3 секунды...");
                setTimeout(connectAdminWebSocket, 3000);
            };
        }

        // 2. ДИНАМИЧЕСКАЯ ОТРИСОВКА ПУЗЫРЕЙ СООБЩЕНИЙ С УЧЕТОМ РОЛЕЙ
        function appendNewAdminMessageBubble(msg) {
            const container = document.getElementById("chat-flow-container");
            if (!container) return;

            const isItMe = (msg.sender.toLowerCase().strip === currentUserNameFromCookie.toLowerCase().strip);
            
            const row = document.createElement("div");
            row.className = `msg-row-layout ${isItMe ? 'my-msg-row' : 'other-msg-row'}`;

            // Сериализуем массив ролей и данные для модального окна в JSON-строку
            const safeRolesJson = encodeURIComponent(JSON.stringify(msg.roles || []));

            // Проверяем, является ли автор сообщения Создателем
            const isOwnerClass = msg.is_owner ? 'owner-gold-shield' : '';

            row.innerHTML = `
                <!-- Аватарка. Клик по ней открывает модалку профиля и передает роли -->
                <div class="msg-user-avatar" onclick="openAdminProfileModal('${msg.sender}', '${msg.avatar}', '${safeRolesJson}')">
                    <img src="${msg.avatar}" onerror="this.src='https://ibb.co'">
                </div>
                <div class="msg-content-container">
                    <!-- Ник автора выводим только для чужих сообщений, как в ChatGPT -->
                    ${!isItMe ? `<span style="font-size:11px; font-weight:600; color:var(--text-muted); margin-left: 6px;">${msg.sender}</span>` : ''}
                    
                    <div class="msg-bubble-card ${isOwnerClass}">
                        ${msg.text}
                        <div style="font-size: 9px; text-align: right; opacity: 0.6; margin-top: 4px; font-weight: 500;">
                            ${msg.time}
                        </div>
                    </div>
                </div>
            `;

            container.appendChild(row);
            // Плавный авто-скролл вниз при получении новых сообщений
            container.scrollTop = container.scrollHeight;
        }

        // 3. ОТПРАВКА СООБЩЕНИЯ В СОКЕТ
        function sendAdminWSMessage() {
            const input = document.getElementById("admin-message-input");
            if (!input) return;
            const text = input.value.trim();
            
            if (text && socket && socket.readyState === WebSocket.OPEN) {
                socket.send(text);
                input.value = ""; // Очищаем поле ввода
            }
        }

        // 🎯 ИСПРАВЛЕНО: Полная поддержка живых переливающихся градиентов ролей!
        function openAdminProfileModal(name, avatarUrl, encodedRoles) {
            const modal = document.getElementById("user-profile-modal");
            const modalName = document.getElementById("modal-user-name");
            const modalAvatar = document.getElementById("modal-user-avatar");
            const rolesContainer = document.getElementById("modal-roles-container");

            if (!modal || !modalName || !modalAvatar || !rolesContainer) return;

            modalName.textContent = name;
            modalAvatar.src = avatarUrl;
            rolesContainer.innerHTML = "";

            try {
                const rolesArray = JSON.parse(decodeURIComponent(encodedRoles));
                if (rolesArray.length === 0) {
                    rolesContainer.innerHTML = `<span style="font-size:12px; color:var(--text-muted);">Нет назначенных ролей</span>`;
                } else {
                    rolesArray.forEach(roleObj => {
                        const tag = document.createElement("span");
                        tag.className = "modal-role-tag";

                        const roleName = roleObj.name || roleObj;
                        
                        // Проверяем, является ли роль градиентной/голографической
                        if (roleObj.is_gradient === true || roleObj.is_gradient === "true") {
                            const p = roleObj.primary || "#fff";
                            const s = roleObj.secondary || "#007aff";
                            const t = roleObj.tertiary; // Если есть третий цвет (голография)
                            
                            // Собираем градиентную строку
                            const gradientString = t 
                                ? `linear-gradient(90deg, ${p}, ${s}, ${t}, ${p})`
                                : `linear-gradient(90deg, ${p}, ${s}, ${p})`;

                            // 🎨 МАГИЯ ГРАДИЕНТА: Белая неоновая матовая заливка, текст переливается градиентом
                            tag.style.cssText = `
                                background: ${gradientString} !important;
                                -webkit-background-clip: text !important;
                                -webkit-text-fill-color: transparent !important;
                                border: 1px solid ${p} !important;
                                background-size: 200% auto !important;
                                animation: discordRoleGradientFlow 4s linear infinite !important;
                                font-weight: 700 !important;
                                box-shadow: 0 0 8px rgba(255,255,255,0.05) !important;
                            `;
                        } else {
                            // ОБЫЧНАЯ ОДНОЦВЕТНАЯ РОЛЬ: Красим матовым стилем, как раньше
                            const roleColor = roleObj.primary || roleObj.color || "#828282";
                            tag.style.cssText = `
                                color: ${roleColor} !important;
                                border: 1px solid ${roleColor} !important;
                                background-color: ${roleColor}14 !important;
                            `;
                        }

                        tag.textContent = roleName;
                        rolesContainer.appendChild(tag);
                    });
                }
            } catch (e) {
                rolesContainer.innerHTML = `<span style="font-size:12px; color:var(--text-muted);">Ошибка декодирования ролей</span>`;
            }

            modal.style.display = "flex";
        }


        function closeAdminProfileModal() {
            const modal = document.getElementById("user-profile-modal");
            if (modal) modal.style.display = "none";
        }

        // ХЕЛПЕР: Быстрое чтение кук браузера по ключу
        function getCookieValueByName(name) {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${name}=`);
            if (parts.length === 2) return parts.pop().split(';').shift();
            return null;
        }

        // Расширение прототипа строк для безопасного удаления пробелов (полифилл тримминга строк)
        Object.defineProperty(String.prototype, 'strip', {
            get: function() { return this.trim(); }
        });

        // 🎯 ИСПРАВЛЕНО: При загрузке страницы сначала скачиваем историю из SQLite, а потом включаем сокет!
        async function initAdminChatSystem() {
            // 1. Скачиваем последние сохраненные сообщения
            try {
                const res = await fetch(`${API_URL}/api/forum/admins_chat/history`);
                const data = await res.json();
                if (data.status === "ok" && data.messages) {
                    const container = document.getElementById("chat-flow-container");
                    if (container && data.messages.length > 0) {
                        container.innerHTML = ""; // Очищаем заглушку загрузки
                        data.messages.forEach(msg => appendNewAdminMessageBubble(msg));
                    }
                }
            } catch (e) {
                console.error("Не удалось подгрузить историю чата из SQLite:", e);
            }

            // 2. Включаем WebSocket для живого общения
            connectAdminWebSocket();
        }

        // Переназначаем автозапуск страницы
        window.onload = initAdminChatSystem;
                // ==========================================================
        // 🎙️ КИБЕРПАНК МОДУЛЬ ГОЛОСОВОЙ СВЯЗИ WebRTC
        // ==========================================================
        let localAudioStream = null;
        let peerConnections = {}; // Карта соединений с другими админами
        let voiceActiveUsers = {}; // Список участников в голосовом канале
        let isInVoiceRoom = false;

        // Конфигурация бесплатных публичных серверов Google для обхода брандмауэров
        const rtcIceConfig = { iceServers: [{ urls: "stun:stun.l.google.com:19302" }] };

        // 1. ПОДКЛЮЧЕНИЕ / ВХОД В ГОЛОСОВОЙ КАНАЛ (ИСПРАВЛЕН ФИКС АВАТАРКИ)
        async function toggleVoiceAssemblyChannel() {
            if (isInVoiceRoom) return;
            
            try {
                // Запрашиваем у браузера официальный доступ к микрофону админа
                localAudioStream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
                isInVoiceRoom = true;

                // Переключаем интерфейс панели звонка
                document.getElementById("voice-assembly-users-panel").style.display = "flex";
                document.getElementById("voice-connect-trigger-btn").style.background = "#86868b";
                document.getElementById("voice-connect-trigger-btn").innerHTML = "🟢 Вы внутри сбора";

                // Оповещаем всю комнату сокетов, что мы вошли в голосовой чат
                sendVoiceSystemSignal({ voice_type: "join" });

                // 🎯 СУПЕР-ФИКС: Берем аватарку напрямую из куки авторизации форума!
                // Если кука пуста — сработает надежная стандартная заглушка
                const myLiveAvatarFromCookie = getCookieValueByName("forum_user_avatar") || "https://i.ibb.co/4pSbxsh/user-avatar.png";

                // Добавляем себя на витрину голосовых аватарок без багов и прочерков
                addVoiceUserToInterface(currentUserNameFromCookie, myLiveAvatarFromCookie);

            } catch (err) {
                alert("🛑 Ошибка доступа к микрофону! Пожалуйста, разрешите браузеру доступ к записи аудио.");
                console.error(err);
            }
        }


        // 2. ВЫХОД ИЗ ГОЛОСОВОГО КАНАЛА (КРАСНАЯ КНОПКА)
        function leaveVoiceAssemblyChannel() {
            if (!isInVoiceRoom) return;

            // Выключаем запись микрофона
            if (localAudioStream) {
                localAudioStream.getTracks().forEach(track => track.stop());
                localAudioStream = null;
            }

            // Закрываем все сессии связи с другими модераторами
            Object.keys(peerConnections).forEach(user => {
                if (peerConnections[user]) {
                    peerConnections[user].close();
                    delete peerConnections[user];
                }
            });

            // Оповещаем сокеты о выходе
            sendVoiceSystemSignal({ voice_type: "leave" });

            // Сбрасываем интерфейс панели
            isInVoiceRoom = false;
            document.getElementById("voice-assembly-users-panel").style.display = "none";
            document.getElementById("voice-connect-trigger-btn").style.background = "#34c759";
            document.getElementById("voice-connect-trigger-btn").innerHTML = `<svg width="14" height="14" fill="currentColor" viewBox="0 0 16 16" style="margin-right:4px;"><path d="M3.5 6.5A.5.5 0 0 1 4 7v1a4 4 0 0 0 8 0V7a.5.5 0 0 1 1 0v1a5 5 0 0 1-4.5 4.975V15h3a.5.5 0 0 1 0 1h-7a.5.5 0 0 1 0-1h3v-2.025A5 5 0 0 1 3 8V7a.5.5 0 0 1 .5-.5z"/><path d="M5 3a3 3 0 0 1 6 0v5a3 3 0 0 1-6 0V3z"/></svg> Войти в голосовой сбор`;
            document.getElementById("voice-users-avatar-grid").innerHTML = "";
            document.getElementById("remote-audio-streams-container").innerHTML = "";
            voiceActiveUsers = {};
        }

        // 3. ОТПРАВКА СИГНАЛОВ ГОЛОСА ЧЕРЕЗ WEBSOCKET
        function sendVoiceSystemSignal(payload) {
            if (socket && socket.readyState === WebSocket.OPEN) {
                socket.send(json_stringify_safe(payload));
            }
        }

        // Хелпер безопасного перевода в JSON
        function json_stringify_safe(obj) { return JSON.stringify(obj); }

        // 4. ОБРАБОТКА СИГНАЛОВ СВЯЗИ ОТ ДРУГИХ УЧАСТНИКОВ (Интегрировать внутрь socket.onmessage)
        // Мы расширим главный обработчик сокетов, добавив этот перехватчик:
        function handleIncomingVoiceSignals(data) {
            if (!data.voice_type) return false; // Если это не голосовой сигнал, пропускаем

            const user = data.sender;
            const av = data.avatar;

            // Сценарий А: Кто-то зашёл в войс чат
            if (data.voice_type === "join") {
                addVoiceUserToInterface(user, av);
                if (isInVoiceRoom) {
                    // Инициализируем WebRTC Peer Connection для звонка новичку
                    initiateWebRTCPeerCall(user, true);
                }
            }
            // Сценарий Б: Кто-то покинул войс чат
            else if (data.voice_type === "leave") {
                removeVoiceUserFromInterface(user);
                if (peerConnections[user]) {
                    peerConnections[user].close();
                    delete peerConnections[user];
                }
                const audioEl = document.getElementById(`audio-stream-${user}`);
                if (audioEl) audioEl.remove();
            }
            // Сценарии В: Технический обмен SDP-офферами и ICE-кандидатами для склейки звука
            else if (data.voice_type === "offer" && isInVoiceRoom) {
                initiateWebRTCPeerCall(user, false, data.sdp);
            }
            else if (data.voice_type === "answer" && isInVoiceRoom && peerConnections[user]) {
                peerConnections[user].setRemoteDescription(new RTCSessionDescription(data.sdp));
            }
            else if (data.voice_type === "candidate" && isInVoiceRoom && peerConnections[user]) {
                peerConnections[user].addIceCandidate(new RTCIceCandidate(data.candidate));
            }

            return true; // Голосовой пакет успешно обработан
        }

        // 5. ИНИЦИАЛИЗАЦИЯ И ПОДКЛЮЧЕНИЕ ЗВУКОВОГО ПОТОКА WebRTC ЧЕРЕЗ GOOGLE STUN
        async function initiateWebRTCPeerCall(targetUser, isCaller, remoteSdp = null) {
            if (peerConnections[targetUser]) return;

            const pc = new RTCPeerConnection(rtcIceConfig);
            peerConnections[targetUser] = pc;

            // Добавляем наш микрофон в это соединение
            if (localAudioStream) {
                localAudioStream.getTracks().forEach(track => pc.addTrack(track, localAudioStream));
            }

            // 🎙️ ИСПРАВЛЕНО: Принудительное включение звука в обход защитных блокировок браузера
            pc.ontrack = (event) => {
                let audioEl = document.getElementById(`audio-stream-${targetUser}`);
                if (!audioEl) {
                    audioEl = document.createElement("audio");
                    audioEl.id = `audio-stream-${targetUser}`;
                    // Включаем обязательные атрибуты для авто-воспроизведения
                    audioEl.autoplay = true;
                    audioEl.controls = false;
                    audioEl.setAttribute("playsinline", "true"); 
                    document.getElementById("remote-audio-streams-container").appendChild(audioEl);
                }
                
                // Передаем живой поток микрофона в элемент
                audioEl.srcObject = event.streams[0];
                
                // ФИКС ПОЛИТИКИ БРАУЗЕРА: Принудительно запускаем воспроизведение потока софта
                audioEl.play().catch(error => {
                    console.log("📢 Браузер заблокировал звук до клика. Добавляем живую разблокировку по нажатию на экран...");
                    // Если браузер заблокировал звук — включаем его сразу, как только админ кликнет в любом месте чата!
                    document.body.addEventListener('click', () => {
                        audioEl.play();
                    }, { once: true });
                });
            };


            // Пересылаем сетевых кандидатов через сокет
            pc.onicecandidate = (event) => {
                if (event.candidate) {
                    sendVoiceSystemSignal({ voice_type: "candidate", candidate: event.candidate, sender: currentUserNameFromCookie });
                }
            };

            if (isCaller) {
                // Создаем приглашение к звонку (Offer)
                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);
                sendVoiceSystemSignal({ voice_type: "offer", sdp: offer, sender: currentUserNameFromCookie });
            } else {
                // Отвечаем на приглашение (Answer)
                await pc.setRemoteDescription(new RTCSessionDescription(remoteSdp));
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);
                sendVoiceSystemSignal({ voice_type: "answer", sdp: answer, sender: currentUserNameFromCookie });
            }
        }

        // 6. УПРАВЛЕНИЕ АВАТАРКАМИ УЧАСТНИКОВ В ИНТЕРФЕЙСЕ
        function addVoiceUserToInterface(user, avatarUrl) {
            if (voiceActiveUsers[user]) return;
            voiceActiveUsers[user] = true;

            const grid = document.getElementById("voice-users-avatar-grid");
            if (!grid) return;

            const box = document.createElement("div");
            box.id = `voice-user-box-${user}`;
            box.style.cssText = "display: flex; flex-direction: column; align-items: center; gap: 4px; width: 60px; position:relative;";
            box.innerHTML = `
                <div style="width: 44px; height: 44px; border-radius: 50%; overflow: hidden; border: 2px solid #34c759; box-shadow: 0 2px 8px rgba(52, 199, 89, 0.3); background:#fff;">
                    <img src="${avatarUrl}" onerror="this.src='https://i.ibb.co/4pSbxsh/user-avatar.png'" style="width:100%; height:100%; object-fit:cover;">\

                </div>
                <span style="font-size: 10px; font-weight: 600; color: var(--text-main); text-align: center; max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${user}</span>
            `;
            grid.appendChild(box);
        }

        function removeVoiceUserFromInterface(user) {
            if (!voiceActiveUsers[user]) return;
            delete voiceActiveUsers[user];
            const box = document.getElementById(`voice-user-box-${user}`);
            if (box) box.remove();
        }

    </script>
</body>
