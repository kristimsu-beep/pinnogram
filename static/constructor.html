<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Конструктор страниц</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #1e1e24; color: #fff; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: #2a2a35; padding: 30px; border-radius: 12px; }
        h2 { color: #ff5722; margin: 0; }
        button, input { padding: 12px; margin: 10px 0; border-radius: 6px; border: none; font-size: 16px; box-sizing: border-box; }
        button { background: #ff5722; color: #fff; font-weight: bold; cursor: pointer; }
        input { background: #3b3b4f; color: #fff; width: 100%; }
        .tilda-block { background: #333344; padding: 20px; margin: 15px 0; border-radius: 8px; border-left: 5px solid #ff5722; position: relative; }
        .block-controls { text-align: right; }
        .btn-delete { background: #dc3545; padding: 5px 10px; font-size: 12px; width: auto; margin: 0; }
        .roblox-avatar-circle { width: 120px; height: 120px; border-radius: 50%; border: 4px solid #ff5722; display: block; margin: 0 auto; background: #222; }
        .block-img { max-width: 100%; max-height: 350px; border-radius: 8px; display: block; margin: 10px auto; }
        .editable-area { background: rgba(0,0,0,0.3); padding: 12px; border-radius: 4px; outline: none; border: 1px dashed #666; font-size: 18px; }
        .view-mode-text { font-size: 18px; line-height: 1.6; white-space: pre-wrap; }
        .hidden { display: none; }
        /* Стиль для полноразмерного скина Roblox */
        .roblox-skin-full {
            max-height: 400px;
            display: block;
            margin: 15px auto;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.5)); /* Красивая тень под персонажем */
        }
        
    </style>
</head>
<body>
    <div class="container">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
            <h2 id="page-title">📰 Страница: </h2>
            <div style="display:flex; gap:10px;">
                <!-- 🔥 ДОБАВЛЕНО: Кнопка быстрой очистки для создателя -->
                <button id="clear-canvas-btn" onclick="if(confirm('Очистить все блоки?')) { blockList = []; renderCanvas(); }" style="background: #dc3545; width: auto; margin:0; padding: 8px 12px; font-size:14px; display:none;">🗑️ Очистить</button>
                <button id="back-btn" style="background: #555; width: auto; margin:0; padding: 8px 12px; font-size:14px;">⬅️ Назад в проект</button>
            </div>
        </div>

        <!-- Холст, куда JS будет пушить текст, картинки, головы и наши новые 3D-скины -->
        <div id="tilda-canvas"></div>

        <!-- Панель инструментов конструктора -->
        <div id="editor-tools" class="hidden" style="background:#222; padding:20px; border-radius:8px; margin-top:30px; text-align:center;">
            <h3>🛠️ Панель блоков конструктора:</h3>
            <div style="display:flex; gap:10px;">
                <button onclick="addBlock('text')" style="background:#4caf50; flex:1; margin:0;">📝 Текст</button>
                <button onclick="addBlock('image')" style="background:#2196f3; flex:1; margin:0;">🖼️ Картинка</button>
                <button onclick="addBlock('roblox')" style="background:#9c27b0; flex:1; margin:0;">🤖 Голова</button>
                <button onclick="addBlock('roblox_skin')" style="background:#e91e63; flex:1; margin:0;">🧍 Скин в рост</button>
            </div>
            <button onclick="saveAndPublish()" style="background:#ff5722; margin-top:20px; width: 100%; font-size: 18px; margin-bottom:0;">🔥 ОПУБЛИКОВАТЬ ИЗМЕНЕНИЯ</button>
        </div>
    </div>

        const projName = segments[1];
        const pageName = segments[2];

        document.getElementById('page-title').innerText = `📰 Страница: ${pageName}`;

    <script>
        const segments = window.location.pathname.split('/').filter(Boolean);
        // Защита: если роут кривой, берем последние элементы
        const projName = segments[segments.length - 2] || segments[1];
        const pageName = segments[segments.length - 1] || segments[2];

        document.getElementById('page-title').innerText = `📰 Страница: ${pageName}`;
        document.getElementById('back-btn').onclick = () => window.location.href = `/news/${projName}`;

        let blockList = [];
        let isOwner = false;

        async function loadPageData() {
            try {
                let res = await fetch(`/api/news/page-info/${projName}/${pageName}`);
                if (!res.ok) { alert("Ошибка загрузки страницы!"); return; }
                let data = await res.json();
                isOwner = data.is_owner;
                blockList = data.blocks;

                if (isOwner) document.getElementById('editor-tools').classList.remove('hidden');
                renderCanvas();
            } catch (e) {
                alert("Ошибка связи с сервером при загрузке: " + e.message);
            }
        }

        function renderCanvas() {
            const canvas = document.getElementById('tilda-canvas');
            canvas.innerHTML = '';

            blockList.forEach((block, index) => {
                let bDiv = document.createElement('div');
                bDiv.className = 'tilda-block';

                if (isOwner) {
                    bDiv.innerHTML = `
                        <div class="block-controls">
                            <button class="btn-delete" onclick="deleteBlock(${index})">❌ Удалить блок</button>
                        </div>
                    `;
                }

                if (block.type === 'text') {
                    if (isOwner) {
                        bDiv.innerHTML += `<div class="editable-area" contenteditable="true" oninput="updateBlockContent(${index}, this.innerText)">${block.content || 'Нажмите сюда, чтобы ввести текст...'}</div>`;
                    } else {
                        bDiv.innerHTML += `<div class="view-mode-text">${block.content}</div>`;
                    }
                } 
                else if (block.type === 'image') {
                    if (isOwner) {
                        bDiv.innerHTML += `
                            <input type="text" placeholder="Вставьте URL ссылки на изображение..." value="${block.content || ''}" onchange="updateBlockImage(${index}, this.value)">
                            ${block.content ? `<img src="${block.content}" class="block-img">` : ''}
                        `;
                    } else {
                        bDiv.innerHTML += block.content ? `<img src="${block.content}" class="block-img">` : '<p style="color:#888;">Изображение не добавлено</p>';
                    }
                } 
                else if (block.type === 'roblox') {
                    if (isOwner) {
                        bDiv.innerHTML += `
                            <input type="text" placeholder="Введите ник игрока в Roblox..." value="${block.content || ''}" onchange="updateBlockRoblox(${index}, this.value)">
                            ${block.avatar_url ? `<img src="${block.avatar_url}" class="roblox-avatar-circle">` : ''}
                        `;
                    } else {
                        bDiv.innerHTML += block.avatar_url ? `
                            <div style="text-align:center;">
                                <img src="${block.avatar_url}" class="roblox-avatar-circle">
                                <p style="margin-top:8px; font-weight:bold; font-size:18px;">${block.content}</p>
                            </div>
                        ` : '<p style="color:#888;">Аватар не задан</p>';
                    }
                }
                else if (block.type === 'roblox_skin') {
                    if (isOwner) {
                        bDiv.innerHTML += `
                            <input type="text" placeholder="Введите ник игрока для загрузки 3D-скина..." value="${block.content || ''}" onchange="updateBlockSkin(${index}, this.value)">
                            ${block.skin_url ? `<img src="${block.skin_url}" class="roblox-skin-full" style="max-height:400px; display:block; margin:15px auto;">` : ''}
                        `;
                    } else {
                        bDiv.innerHTML += block.skin_url ? `
                            <div style="text-align:center;">
                                <img src="${block.skin_url}" class="roblox-skin-full" style="max-height:400px; display:block; margin:15px auto;">
                                <p style="margin-top:8px; font-weight:bold; font-size:18px; color:#ff5722;">${block.content}</p>
                            </div>
                        ` : '<p style="color:#888;">Персонаж не задан</p>';
                    }
                }
                
                canvas.appendChild(bDiv);
            });
            
            const clearBtn = document.getElementById('clear-canvas-btn');
            if (clearBtn) {
                clearBtn.style.display = isOwner ? 'block' : 'none';
            }
        }

        // 🔥 ИСПРАВЛЕНО: Теперь при создании нового блока в массив ЖЕСТКО зашивается пустое поле skin_url!
        function addBlock(type) { 
            blockList.push({ type: type, content: '', avatar_url: '', skin_url: '' }); 
            renderCanvas(); 
        }

        function deleteBlock(index) { blockList.splice(index, 1); renderCanvas(); }
        function updateBlockContent(index, val) { blockList[index].content = val; }
        function updateBlockImage(index, val) { blockList[index].content = val; renderCanvas(); }
        
        async function updateBlockRoblox(index, username) {
            if(!username) return;
            blockList[index].content = username;
            let res = await fetch('/api/news/roblox-avatar/' + username);
            let data = await res.json();
            blockList[index].avatar_url = data.avatar_url;
            renderCanvas();
        }

        // 🔥 УЛЬТРА-ДЕБАГ ФУНКЦИЯ: Защищает от пустых ответов Рендера на мобилке
        async function updateBlockSkin(index, username) {
            if(!username) return;
            blockList[index].content = username;
            
            try {
                let res = await fetch('/api/news/roblox-skin/' + username);
                if (!res.ok) {
                    alert("⚠️ Бэкенд ответил ошибкой: " + res.status);
                    return;
                }
                let data = await res.json();
                
                // Проверяем все возможные ключи, которые мог вернуть Python
                let finalUrl = data.skin_url || data.avatar_url || null;
                
                if (finalUrl) {
                    blockList[index].skin_url = finalUrl;
                } else {
                    alert("⚠️ Сервер вернул пустой ключ картинки!");
                }
                renderCanvas();
            } catch (err) {
                alert("❌ Ошибка отправки запроса: " + err.message);
            }
        }
        
        async function saveAndPublish() {
            let res = await fetch(`/api/news/${projName}/${pageName}/publish`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({blocks: blockList})
            });
            if(res.ok) alert('🚀 Изменения успешно опубликованы для всех гостей!');
        }

        loadPageData();
    </script>
</body>
</html>
