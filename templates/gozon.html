<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пинийский Маркетплейс GOZON</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.12.0/sweetalert2.all.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.12.0/sweetalert2.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body {
            background: linear-gradient(135deg, #0d1b2a 0%, #1b263b 50%, #415a77 100%);
            color: #f8f9fa; min-height: 100vh; overflow-x: hidden;
        }
        header {
            background: rgba(27, 38, 59, 0.85); backdrop-filter: blur(10px);
            padding: 15px 5%; position: sticky; top: 0; z-index: 100;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid #00b4d8; box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .logo { font-size: 28px; font-weight: 800; color: #00b4d8; text-transform: uppercase; letter-spacing: 2px; }
        .logo span { color: #f72585; }
        .nav-icons { display: flex; gap: 30px; align-items: center; }
        
        /* Кнопки-эмодзи со 100% гарантией видимости */
        .icon-btn { position: relative; font-size: 26px; cursor: pointer; transition: 0.3s; user-select: none; }
        .icon-btn:hover { transform: scale(1.15); filter: drop-shadow(0 0 8px #00b4d8); }
        
        .badge {
            position: absolute; top: -5px; right: -8px; background: #f72585; color: white;
            border-radius: 50%; padding: 2px 7px; font-size: 11px; font-weight: bold; transition: 0.2s;
            box-shadow: 0 0 10px rgba(247, 37, 133, 0.6);
        }
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px; }
        .product-card {
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px; padding: 20px; transition: 0.4s;
            display: flex; flex-direction: column; justify-content: space-between; backdrop-filter: blur(5px);
        }
        .product-card:hover {
            transform: translateY(-8px); border-color: #00b4d8;
            box-shadow: 0 10px 25px rgba(0, 180, 216, 0.2);
        }
        .product-title { font-size: 20px; font-weight: 600; margin-bottom: 10px; color: #90e0ef; }
        .product-desc { font-size: 14px; color: #e2e8f0; margin-bottom: 15px; line-height: 1.4; flex-grow: 1; }
        .product-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 15px; }
        .product-price { font-size: 22px; font-weight: 700; color: #00b4d8; }
        .btn {
            background: linear-gradient(90deg, #0077b6, #00b4d8); color: white; border: none;
            padding: 10px 18px; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.3s;
        }
        .btn:hover { background: linear-gradient(90deg, #00b4d8, #f72585); transform: scale(1.05); }
        
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center;
        }
        .modal-content {
            background: #1b263b; border: 2px solid #00b4d8; border-radius: 20px;
            padding: 30px; width: 90%; max-width: 550px; position: relative; max-height: 85vh; overflow-y: auto;
        }
        .full-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(135deg, #060b14 0%, #0d1b2a 60%, #1b263b 100%);
            z-index: 2000; justify-content: center; align-items: center; padding: 40px;
        }
        .full-modal-content { width: 100%; max-width: 900px; display: flex; flex-direction: column; gap: 25px; position: relative; }
        .full-detail-title { font-size: clamp(32px, 5vw, 48px); font-weight: 800; color: #90e0ef; text-shadow: 0 4px 15px rgba(0, 180, 216, 0.3); }
        .full-detail-desc { font-size: 18px; color: #e2e8f0; line-height: 1.8; padding: 25px; background: rgba(255,255,255,0.03); border-left: 5px solid #f72585; border-radius: 8px; }
        .full-detail-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 25px; }
        .full-detail-price { font-size: 36px; font-weight: 800; color: #00b4d8; }
        .full-btn-buy { font-size: 20px; padding: 15px 40px; border-radius: 12px; }

        .close-modal { position: absolute; top: 15px; right: 20px; font-size: 32px; cursor: pointer; color: #a2a2a2; transition: 0.2s; }
        .close-modal:hover { color: #f72585; transform: rotate(90deg); }
        .auth-box h2 { text-align: center; margin-bottom: 20px; color: #00b4d8; }
        .auth-box input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #415a77; background: #0d1b2a; color: white; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .geo-indicator { font-size: 13px; color: #2a9d8f; margin: 10px 0; display: flex; align-items: center; gap: 6px; }
        
        /* 🗺️ СТИЛИ ДЛЯ ВСТРОЕННОГО В ПЛАШКУ НАВИГАТОРА */
        .courier-map-box {
            width: 100%; height: 250px; margin-top: 15px; border-radius: 12px; 
            border: 2px solid #00b4d8; display: none; overflow: hidden;
        }
    </style>
</head>
<body>

    <!-- ОБНОВЛЕННАЯ ШАПКА: ТРИ УДОБНЫЕ КНОПКИ ДЛЯ СМАРТФОНОВ И ПК -->
    <header>
        <div class="logo">GO<span>ZON</span></div>
        <div id="userInfo" style="font-size: 14px; color: #90e0ef;"></div>
        <div class="nav-icons">
            <!-- 1. Кнопка Заказов (Курьерская панель, доступна с телефона!) -->
            <div class="icon-btn" onclick="openCourierPanelFromBtn()" title="Панель курьера">
                📦
            </div>
            <!-- 2. Кнопка Уведомлений -->
            <div class="icon-btn" onclick="toggleModal('notificationsModal')" title="Уведомления">
                🔔
                <div class="badge" id="notifBadge" style="display: none;">0</div>
            </div>
            <!-- 3. Кнопка Корзины -->
            <div class="icon-btn" onclick="openCartModal()" title="Корзина">
                🛒
                <div class="badge" id="cartBadge" style="display: none;">0</div>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="products-grid" id="productsContainer"></div>
    </div>
    <!-- ОКНО РЕГИСТРАЦИИ И ВХОДА -->
    <div id="authModal" class="modal" style="display: none;">
        <div class="modal-content auth-box">
            <h2>Вход в GOZON</h2>
            <input type="text" id="authUser" placeholder="Ваш логин">
            <input type="password" id="authPass" placeholder="Пароль">
            <button class="btn" style="width: 100%; margin-bottom: 10px;" onclick="handleAuth(true)">Войти</button>
            <button class="btn" style="width: 100%; background: #415a77;" onclick="handleAuth(false)">Зарегистрироваться</button>
        </div>
    </div>

    <!-- ПОЛНОЭКРАННОЕ ОКНО ДЕТАЛЬНОГО ПРОСМОТРА ТОВАРА -->
    <div id="productDetailModal" class="full-modal">
        <div class="full-modal-content">
            <span class="close-modal" onclick="toggleModal('productDetailModal')">&times;</span>
            <h2 id="detailTitle" class="full-detail-title"></h2>
            <div id="detailDesc" class="full-detail-desc"></div>
            <div class="full-detail-footer">
                <span id="detailPrice" class="full-detail-price"></span>
                <button class="btn full-btn-buy" id="detailAddBtn">Добавить в корзину</button>
            </div>
        </div>
    </div>

    <!-- ОКНО КОРЗИНЫ -->
    <div id="cartModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="toggleModal('cartModal')">&times;</span>
            <h2 style="color: #00b4d8; margin-bottom: 15px;">🛒 Ваша корзина</h2>
            <div id="cartItemsList"></div>
            <div class="geo-indicator" id="geoStatus">📍 Ожидание геолокации...</div>
            <div style="margin-top: 20px; display: flex; justify-content: space-between; align-items: center;">
                <h3>Итого: <span id="cartTotalSum" style="color:#f72585;">0</span> ₽</h3>
                <button class="btn" onclick="submitOrder()">Оплатить заказ</button>
            </div>
        </div>
    </div>

    <!-- ОКНО УВЕДОМЛЕНИЙ -->
    <div id="notificationsModal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="toggleModal('notificationsModal')">&times;</span>
            <h2 style="color: #00b4d8; margin-bottom: 15px;">🔔 Уведомления</h2>
            <div id="notifList" style="display: flex; flex-direction: column; gap: 10px;">
                <p style="color: #a2a2a2; font-style: italic;">Уведомлений пока нет</p>
            </div>
        </div>
    </div>

    <!-- ОКНО КУРЬЕРА (ОТКРЫВАЕТСЯ ПО CTRL + B) -->
    <div id="courierModal" class="modal">
        <div class="modal-content" style="max-width: 750px;">
            <span class="close-modal" onclick="toggleModal('courierModal')">&times;</span>
            <h2 style="color: #f72585; margin-bottom: 15px;">📦 Панель обработки заказов (Админ/Курьер)</h2>
            <div id="courierOrdersList"></div>
        </div>
    </div>
    <script>
        let currentUser = null; let productsData = []; let cart = {};
        let userLocation = { lat: null, lng: null }; let localNotifications = [];
        let activeMaps = {}; // Хранилище объектов карт для предотвращения конфликтов инициализации

        // 🛰️ АВТОЗАПРОС ГЕОЛОКАЦИИ ПО ТЕЛЕФОНУ И БРАУЗЕРУ
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    userLocation.lat = pos.coords.latitude; userLocation.lng = pos.coords.longitude;
                    const el = document.getElementById('geoStatus');
                    if(el) el.innerHTML = `📍 Доставка настроена по геопозиции телефона`;
                },
                () => {
                    userLocation.lat = 43.5855; userLocation.lng = 39.7231; // Сочи по умолчанию
                    const el = document.getElementById('geoStatus');
                    if(el) el.innerHTML = `📍 Доставка настроена на Центральный Склад`;
                }
            );
        }

        // 🔒 АВТОМАТИЧЕСКАЯ ИНИЦИАЛИЗАЦИЯ И СОХРАНЕНИЕ СЕССИИ
        window.addEventListener('DOMContentLoaded', () => {
            const savedUser = localStorage.getItem('gozon_logged_user');
            if (savedUser) {
                currentUser = savedUser;
                document.getElementById('userInfo').innerText = `👤 Пользователь: ${currentUser}`;
                loadProducts(); 
                startNotificationPolling();
            } else {
                document.getElementById('authModal').style.display = 'flex';
            }
        });

        function toggleModal(id) {
            const m = document.getElementById(id); m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
        }

        // 🔑 ОБРАБОТЧИК АВТОРИЗАЦИИ С КРАСИВЫМИ ОКНАМИ SWAL (ЧЕРЕЗ CLOUDFLARE)
        async function handleAuth(isLogin) {
            const username = document.getElementById('authUser').value.trim();
            const password = document.getElementById('authPass').value.trim();
            if(!username || !password) return Swal.fire("Ошибка", "Заполните все поля!", "error");
            
            const url = isLogin ? '/api/gozon/login' : '/api/gozon/register';
            try {
                const res = await fetch(url, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password})
                });
                const data = await res.json();
                if(!res.ok) throw new Error(data.detail || "Ошибка операции");
                
                currentUser = username;
                localStorage.setItem('gozon_logged_user', currentUser); 
                document.getElementById('authModal').style.display = 'none';
                document.getElementById('userInfo').innerText = `👤 Пользователь: ${currentUser}`;
                Swal.fire("Успешно!", isLogin ? "Вы вошли в маркетплейс!" : "Регистрация успешна! Нажмите Войти.", "success");
                loadProducts(); 
                startNotificationPolling();
            } catch(e) { Swal.fire("Ошибка", e.message, "error"); }
        }

        // 📦 СКАЧИВАНИЕ СПИСКА ТОВАРОВ И РЕНДЕР КАРТОЧЕК НА ВИТРИНУ
        async function loadProducts() {
            try {
                const res = await fetch('/api/gozon/products'); 
                productsData = await res.json();
                const container = document.getElementById('productsContainer'); 
                container.innerHTML = '';
                
                productsData.forEach(p => {
                    container.innerHTML += `
                        <div class="product-card">
                            <div>
                                <div class="product-title">${p.name}</div>
                                <div class="product-desc">${p.description}</div>
                            </div>
                            <div class="product-footer">
                                <div class="product-price">${p.price} ₽</div>
                                <button class="btn" onclick="openDetail(${p.id})">О товаре</button>
                            </div>
                        </div>`;
                });
            } catch(e) { console.error("Сбой загрузки витрины товаров:", e); }
        }

        // 🔍 ОТКРЫТИЕ ОКНА ТОВАРА НА ВЕСЬ ЭКРАН (ПОЛНОЭКРАННЫЙ РЕЖИМ)
        function openDetail(id) {
            const p = productsData.find(item => item.id === id); if(!p) return;
            document.getElementById('detailTitle').innerText = p.name;
            document.getElementById('detailDesc').innerText = p.description;
            document.getElementById('detailPrice').innerText = `${p.price} ₽`;
            
            document.getElementById('detailAddBtn').onclick = () => { 
                addToCart(p.id); 
                toggleModal('productDetailModal'); 
            };
            toggleModal('productDetailModal');
        }

        // 🛒 ДОБАВЛЕНИЕ И УДАЛЕНИЕ ИЗ КОРЗИНЫ С ИНДИКАТОРАМИ НАВЕРХУ
        function addToCart(id) { 
            cart[id] = (cart[id] || 0) + 1; 
            updateCartBadges(); 
            Swal.fire({ title: "Добавлено!", text: "Товар перемещен в вашу корзину", icon: "success", timer: 900, showConfirmButton: false }); 
        }
        
        function removeFromCart(id) { 
            if(cart[id]) { cart[id]--; if(cart[id] === 0) delete cart[id]; } 
            updateCartBadges(); 
            openCartModal(); 
        }
        
        function updateCartBadges() {
            const totalItems = Object.values(cart).reduce((a, b) => a + b, 0); 
            const badge = document.getElementById('cartBadge');
            if(totalItems > 0) { badge.innerText = totalItems; badge.style.display = 'block'; } else { badge.style.display = 'none'; }
        }

        function openCartModal() {
            const list = document.getElementById('cartItemsList'); list.innerHTML = ''; let total = 0;
            Object.keys(cart).forEach(id => {
                const p = productsData.find(item => item.id == id);
                if(p) {
                    const cost = p.price * cart[id]; total += cost;
                    list.innerHTML += `
                        <div class="cart-item">
                            <div><span style="font-weight:600; color:#90e0ef;">${p.name}</span><br><span style="font-size:13px; color:#a2a2a2;">${p.price} ₽ х ${cart[id]} шт.</span></div>
                            <div style="display:flex; align-items:center; gap:10px;"><span style="font-weight:bold; color:#00b4d8;">${cost} ₽</span><button class="btn" style="padding:4px 10px; background:#f72585;" onclick="removeFromCart(${p.id})">&times;</button></div>
                        </div>`;
                }
            });
            if(Object.keys(cart).length === 0) list.innerHTML = '<p style="text-align:center; color:#a2a2a2; padding:20px 0;">Ваша корзина пуста</p>';
            document.getElementById('cartTotalSum').innerText = total;
            const m = document.getElementById('cartModal'); if(m.style.display !== 'flex') m.style.display = 'flex';
        }

        // 💳 ОПЛАТА И ПЕРЕДАЧА GPS КООРДИНАТ НА СЕРВЕР
        async function submitOrder() {
            const itemsArray = []; let total = 0;
            Object.keys(cart).forEach(id => {
                const p = productsData.find(item => item.id == id);
                if(p) { itemsArray.push({ id: p.id, name: p.name, price: p.price, count: cart[id] }); total += p.price * cart[id]; }
            });
            if(itemsArray.length === 0) return Swal.fire("Внимание", "Добавьте товары в корзину!", "warning");
            
            const res = await fetch('/api/gozon/orders', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ username: currentUser, items: itemsArray, total_price: total, lat: userLocation.lat, lng: userLocation.lng })
            });
            if(res.ok) { cart = {}; updateCartBadges(); toggleModal('cartModal'); Swal.fire("Заказ оплачен!", "Курьеры получили точку доставки.", "success"); }
        }

        // 🎯 СЛУШАТЕЛЬ ХОТКЕЯ CTRL + B ДЛЯ ПАНЕЛИ КУРЬЕРОВ
        document.addEventListener('keydown', function(e) {
            if (e.ctrlKey && e.key.toLowerCase() === 'b') { 
                e.preventDefault(); 
                loadCourierOrders(); 
                const m = document.getElementById('courierModal'); 
                m.style.display = 'flex'; 
            }
        });
        // 📦 ЗАГРУЗКА И ВЫВОД ЗАКАЗОВ КУРЬЕРА С АВТОРАСЧЕТОМ ДИСТАНЦИИ
        async function loadCourierOrders() {
            try {
                const res = await fetch('/api/gozon/orders'); const orders = await res.json();
                const list = document.getElementById('courierOrdersList'); list.innerHTML = '';
                
                // Очищаем кэш старых карт при обновлении списка
                activeMaps = {};

                orders.reverse().forEach(o => {
                    const itemsStr = o.items.map(i => `${i.name} (${i.count}шт)`).join(', ');
                    let statusColor = o.status === 'accepted' ? '#2196f3' : (o.status === 'confirmed' ? '#4caf50' : (o.status === 'cancelled' ? '#f44336' : '#ffb703'));
                    
                    // Рассчитываем дистанцию на лету для вывода на плашку
                    let geoInfo = 'Не указана';
                    if(o.lat && o.lng && userLocation.lat) {
                        const dist = Math.sqrt(Math.pow(o.lat - userLocation.lat, 2) + Math.pow(o.lng - userLocation.lng, 2)) * 111;
                        geoInfo = `📍 Расстояние до клиента: ~${dist.toFixed(2)} км (Координаты: ${o.lat.toFixed(4)}, ${o.lng.toFixed(4)})`;
                    } else if (o.lat && o.lng) {
                        geoInfo = `📍 Координаты доставки: ${o.lat.toFixed(4)}, ${o.lng.toFixed(4)}`;
                    }

                    list.innerHTML += `
                        <div style="background:rgba(255,255,255,0.03); border:1px solid #415a77; padding:15px; border-radius:10px; margin-bottom:15px;">
                            <div style="display:flex; margin-bottom:10px;"><strong>Заказ №${o.id} от ${o.username}</strong><span style="color:${statusColor}; font-weight:bold; margin-left:auto;">[${o.status.toUpperCase()}]</span></div>
                            <div style="font-size:14px; margin-bottom:8px;">🛒 Содержимое: <span style="color:#90e0ef;">${itemsStr}</span></div>
                            <div style="font-size:14px; margin-bottom:8px;">💰 Сумма: <span style="color:#00b4d8; font-weight:bold;">${o.total_price} ₽</span></div>
                            <div style="font-size:13px; color:#2a9d8f; margin-bottom:12px; font-weight: 500;">${geoInfo}</div>
                            
                            <div style="display:flex; gap:10px; margin-top:10px;">
                                <button class="btn" style="padding:6px 12px; font-size:13px;" onclick="viewOrderRoute(${o.id}, ${o.lat}, ${o.lng})">Взять заказ</button>
                                <button class="btn" style="padding:6px 12px; font-size:13px; background:#4caf50;" onclick="changeStatus(${o.id}, 'confirmed')">Подтвердить</button>
                                <button class="btn" style="padding:6px 12px; font-size:13px; background:#f44336;" onclick="changeStatus(${o.id}, 'cancelled')">Отменить</button>
                            </div>
                            
                            <!-- 🗺️ КОНТЕЙНЕР ЖИВОЙ КАРТЫ, КОТОРЫЙ БУДЕТ РАСКРЫВАТЬСЯ ЗДЕСЬ -->
                            <div id="map-container-${o.id}" class="courier-map-box"></div>
                        </div>`;
                });
            } catch(e) { console.error("Ошибка загрузки заказов курьера:", e); }
        }
        function openCourierPanelFromBtn() {
            loadCourierOrders(); // Скачиваем актуальные заказы с сервера
            const m = document.getElementById('courierModal');
            if (m) m.style.display = 'flex'; // Показываем модальное окно курьера
        }

        // 🗺️ РАСКРЫТИЕ НАВИГАТОРА И ОТРИСОВКА ЖИВОЙ КАРТЫ ПРЯМО НА ПЛАШКЕ ЗАКАЗА
        function viewOrderRoute(id, lat, lng) {
            const mapBox = document.getElementById(`map-container-${id}`);
            if (!mapBox) return;

            // Если карта уже открыта — сворачиваем её обратно
            if (mapBox.style.display === 'block') {
                mapBox.style.display = 'none';
                return;
            }

            // Открываем блок для карты
            mapBox.style.display = 'block';

            // Если гео-координаты покупателя отсутствуют, ставим Сочи дефолтом
            const clientLat = lat || 43.5855;
            const clientLng = lng || 39.7231;
            const courierLat = userLocation.lat || 43.5855;
            const courierLng = userLocation.lng || 39.7231;

            // Инициализация карты Leaflet OpenStreetMap
            setTimeout(() => {
                try {
                    // Создаем карту внутри контейнера плашки
                    const map = L.map(`map-container-${id}`).setView([clientLat, clientLng], 13);
                    activeMaps[id] = map;

                    // Загружаем бесплатные карты OpenStreetMap слои
                    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                        attribution: '&copy; OpenStreetMap contributors'
                    }).addTo(map);

                    // Ставим маркер Покупателя (красный круг)
                    L.circleMarker([clientLat, clientLng], { color: '#f72585', radius: 10, fillOpacity: 0.8 })
                        .addTo(map)
                        .bindPopup(`<b>Клиент заказа №${id}</b>`)
                        .openPopup();

                    // Ставим маркер Курьера (синий круг), если у курьера работает GPS
                    if (userLocation.lat) {
                        L.circleMarker([courierLat, courierLng], { color: '#00b4d8', radius: 8, fillOpacity: 0.8 })
                            .addTo(map)
                            .bindPopup('<b>Вы здесь (Курьер)</b>');

                        // Рисуем линию маршрута на лету от курьера до покупателя по воздуху
                        const polyline = L.polyline([
                            [courierLat, courierLng],
                            [clientLat, clientLng]
                        ], { color: '#00b4d8', weight: 4, dashArray: '5, 10' }).addTo(map);

                        // Автоматически зумируем карту, чтобы было видно обе точки и линию между ними
                        map.fitBounds(polyline.getBounds());
                    }
                } catch (err) {
                    console.error("Ошибка отрисовки карты Leaflet:", err);
                }
            }, 200);

            // Кнопка подтверждения действия
            Swal.fire({
                title: `Маршрут до заказа №${id}`,
                text: "Интерактивный навигатор развернут прямо на плашке заказа. Принять этот заказ в доставку?",
                icon: "question",
                showCancelButton: true,
                confirmButtonText: "Принять",
                cancelButtonText: "Оставить на плашке"
            }).then((result) => {
                if (result.isConfirmed) {
                    changeStatus(id, 'accepted');
                }
            });
        }

        // 🔄 ОБНОВЛЕНИЕ СТАТУСА НА БЭКЕНДЕ
        async function changeStatus(id, newStatus) {
            const res = await fetch(`/api/gozon/orders/${id}/status`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({status: newStatus}) });
            if(res.ok) { Swal.fire("Готово", "Статус заказа успешно обновлен", "success"); loadCourierOrders(); }
        }

        // 🔔 НЕПРЕРЫВНЫЙ ОПРОС СТАТУСОВ ДЛЯ ПОКУПАТЕЛЯ (КАЖДЫЕ 4 СЕКУНДЫ)
        let lastOrdersState = [];
        function startNotificationPolling() {
            setInterval(async () => {
                if(!currentUser) return; const res = await fetch('/api/gozon/orders'); const orders = await res.json();
                const myOrders = orders.filter(o => o.username === currentUser);
                myOrders.forEach(mo => {
                    const match = lastOrdersState.find(lo => lo.id === mo.id);
                    if(match && match.status !== mo.status) {
                        let text = `Заказ №${mo.id}: ` + (mo.status === 'accepted' ? "🚚 Курьер уже взял ваш заказ на выполнение!" : (mo.status === 'confirmed' ? "✅ Успешно доставлен и подтвержден!" : "❌ Был отменен курьерской службой."));
                        localNotifications.unshift({ text, time: new Date().toLocaleTimeString() }); updateNotificationsUI();
                    }
                });
                lastOrdersState = myOrders;
            }, 4000);
        }

        // 🖼️ ОТРИСОВКА ПАНЕЛИ УВЕДОМЛЕНИЙ ПРИ ИЗМЕНЕНИИ СТАТУСОВ
        function updateNotificationsUI() {
            const badge = document.getElementById('notifBadge'); const list = document.getElementById('notifList');
            if(localNotifications.length > 0) {
                badge.innerText = localNotifications.length; badge.style.display = 'block'; list.innerHTML = '';
                localNotifications.forEach(n => { list.innerHTML += `<div style="background:rgba(255,255,255,0.05); padding:10px; border-radius:8px; border-left:4px solid #00b4d8; margin-bottom:10px;"><div>${n.text}</div><div style="font-size:11px; color:#a2a2a2; text-align:right;">${n.time}</div></div>`; });
            }
        }
    </script>
</body>
</html>
