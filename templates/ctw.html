<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CTW: Conquer The World Симулятор</title>
    
    <!-- 🗺️ 1. БАЗА КАРТ: Стили и скрипт самой карты Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <!-- 📐 2. ПЛАГИН РИСОВАНИЯ: Перевели на сверхстабильный CDN от Cloudflare! -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
    
    <!-- 🌟 3. ОКНА ОПОВЕЩЕНИЙ: Стили и скрипт логики SweetAlert2 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.12.0/sweetalert2.min.css"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.12.0/sweetalert2.all.min.js"></script>
    
    <!-- 🎨 4. ГРАФИКА: Шрифты иконок Font Awesome -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Courier New', Courier, monospace; }
        body { background: #060b14; color: #f8f9fa; overflow: hidden; height: 100vh; }
        
        #map { width: 100vw; height: 100vh; z-index: 1; }

        /* Верхняя панель HUD */
        .dictator-hud {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(6, 11, 20, 0.9); border: 2px solid #ff2a2a;
            box-shadow: 0 0 20px rgba(255, 42, 42, 0.4); border-radius: 12px;
            padding: 15px 30px; z-index: 1000; display: flex; gap: 40px;
            backdrop-filter: blur(10px); pointer-events: none;
        }
        .hud-stat { text-align: center; }
        .hud-stat label { font-size: 12px; color: #888; text-transform: uppercase; display: block; margin-bottom: 5px; }
        .hud-stat span { font-size: 22px; font-weight: bold; color: #ff2a2a; text-shadow: 0 0 8px rgba(255,42,42,0.6); }

        /* Окно создания флага и государства */
        .setup-modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #0d1117; border: 3px solid #ff2a2a; border-radius: 16px;
            padding: 30px; width: 90%; max-width: 450px; z-index: 2000; display: none;
            box-shadow: 0 0 40px rgba(255,42,42,0.5);
        }
        .setup-modal h2 { text-align: center; color: #ff2a2a; margin-bottom: 20px; }
        .setup-modal input {
            width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 6px;
            border: 1px solid #ff2a2a; background: #161b22; color: white; font-size: 16px;
        }
        
        .flag-canvas {
            width: 100%; height: 150px; background: white; border: 2px dashed #ff2a2a;
            margin-bottom: 20px; border-radius: 8px; display: flex; justify-content: center;
            align-items: center; cursor: pointer; position: relative; overflow: hidden;
        }
        .flag-canvas span { color: #333; font-weight: bold; font-size: 14px; }
        .flag-canvas img { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; display: none; }
        
        .btn {
            width: 100%; background: #ff2a2a; color: white; border: none; padding: 12px;
            border-radius: 6px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .btn:hover { background: #b30000; box-shadow: 0 0 15px #ff2a2a; }
        
        /* Текстовые метки */
        .city-label {
            background: transparent !important; border: none !important;
            color: #ffffff !important; font-weight: bold !important;
            text-shadow: 0 0 5px #000000, 0 0 5px #ff2a2a !important; font-size: 12px !important;
        }
        .capital-label { color: #ff2a2a !important; font-size: 15px !important; text-transform: uppercase; }
        .airport-label { color: #00ffff !important; font-size: 13px !important; text-shadow: 0 0 5px #000, 0 0 5px #00ffff !important; }

        
        .airport-card {
            position: fixed; bottom: 20px; right: 20px;
            background: rgba(13, 17, 23, 0.95); border: 2px solid #00ffff;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3); border-radius: 12px;
            padding: 15px; width: 280px; z-index: 1000; display: none;
            backdrop-filter: blur(10px);
        }
        .airport-card h4 { color: #00ffff; margin-bottom: 8px; font-size: 14px; text-transform: uppercase; }
        .airport-card p { font-size: 13px; color: #ccc; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        .airport-card .flag-mini { width: 35px; height: 22px; object-fit: cover; border: 1px solid #444; border-radius: 3px; }
        .airport-card .close-card { position: absolute; top: 8px; right: 10px; color: #888; cursor: pointer; font-size: 14px; }
        .airport-card .close-card:hover { color: #fff; }

        
        .plane-icon { font-size: 24px; text-shadow: 0 0 8px rgba(255,255,255,0.8); transition: transform 0.1s linear; }
                
        .roblox-btn {
            position: fixed; top: 15px; left: 15px; width: 45px; height: 45px;
            background: rgba(25, 25, 25, 0.85); border: 2px solid rgba(255,255,255,0.15);
            border-radius: 50%; z-index: 1500; cursor: pointer; display: flex;
            justify-content: center; align-items: center; transition: 0.2s ease-in-out;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5); backdrop-filter: blur(5px);
        }
        .roblox-btn:hover { background: rgba(45, 45, 45, 0.95); border-color: rgba(255,255,255,0.4); transform: scale(1.05); }
        .roblox-logo-tilt { width: 18px; height: 18px; background: #ffffff; transform: rotate(-15deg); border-radius: 3px; position: relative; }
        .roblox-logo-tilt::after { content: ''; position: absolute; top: 5px; left: 5px; width: 8px; height: 8px; background: rgba(25, 25, 25, 1); border-radius: 1px; }

        
        .roblox-leaderboard {
            position: fixed; top: 15px; right: 15px; width: 280px;
            background: rgba(15, 15, 15, 0.65); border-radius: 8px; z-index: 1500;
            padding: 10px; display: flex; flex-direction: column; gap: 4px;
            backdrop-filter: blur(8px); box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.05); transition: transform 0.3s cubic-bezier(0.1, 0.9, 0.2, 1), opacity 0.2s;
        }
        .leaderboard-header { display: flex; justify-content: space-between; font-size: 11px; color: rgba(255,255,255,0.6); font-weight: bold; text-transform: uppercase; padding-bottom: 6px; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 4px; }
        .leaderboard-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 8px; background: rgba(30, 30, 30, 0.4); border-radius: 4px; font-size: 13px; color: #fff; font-weight: 500; }
        .leaderboard-row.me { background: rgba(255, 200, 0, 0.15); border: 1px solid rgba(255,200,0,0.3); color: #ffcc00; }
    </style>
</head>
<body>
    <div class="roblox-btn" onclick="toggleRobloxLeaderboard()">
        <div class="roblox-logo-tilt"></div>
    </div>

    <!-- ТАБЛИЦА ИГРОКОВ (LEADERBOARD) В СТИЛЕ ROBLOX -->
    <div class="roblox-leaderboard" id="robloxBoard">
        <div class="leaderboard-header">
            <span>Игрок / Страна</span>
            <span>Армия</span>
        </div>
        <div id="leaderboardPlayersContainer"></div>
    </div>

    <!-- ВЕРХНЯЯ ПАНЕЛЬ СТАТИСТИКИ HUD -->
    <div class="dictator-hud" id="gameHud" style="display: none;">
        <div class="hud-stat">
            <label>Государство</label>
            <span id="hudCountryName">-</span>
        </div>
        <div class="hud-stat">
            <label>Население</label>
            <span id="hudPopulation">1</span>
        </div>
        <div class="hud-stat">
            <label>Армия (10%)</label>
            <span id="hudArmy">0</span>
        </div>
    </div>

    <!-- ПОЛНОЭКРАННЫЙ БЛОК ДЛЯ СПУТНИКОВОЙ КАРТЫ -->
    <div id="map"></div>

    <!-- ЦЕНТРИРОВАННОЕ ОКНО СОЗДАНИЯ СТРАНЫ -->
    <div id="setupModal" class="setup-modal">
        <h2>Регистрация Новой Державы</h2>
        <input type="text" id="countryName" placeholder="Название страны">
        <input type="text" id="capitalName" placeholder="Название столицы">
        
        <div class="flag-canvas" onclick="document.getElementById('flagInput').click()">
            <span id="flagPlaceholder">Кликни, чтобы вставить флаг</span>
            <img id="flagPreview" alt="Флаг">
        </div>
        <input type="file" id="flagInput" accept="image/*" style="display: none;" onchange="previewFlag(event)">
        
        <button class="btn" onclick="confirmStateCreation()">Утвердить Границы</button>
    </div>

    <!-- ИНФО-КАРТОЧКА АЭРОПОРТА -->
    <div class="airport-card" id="airportCard">
        <span class="close-card" onclick="document.getElementById('airportCard').style.display='none'">✕</span>
        <h4>✈️ Аэропорт Взлёта</h4>
        <p id="apCardName">Название аэропорта</p>
        <p>Владелец: <img id="apCardFlag" class="flag-mini" src="" alt=""> <span id="apCardCountry">Страна</span></p>
    </div>
    <script>
        // Сетевые и игровые переменные глобального масштаба
        // Генерируем уникальный ID для вкладки игрока, чтобы сервер различал нас
        const clientId = "user_" + Math.random().toString(36).substring(2, 11);
        let ws;
        let map;
        let drawnItems;
        let playerCountry = null;
        let base64Flag = "";
        
        // Локальные хранилища элементов текущего ИГРОКА
        let myCities = [];     // Массив городов { id, name, lat, lng, population, type }
        let myAirports = [];   // Массив аэропортов { id, name, lat, lng }
        let borderLayers = []; // Ссылки на неоново-красные полигоны игрока
        
        // Переменные для управления режимом авиарейсов
        let flightSelectionMode = false;
        let flightSourceAirportId = null;

        // Глобальные хранилища маркеров и слоёв абсолютно ВСЕХ игроков в онлайне
        // Ключом будет уникальный ID объекта на карте (например, 'city_171982312')
        let worldMarkers = {};
        let worldPolygons = {};

        // Запуск игры сразу после загрузки страницы в браузере
        window.addEventListener('DOMContentLoaded', () => {
            initGameMap();
            connectWebSocket();
            // Показываем окно создания державы поверх спутника
            document.getElementById('setupModal').style.display = 'block';
        });

        // 📡 ИНИЦИАЛИЗАЦИЯ ЖИВОГО WEBSOCKET-СОЕДИНЕНИЯ С СЕРВЕРОМ Fastapi
        function connectWebSocket() {
            // Автоматически вычисляем протокол (ws:// для локалки или wss:// для защищенного Render)
            const wsProtocol = window.location.protocol === "https:" ? "wss://" : "ws://";
            const wsUrl = wsProtocol + window.location.host + "/ctw/ws/" + clientId;
            
            ws = new WebSocket(wsUrl);
            
            ws.onopen = () => {
                console.log("Успешное многопользовательское подключение. Твой ID:", clientId);
            };

            ws.onmessage = (event) => {
                // Принимаем пакеты данных от сервера в реальном времени
                const msg = JSON.parse(event.data);
                
                if (msg.type === "sync_world") {
                    // Метод синхронизации карты мира (напишем в следующих частях)
                    syncWorldState(msg.players);
                } else if (msg.type === "spawn_plane") {
                    // Метод отрисовки летящего самолётика (напишем в следующих частях)
                    animatePlaneFlight(msg);
                }
            };

            ws.onclose = () => {
                console.log("Соединение с сервером разорвано. Переподключение через 3 секунды...");
                setTimeout(connectWebSocket, 3000);
            };
        }
        // 🗺️ 2. ЗАПУСК СПУТНИКОВОЙ КАРТЫ МИРА И ИНСТРУМЕНТОВ РИСОВАНИЯ
        function initGameMap() {
            // Увеличили максимальный зум для глубокого приближения спутника
            map = L.map('map', {
                center: [20.0, 0.0],
                zoom: 2,
                minZoom: 2,
                maxZoom: 19, 
                doubleClickZoom: false
            });

            // Подгружаем текстуры реальных спутниковых снимков Земли (ArcGIS)
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                attribution: 'Tiles &copy; Esri &mdash; Спутниковые снимки планеты Земля'
            }).addTo(map);

            // Создаем группу для хранения твоих неоновых границ
            drawnItems = new L.FeatureGroup();
            map.addLayer(drawnItems);

            // Подключаем инструмент Leaflet.Draw (только полигоны)
            const drawControl = new L.Control.Draw({
                draw: {
                    polygon: {
                        allowIntersection: false, // Границы не должны пересекаться
                        showArea: true,
                        drawError: { color: '#b30000', message: 'Границы не должны пересекаться!' },
                        shapeOptions: { color: '#ff2a2a', weight: 3, fillOpacity: 0.2, fillColor: '#ff2a2a' }
                    },
                    polyline: false, circle: false, rectangle: false, marker: false, circlemarker: false
                },
                edit: { featureGroup: drawnItems, remove: false, edit: false }
            });
            map.addControl(drawControl);

            // Ловим момент, когда ты закончил обводить стартовую территорию
            map.on('draw:created', function (e) {
                const layer = e.layer;
                
                if (!playerCountry) {
                    // Если ты чертишь в первый раз — это твоя стартовая страна
                    drawnItems.addLayer(layer);
                    borderLayers.push(layer);
                    // Окрашиваем в яркий неоново-красный диктаторский цвет
                    layer.setStyle({ color: '#ff2a2a', weight: 4, fillColor: '#ff2a2a', fillOpacity: 0.15 });
                    Swal.fire("Границы очерчены!", "Теперь загрузи флаг и заполни данные государства.", "success");
                } else {
                    // Если страна уже есть — это попытка расширения и захвата чужих земель!
                    handleExpansion(layer);
                }
            });

            // Запускаем перехват кликов для будущих построек (города, аэропорты)
            setupMapClickHandlers();
        }

        // Вспомогательный метод перевода файла флага в строку Base64
        function previewFlag(event) {
            const input = event.target;
            const reader = new FileReader();
            reader.onload = function() {
                base64Flag = reader.result;
                const preview = document.getElementById('flagPreview');
                preview.src = base64Flag;
                preview.style.display = 'block';
                document.getElementById('flagPlaceholder').style.display = 'none';
            };
            if(input.files && input.files[0]) reader.readAsDataURL(input.files[0]);
        }
        // 🎖️ 3. УТВЕРЖДЕНИЕ ГОСУДАРСТВА НА СЕРВЕРЕ ЧЕРЕЗ WEBSOCKET
        function confirmStateCreation() {
            const name = document.getElementById('countryName').value.trim();
            const capital = document.getElementById('capitalName').value.trim();
            
            if (!name || !capital) return Swal.fire("Внимание", "Укажите название страны и столицы!", "warning");
            if (borderLayers.length === 0) return Swal.fire("Внимание", "Сначала выделите область на карте!", "warning");
            if (!base64Flag) return Swal.fire("Внимание", "Загрузите государственный флаг!", "warning");

            // Корректно извлекаем геометрию полигона из Leaflet структуры для отправки в онлайн
            const geometry = borderLayers.flatMap(layer => {
                let latlngs = layer.getLatLngs();
                // Раскрываем вложенные массивы геометрии, если они есть
                if (Array.isArray(latlngs) && Array.isArray(latlngs[0])) latlngs = latlngs[0];
                return latlngs.map(p => ({lat: p.lat, lng: p.lng}));
            });

            playerCountry = { name, capital, flag: base64Flag };

            // Прячем окно ввода и открываем верхний HUD
            document.getElementById('setupModal').style.display = 'none';
            document.getElementById('gameHud').style.display = 'flex';
            document.getElementById('hudCountryName').innerText = name;

            // 🌟 ИСПРАВЛЕНО: JSON написан строго большими буквами!
            ws.send(JSON.stringify({
                type: "create_country",
                name: name,
                capital: capital,
                flag: base64Flag,
                geometry: geometry
            }));

            Swal.fire({
                title: `Держава ${name} основана!`,
                text: "Дважды нажмите на экран внутри границ, чтобы заложить Столицу. Трижды быстро нажмите, чтобы построить Аэропорт ✈️!",
                icon: "success"
            });

            // Запускаем симуляцию демографического роста населения
            startDemographicSimulation();
        }

        // 🏙️ 4. ЛОГИКА ОБРАБОТКИ МНОЖЕСТВЕННЫХ КЛИКОВ (ТАЙМЕР ДЛЯ ДВОЙНОГО И ТРОЙНОГО ТАПА)
        function setupMapClickHandlers() {
            let clickCount = 0;
            let clickTimer = null;

            map.on('click', function(e) {
                if (!playerCountry) return; // Не даем строить инфраструктуру, пока нет страны
                clickCount++;
                
                if (clickCount === 1) {
                    // Ждем 400 миллисекунд — если кликов больше нет, это просто одиночный клик передвижения карты
                    clickTimer = setTimeout(function() {
                        clickCount = 0;
                    }, 400); 
                } else if (clickCount === 2) {
                    // Даем маленькую задержку на случай, если пользователь делает третий быстрый клик
                    setTimeout(function() {
                        if (clickCount === 2) {
                            clickCount = 0;
                            handleDoubleClick(e.latlng);
                        }
                    }, 100);
                } else if (clickCount === 3) {
                    // Если зафиксирован третий клик — мгновенно сбрасываем таймеры и строим аэропорт
                    clearTimeout(clickTimer);
                    clickCount = 0;
                    handleTripleClick(e.latlng);
                }
            });
        }
        // 🏙️ 5. ДВОЙНОЙ КЛИК — ОКОНЧАТЕЛЬНОЕ ОСНОВАНИЕ ГОРОДОВ И СТОЛИЦЫ
        function handleDoubleClick(latlng) {
            let insideMyBorders = isPointInMyBorders(latlng);
            const hasCapital = myCities.some(c => c.type === 'capital');

            if (!hasCapital) {
                // Если столицы еще нет — она должна быть строго внутри стартовых границ
                if (!insideMyBorders) {
                    return Swal.fire("Ошибка", "Столица должна быть построена строго внутри ваших стартовых неоновых границ!", "error");
                }
                // Назначаем имя столицы, которое пользователь ввел в стартовом окне
                addCityLocal(latlng, playerCountry.capital, 'capital', 500);
            } else {
                // Последующие двойные тапы вызывают ручной ввод названия города
                Swal.fire({
                    title: 'Основать новое поселение 🏙️',
                    input: 'text',
                    inputPlaceholder: 'Введите название города',
                    showCancelButton: true,
                    confirmButtonText: 'Построить',
                    cancelButtonText: 'Отмена',
                    background: '#0d1117',
                    color: '#fff'
                }).then((result) => {
                    if (result.isConfirmed && result.value.trim() !== "") {
                        addCityLocal(latlng, result.value.trim(), 'city', Math.floor(Math.random() * 200) + 50);
                    }
                });
            }
        }

        // ✈️ 6. ТРОЙНОЙ КЛИК — ПОСТРОЙКА СУВЕРЕННОГО АЭРОПОРТА
        function handleTripleClick(latlng) {
            // Твоё условие: аэропорт можно строить только на своей территории
            if (!isPointInMyBorders(latlng)) {
                return Swal.fire("Ошибка", "Аэропорты можно возводить только на суверенной территории вашей страны!", "error");
            }

            Swal.fire({
                title: 'Построить Аэропорт ✈️',
                input: 'text',
                inputPlaceholder: 'Введите название аэропорта',
                showCancelButton: true,
                confirmButtonText: 'Возвести',
                cancelButtonText: 'Отмена',
                background: '#0d1117',
                color: '#fff'
            }).then((result) => {
                if (result.isConfirmed && result.value.trim() !== "") {
                    myAirports.push({
                        id: "ap_" + Date.now(),
                        name: result.value.trim(),
                        lat: latlng.lat,
                        lng: latlng.lng
                    });
                    // Шлем обновленную инфраструктуру на сервер
                    sendInfrastructureUpdate();
                }
            });
        }

        // Вспомогательная функция проверки вхождения точки в свои полигоны
        function isPointInMyBorders(latlng) {
            let inside = false;
            borderLayers.forEach(layer => {
                if (isPointInPolygon(latlng, layer)) inside = true;
            });
            return inside;
        }

        // Добавление нового города в локальный массив
        function addCityLocal(latlng, name, type, population) {
            myCities.push({
                id: "city_" + Date.now(),
                name: name,
                lat: latlng.lat,
                lng: latlng.lng,
                population: population,
                type: type
            });
            sendInfrastructureUpdate();
        }

        // 🌟 7. ОТПРАВКА ОБНОВЛЕНИЯ ИНФРАСТРУКТУРЫ НА СЕРВЕР ЧЕРЕЗ WEBSOCKET
        function sendInfrastructureUpdate() {
            const totalPop = myCities.reduce((sum, c) => sum + c.population, 0) || 1;
            
            // Моментально обновляем циферки в своём HUD локально
            document.getElementById('hudPopulation').innerText = totalPop.toLocaleString();
            document.getElementById('hudArmy').innerText = Math.floor(totalPop * 0.10).toLocaleString();

            // 🌟 ИСПРАВЛЕНО: JSON написан строго большими буквами!
            ws.send(JSON.stringify({
                type: "update_infrastructure",
                cities: myCities,
                airports: myAirports,
                total_population: totalPop
            }));
        }
        // 🌍 8. РЕАКТИВНАЯ СИНХРОНИЗАЦИЯ ВСЕГО МИРА С СЕРВЕРА
        function syncWorldState(players) {
            
            updateRobloxLeaderboardUI(players);

            let activeElementIds = new Set();

            for (let pid in players) {
                const pData = players[pid];
                if (!pData.country) continue;

                const isMe = (pid === clientId);
                // Твоё условие: твоя страна — красная (#ff2a2a), чужие — сине-фиолетовые (#8a2be2)
                const stateColor = isMe ? '#ff2a2a' : '#8a2be2';

                // --- Синхронизация полигонов границ ---
                const polyId = "poly_" + pid;
                activeElementIds.add(polyId);

                if (!worldPolygons[polyId]) {
                    const latlngs = pData.country.geometry.map(pt => [pt.lat, pt.lng]);
                    const polygonLayer = L.polygon(latlngs, {
                        color: stateColor,
                        weight: 4,
                        fillColor: stateColor,
                        fillOpacity: 0.15
                    }).addTo(map);
                    worldPolygons[polyId] = polygonLayer;
                } else {
                    worldPolygons[polyId].setStyle({ color: stateColor, fillColor: stateColor });
                }

                // --- Синхронизация Городов ---
                pData.cities.forEach(city => {
                    const markerId = city.id;
                    activeElementIds.add(markerId);

                    const prefix = city.type === 'capital' ? '⭐ ' : '🏙️ ';
                    const labelClass = city.type === 'capital' ? 'city-label capital-label' : 'city-label';
                    const tooltipText = `${prefix}${city.name} (${city.population} чел)`;

                    if (!worldMarkers[markerId]) {
                        // Создаем маркер и привязываем метаданные владельца ownerId
                        const marker = L.marker([city.lat, city.lng], { ownerId: pid }).addTo(map);
                        marker.bindTooltip(tooltipText, {
                            permanent: true, direction: 'top', className: labelClass, offset: [0, -10]
                        }).openTooltip();

                        // Твоё условие: При нажатии на город/флаг выплывает окно с флагом, названием и населением
                        marker.on('click', function(e) {
                            L.DomEvent.stopPropagation(e);
                            showCountryLiveCard(pData.country, pid);
                        });

                        worldMarkers[markerId] = marker;
                    } else {
                        worldMarkers[markerId].setTooltipContent(tooltipText);
                        
                        // Твоё условие: Данные о населении меняются на лету прямо в открытом окне соседа!
                        if (Swal.isVisible() && Swal.getPopup().getAttribute('data-pid') === pid) {
                            const popEl = document.getElementById('swalLivePop');
                            if (popEl) popEl.innerText = city.population.toLocaleString();
                        }
                    }
                });

                // --- Синхронизация Аэропортов ---
                pData.airports.forEach(ap => {
                    const markerId = ap.id;
                    activeElementIds.add(markerId);

                    if (!worldMarkers[markerId]) {
                        const apMarker = L.marker([ap.lat, ap.lng], { ownerId: pid }).addTo(map);
                        apMarker.bindTooltip(`✈️ ${ap.name}`, {
                            permanent: true, direction: 'bottom', className: 'city-label airport-label', offset: [0, 10]
                        }).openTooltip();

                        // Навешиваем клик (показ инфо-карточки и выбор маршрута)
                        apMarker.on('click', function(e) {
                            L.DomEvent.stopPropagation(e);
                            handleAirportClick(ap, pData.country, isMe);
                        });

                        worldMarkers[markerId] = apMarker;
                    }
                });
            }

            // Твоё условие: Если кто-то закрывает страницу — стираем его элементы с карты (очистка ОЗУ)
            for (let id in worldMarkers) {
                if (!activeElementIds.has(id)) {
                    map.removeLayer(worldMarkers[id]);
                    delete worldMarkers[id];
                }
            }
            for (let id in worldPolygons) {
                if (!activeElementIds.has(id)) {
                    map.removeLayer(worldPolygons[id]);
                    delete worldPolygons[id];
                }
            }
        }

        // 📊 9. ВСПЛЫВАЮЩЕЕ ЖИВОЕ ОКНО ДЕРЖАВЫ (КЛИК ПО ФЛАГУ)
        function showCountryLiveCard(country, pid) {
            Swal.fire({
                title: country.name,
                html: `
                    <div style="text-align:center;">
                        <img src="${country.flag}" style="width:180px; height:110px; object-fit:cover; border:2px solid #ff2a2a; border-radius:8px; margin-bottom:15px;">
                        <p style="font-size:16px; color:#fff;">Столица: <strong style="color:#ff2a2a;">${country.capital}</strong></p>
                        <p style="font-size:18px; color:#ccc; margin-top:10px;">Общее население:<br>
                            <span id="swalLivePop" style="font-size:26px; font-weight:bold; color:#ff2a2a; text-shadow:0 0 10px rgba(255,42,42,0.5);">${country.population.toLocaleString()}</span> чел.
                        </p>
                    </div>
                `,
                showConfirmButton: false,
                background: '#0d1117',
                color: '#fff',
                didOpen: () => {
                    // Запоминаем ID, чтобы обновлять цифры в реальном времени из функции синхронизации
                    Swal.getPopup().setAttribute('data-pid', pid);
                }
            });
        }
        // ✈️ 10. ТАП ПО АЭРОПОРТУ: ИНФО-КАРТОЧКА В УГЛУ И РЕЖИМ ЗАПУСКА ПОЛЁТА
        function handleAirportClick(airport, country, isMe) {
            // Если включен режим выбора точки для полета (после первого тапа по своему аэропорту)
            if (flightSelectionMode) {
                if (airport.id === flightSourceAirportId) {
                    flightSelectionMode = false;
                    return Swal.fire("Отмена рейса", "Нельзя запустить самолёт в тот же самый аэропорт!", "warning");
                }

                const sourceAp = myAirports.find(a => a.id === flightSourceAirportId);
                if (!sourceAp) return;

                flightSelectionMode = false;

                // Взлёт самолёта транслируется всем игрокам через заглавный JSON!
                ws.send(JSON.stringify({
                    type: "launch_plane",
                    id: "plane_" + Date.now(),
                    from_airport: sourceAp.name,
                    to_airport: airport.name,
                    flag: playerCountry.flag,
                    country_name: playerCountry.name,
                    start_lat: sourceAp.lat,
                    start_lng: sourceAp.lng,
                    end_lat: airport.lat,
                    end_lng: airport.lng
                }));
                return;
            }

            // Твоё условие: При нажатии на аэропорт высвечивается карточка в правом нижнем углу
            const card = document.getElementById('airportCard');
            document.getElementById('apCardName').innerText = `✈️ ${airport.name}`;
            document.getElementById('apCardFlag').src = country.flag;
            document.getElementById('apCardCountry').innerText = country.name;
            
            // Если наш — голубая неоновая рамка, если чужой — фиолетовая
            card.style.borderColor = isMe ? '#00ffff' : '#8a2be2';
            card.style.boxShadow = isMe ? '0 0 20px rgba(0, 255, 255, 0.3)' : '0 0 20px rgba(138, 43, 226, 0.3)';
            card.style.display = 'block';

            // Твоё условие: При двойном нажатии (или втором тапе) включается режим выбора точки для полета
            if (isMe) {
                flightSelectionMode = true;
                flightSourceAirportId = airport.id;
            }
        }

        // ✈️ 11. АНИМАЦИЯ ПОЛЁТА САМОЛЁТИКА СО СКОРОСТЬЮ 50 КМ/СЕК
        function animatePlaneFlight(planeData) {
            const startLatLng = L.latLng(planeData.start_lat, planeData.start_lng);
            const endLatLng = L.latLng(planeData.end_lat, planeData.end_lng);
            
            // Считаем расстояние между точками на сфере Земли в километрах
            const distanceInKm = startLatLng.distanceTo(endLatLng) / 1000;
            
            // Твоё условие: Скорость самолета примерно 50 км на карте в секунду
            const speedKmPerSecond = 50;
            const totalDurationSeconds = Math.max(2, distanceInKm / speedKmPerSecond); // Полёт идет минимум 2 секунды
            const totalSteps = totalDurationSeconds * 20; // 20 кадров обновления в секунду для плавности

            const planeIcon = L.divIcon({
                html: `<div class="plane-icon">✈️</div>`,
                className: 'custom-plane-container',
                iconSize: [24, 24]
            });

            const planeMarker = L.marker(startLatLng, { icon: planeIcon }).addTo(map);

            // 🌟 ИСПРАВЛЕНО: Рассчитываем точный угол наклона по оси Y и X Меркатора
            // Добавляем +90 или -90 градусов коррекции, чтобы носик эмодзи ✈️ смотрел строго в точку прилёта
            const angle = Math.atan2(endLatLng.lat - startLatLng.lat, endLatLng.lng - startLatLng.lng) * (180 / Math.PI);
            
            setTimeout(() => {
                const el = planeMarker.getElement();
                if (el) {
                    // Чистый разворот графического контейнера видеокартой по вектору движения
                    el.style.transform += ` rotate(${-angle + 90}deg)`;
                }
            }, 100);


            // Твоё условие: При нажатии на любой из летящих самолетов выплывает панель с флагом и аэропортами
            planeMarker.on('click', function(e) {
                L.DomEvent.stopPropagation(e);
                Swal.fire({
                    title: `✈️ Воздушное Судно`,
                    html: `
                        <div style="text-align:center;">
                            <img src="${planeData.flag}" style="width:120px; height:75px; object-fit:cover; border:2px solid #00ffff; border-radius:6px; margin-bottom:15px;">
                            <p style="font-size:15px; color:#fff;">Владелец: <strong>${planeData.country_name}</strong></p>
                            <hr style="border-color:#444; margin:15px 0;">
                            <p style="font-size:14px; color:#ccc;">Вылет: <span style="color:#00ffff;">${planeData.from_airport}</span></p>
                            <p style="font-size:14px; color:#ccc; margin-top:5px;">Прилёт: <span style="color:#00ffff;">${planeData.to_airport}</span></p>
                        </div>
                    `,
                    showConfirmButton: false,
                    background: '#0d1117',
                    color: '#fff'
                });
            });

            // Покадровый цикл линейной интерполяции
            let step = 0;
            const flightInterval = setInterval(() => {
                step++;
                const ratio = step / totalSteps;

                if (ratio >= 1) {
                    clearInterval(flightInterval);
                    map.removeLayer(planeMarker);
                } else {
                    const currentLat = planeData.start_lat + (planeData.end_lat - planeData.start_lat) * ratio;
                    const currentLng = planeData.start_lng + (planeData.end_lng - planeData.start_lng) * ratio;
                    planeMarker.setLatLng([currentLat, currentLng]);
                }
            }, 50);
        }

        // 🧬 12. ДЕМОГРАФИЧЕСКИЙ ЦИКЛ РОСТА
        function startDemographicSimulation() {
            setInterval(() => {
                if (myCities.length === 0) return;

                myCities.forEach(city => {
                    const isGrowing = Math.random() > 0.45;
                    const factor = (Math.random() * 4 + 1) / 100;
                    
                    if (isGrowing) {
                        city.population += Math.floor(city.population * factor) + 1;
                    } else {
                        city.population -= Math.floor(city.population * factor);
                        if (city.population < 1) city.population = 1;
                    }
                });

                sendInfrastructureUpdate();
            }, 3000);
        }

        // ⚔️ 13. ОНЛАЙН ВОЕННЫЙ ЗАХВАТ ЧУЖИХ ГОРОДОВ И АЭРОПОРТОВ С СЕРВЕРА
        // ⚔️ 10. ОНЛАЙН ВОЕННЫЙ ЗАХВАТ ЧУЖИХ ГОРОДОВ И АЭРОПОРТОВ С СЕРВЕРА
        function handleExpansion(layer) {
            const currentTotalPop = myCities.reduce((sum, c) => sum + c.population, 0) || 1;
            const myArmy = Math.floor(currentTotalPop * 0.10);

            let enemyCitiesInArea = [];
            let enemyAirportsInArea = [];
            let totalEnemyPopulation = 0;
            let targetPlayerId = null;

            for (let markerId in worldMarkers) {
                const marker = worldMarkers[markerId];
                const markerLatLng = marker.getLatLng();

                if (isPointInPolygon(markerLatLng, layer)) {
                    const isMyCity = myCities.some(c => c.id === markerId);
                    const isMyAp = myAirports.some(a => a.id === markerId);

                    if (!isMyCity && !isMyAp) {
                        if (markerId.startsWith("city_")) {
                            enemyCitiesInArea.push(markerId);
                            
                            // Получаем текстовое содержимое тултипа
                            const tooltipContent = marker.getTooltip().getContent();
                            // Регулярное выражение для поиска цифр населения
                            const popMatch = tooltipContent.match(/\((\d+[\s\d]*)\s*чел\)/);
                            
                            // 🌟 ИСПРАВЛЕНО: Извлекаем строку из первой группы массива popMatch[1]
                            if (popMatch && popMatch[1]) {
                                const popString = popMatch[1].replace(/\s/g, ''); // Чистим пробелы
                                totalEnemyPopulation += parseInt(popString, 10);
                            }
                            
                            if (marker.options && marker.options.ownerId) targetPlayerId = marker.options.ownerId;
                        } else if (markerId.startsWith("ap_")) {
                            enemyAirportsInArea.push(markerId);
                            if (marker.options && marker.options.ownerId) targetPlayerId = marker.options.ownerId;
                        }
                    }
                }
            }

            if (myArmy >= totalEnemyPopulation) {
                drawnItems.addLayer(layer);
                borderLayers.push(layer);
                layer.setStyle({ color: '#ff2a2a', weight: 4, fillColor: '#ff2a2a', fillOpacity: 0.15 });

                if (enemyCitiesInArea.length > 0 || enemyAirportsInArea.length > 0) {
                    ws.send(JSON.stringify({
                        type: "annex_territory",
                        target_player_id: targetPlayerId,
                        city_ids: enemyCitiesInArea,
                        airport_ids: enemyAirportsInArea
                    }));
                    
                    Swal.fire("Территория аннексирована! 🎖️", `Захвачено городов: ${enemyCitiesInArea.length}, аэропортов: ${enemyAirportsInArea.length}. Чужое население подчинено!`, "success");
                } else {
                    Swal.fire("Земли расширены! 📈", "Вы успешно закрепили за собой новые нейтральные территории.", "success");
                }

                sendInfrastructureUpdate();
            } else {
                map.removeLayer(layer);
                Swal.fire("Атака отбита! 🛑", `Вам не хватает военной мощи! Население врага в зоне (${totalEnemyPopulation} чел) превосходит силы вашей армии (${myArmy} бойцов).`, "error");
            }
        }

        // 🧮 14. МАТЕМАТИЧЕСКАЯ ФУНКЦИЯ ПРОВЕРКИ ТОЧКИ ВНУТРИ ПОЛИГОНА (Ray-Casting Algorithm)
        function isPointInPolygon(latlng, layer) {
            let polygon = layer.getLatLngs();
            
            // Защита: Раскрываем вложенные массивы Leaflet геометрии полигонов (многомерные массивы)
            if (polygon && polygon[0] && Array.isArray(polygon[0])) {
                polygon = polygon[0];
            }
            
            // Если полигон обернут еще глубже (например, при сложной разметке плагина Draw)
            if (polygon && polygon[0] && polygon[0].lat === undefined && Array.isArray(polygon[0])) {
                polygon = polygon[0];
            }
            
            const x = latlng.lat;
            const y = latlng.lng;
            let inside = false;
            
            // Алгоритм пускания луча (Ray-Casting) для точного поиска пересечений с ребрами границ
            for (let i = 0, j = polygon.length - 1; i < polygon.length; j = i++) {
                const xi = polygon[i].lat, yi = polygon[i].lng;
                const xj = polygon[j].lat, yj = polygon[j].lng;
                
                const intersect = ((yi > y) !== (yj > y))
                    && (x < (xj - xi) * (y - yi) / (yj - yi) + xi);
                if (intersect) inside = !inside;
            }
            return inside;
        }
                // 📋 15. ПЕРЕКЛЮЧЕНИЕ ВИДИМОСТИ ЛИДЕРБОРДА ROBLOX
        function toggleRobloxLeaderboard() {
            const board = document.getElementById('robloxBoard');
            if (board.style.display === 'none') {
                board.style.display = 'flex';
                board.style.opacity = '1';
            } else {
                board.style.display = 'none';
                board.style.opacity = '0';
            }
        }

        // 📋 16. ДИНАМИЧЕСКИЙ РЕНДЕРИНГ ТАБЛИЦЫ ИГРОКОВ (ВЫЗЫВАЕТСЯ ИЗ СИНХРОНИЗАЦИИ)
        function updateRobloxLeaderboardUI(players) {
            const container = document.getElementById('leaderboardPlayersContainer');
            container.innerHTML = ""; // Очищаем старые строки

            for (let pid in players) {
                const pData = players[pid];
                const isMe = (pid === clientId);
                
                // Создаем строку для таблицы
                const row = document.createElement('div');
                row.className = isMe ? 'leaderboard-row me' : 'leaderboard-row';

                let displayName = "Гость (Подключение)";
                let displayArmy = "N/A"; // Твоё условие для игроков без страны

                // Если игрок уже создал империю
                if (pData.country) {
                    displayName = pData.country.name;
                    const totalPop = pData.cities.reduce((sum, c) => sum + c.population, 0) || 1;
                    displayArmy = Math.floor(totalPop * 0.10).toLocaleString();
                }

                row.innerHTML = `
                    <span class="name">${isMe ? '👉 ' : ''}${displayName}</span>
                    <span class="stat">${displayArmy}</span>
                `;
                container.appendChild(row);
            }
        }
    </script>
