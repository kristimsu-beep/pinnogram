<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinnogram | STAFF PORTAL</title>
    <style>
        :root {
            --bg: #0a0a0c;
            --panel: #121216;
            --accent: #00ff00;
            --neon-blue: #00f0ff;
            --neon-pink: #ff007f;
            --text: #ffffff;
        }
        body {
            margin: 0; background: var(--bg); color: var(--text);
            font-family: 'Segoe UI', monospace; overflow-x: hidden;
        }
        .header {
            padding: 20px 40px; text-align: center; border-bottom: 1px solid rgba(0,255,0,0.2);
            box-shadow: 0 0 20px rgba(0,255,0,0.05); display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px);
        }
        .header h1 { margin: 0; font-size: 24px; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; }
        
        /* ТУМБЛЕР ПЕРЕКЛЮЧЕНИЯ РАЗДЕЛОВ */
        .nav-tabs { display: flex; gap: 15px; margin-left: 30px; }
        .tab-btn { background: none; border: 1px solid #333; color: rgba(255,255,255,0.6); padding: 8px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 11px; letter-spacing: 1px; transition: 0.2s; }
        .tab-btn.active { color: var(--accent); border-color: var(--accent); box-shadow: 0 0 10px rgba(0,255,0,0.2); background: rgba(0,255,0,0.02); }
        .tab-btn:hover { border-color: var(--neon-blue); color: var(--neon-blue); }

        .auth-block { display: flex; align-items: center; gap: 15px; }
        .discord-btn { background: #5865F2; color: white; border: none; padding: 10px 18px; border-radius: 10px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 12px; transition: 0.2s; text-decoration: none; box-shadow: 0 0 10px rgba(88,101,242,0.3); }
        .discord-btn:hover { background: #4752C4; box-shadow: 0 0 15px rgba(88,101,242,0.5); }
        .user-badge { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.03); padding: 5px 12px; border-radius: 20px; border: 1px solid #333; }
        .user-badge img { width: 26px; height: 26px; border-radius: 50%; border: 1px solid var(--neon-blue); }
        .logout-btn { color: #ff3b30; text-decoration: none; font-size: 11px; margin-left: 5px; font-weight: bold; }
        
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .page-section { display: none; }
        .page-section.active { display: block; }

        /* ВЕРСТКА КАРТОЧЕК ПЕРСОНАЛА */
        .staff-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 25px; }
        .card { background: var(--panel); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 20px; text-align: center; cursor: pointer; transition: 0.3s cubic-bezier(0.1, 0.8, 0.2, 1); position: relative; overflow: hidden; }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); box-shadow: 0 10px 25px rgba(0,255,0,0.15); }
        .card img { width: 100px; height: 100px; border-radius: 50%; border: 2px solid var(--neon-blue); object-fit: cover; margin-bottom: 12px; }
        .card h3 { margin: 5px 0; font-size: 18px; }
        .card p { margin: 5px 0 8px; font-size: 11px; text-transform: uppercase; color: var(--accent); background: rgba(0,255,0,0.05); padding: 4px 10px; border-radius: 20px; display: inline-block; }
        .card-rating { font-size: 12px; color: #ffcc00; display: flex; align-items: center; justify-content: center; gap: 4px; font-weight: bold; }

        /* ВЕРСТКА ТАБЛИЦЫ ОБРАЩЕНИЙ */
        .ticket-top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .action-btn-neon { background: none; border: 1px solid var(--neon-blue); color: var(--neon-blue); padding: 10px 25px; border-radius: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; font-size: 12px; box-shadow: 0 0 10px rgba(0,240,255,0.1); transition: 0.2s; }
        .action-btn-neon:hover { background: var(--neon-blue); color: #000; box-shadow: 0 0 20px rgba(0,240,255,0.4); }
        
        .ticket-list { display: flex; flex-direction: column; gap: 15px; }
        .ticket-row { background: var(--panel); border: 1px solid rgba(255,255,255,0.03); padding: 15px 25px; border-radius: 14px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.2s; }
        .ticket-row:hover { border-color: var(--neon-blue); background: rgba(0,240,255,0.01); }
        .ticket-meta { display: flex; align-items: center; gap: 15px; }
        .ticket-meta img { width: 36px; height: 36px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.1); }
        
        /* НЕОНОВЫЕ СТАТУСЫ */
        .badge-status { padding: 4px 12px; border-radius: 20px; font-size: 10px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        .status-open { background: rgba(0,240,255,0.1); color: var(--neon-blue); border: 1px solid var(--neon-blue); }
        .status-progress { background: rgba(255,204,0,0.1); color: #ffcc00; border: 1px solid #ffcc00; }
        .status-approved { background: rgba(0,255,0,0.1); color: var(--accent); border: 1px solid var(--accent); }
        .status-rejected { background: rgba(255,0,0,0.1); color: #ff3b30; border: 1px solid #ff3b30; }

        /* МОДАЛЬНЫЕ ОКНА И ФОРМЫ */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); z-index: 99999; align-items: center; justify-content: center; }
        .modal-content { background: var(--panel); border: 2px solid var(--neon-blue); width: 90%; max-width: 650px; border-radius: 24px; padding: 30px; position: relative; box-shadow: 0 0 40px rgba(0,240,255,0.1); max-height: 90vh; overflow-y: auto; }
        .close-btn { position: absolute; top: 20px; right: 20px; background: none; border: none; color: white; font-size: 24px; cursor: pointer; opacity: 0.6; }
        .close-btn:hover { opacity: 1; color: red; }
        
        .profile-header { text-align: center; margin-bottom: 20px; }
        .profile-header img { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--accent); }
        .reviews-section { max-height: 180px; overflow-y: auto; margin-bottom: 20px; border-top: 1px dashed #333; padding-top: 15px; }
        .review-item { background: rgba(255,255,255,0.02); padding: 10px 15px; border-radius: 8px; margin-bottom: 10px; border-left: 2px solid var(--accent); }
        .review-meta { display: flex; justify-content: space-between; font-size: 10px; opacity: 0.5; }
        
        .star-rating-input { display: flex; gap: 6px; margin-bottom: 12px; justify-content: center; font-size: 24px; }
        .star-btn { cursor: pointer; color: #333; transition: 0.1s; user-select: none; }
        .star-btn.active { color: #ffcc00; text-shadow: 0 0 8px rgba(255,204,0,0.4); }

        select, textarea { width: 100%; background: #000; border: 1px solid #333; color: white; padding: 12px; border-radius: 8px; margin-bottom: 15px; outline: none; box-sizing: border-box; font-family: inherit; }
        .form-btn { width: 100%; background: var(--accent); color: black; font-weight: bold; border: none; padding: 14px; border-radius: 10px; cursor: pointer; text-transform: uppercase; font-family: monospace; letter-spacing: 1px; font-size: 13px; }
        
        /* ПРЕВЬЮ ФОТО */
        .photo-preview-box { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }
        .thumb-preview { width: 70px; height: 70px; border-radius: 6px; object-fit: cover; border: 1px solid #333; position: relative; }
        .ticket-gallery img { width: 100px; height: 70px; object-fit: cover; border-radius: 8px; border: 1px solid #333; cursor: pointer; margin-right: 8px; transition: 0.2s; }
        .ticket-gallery img:hover { border-color: var(--neon-blue); transform: scale(1.05); }
    </style>
</head>
<body>

    <div class="header">
        <div style="display: flex; align-items: center;">
            <h1 onclick="switchSection('staff')">Pinnogram</h1>
            <div class="nav-tabs">
                <button class="tab-btn active" id="tab-staff" onclick="switchSection('staff')">🏛️ Администрация и отзывы</button>
                <button class="tab-btn" id="tab-tickets" onclick="switchSection('tickets')">🎫 Раздел Обращений</button>
            </div>
        </div>
        <div class="auth-block" id="auth-zone"></div>
    </div>

    <div class="container">
        
        <!-- РАЗДЕЛ А: АДМИНИСТРАЦИЯ И ОТЗЫВЫ -->
        <div id="section-staff" class="page-section active">
            <div class="staff-grid" id="staff-container"></div>
        </div>

        <!-- РАЗДЕЛ Б: СПИСОК ОБРАЩЕНИЙ -->
        <div id="section-tickets" class="page-section" style="display: none;">
            <div class="ticket-top-bar" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="margin:0; font-size:18px; letter-spacing:1px;">📋 РЕЕСТР ЖАЛОБ И ЗАЯВЛЕНИЙ:</h2>
                <!-- ИСПРАВЛЕНО: Кнопка вызова модального окна -->
                <button class="action-btn-neon" onclick="openCreateTicketModal()" style="background: var(--accent); color: black; border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer;">➕ Создать обращение</button>
            </div>
            <div class="ticket-list" id="tickets-container"></div>
        </div>

        <!-- 🎯 РАЗДЕЛ В: ПРОСМОТР КОНКРЕТНОГО ОБРАЩЕНИЯ ПО ССЫЛКЕ (ИСПРАВЛЕН ID И ВНУТРЕННЯЯ СТРУКТУРА) -->
        <div id="section-ticket-view" class="page-section" style="display: none;">
            <button class="tab-btn" onclick="switchSection('tickets')" style="margin-bottom:20px; background: none; border: 1px solid #333; color: white; padding: 8px 16px; border-radius: 8px; cursor: pointer;">← Назад в список</button>
            
            <div style="background:var(--panel); border:1px solid #222; border-radius:20px; padding:30px; box-shadow:0 0 30px rgba(0,0,0,0.5);">
                <!-- 🛠️ ЭТИ ЧЕТЫРЕ БЛОКА ОБЯЗАТЕЛЬНО ИЩЕТ СКРИПТ ДЛЯ ВЫВОДА ТИ КЕТА: -->
                <div id="view-meta" style="font-size: 12px; opacity: 0.6; line-height: 1.6; margin-bottom: 15px; border-bottom: 1px dashed #222; padding-bottom: 15px;"></div>
                <div id="view-text" style="font-size: 15px; font-weight: bold; line-height: 1.5; margin-bottom: 25px; white-space: pre-wrap;"></div>
                <div id="view-gallery" style="display: flex; gap: 15px; flex-wrap: wrap; margin-bottom: 25px;"></div>
                <div id="view-actions" style="margin-top: 20px; border-top: 1px dashed #222; padding-top: 20px;"></div>
            </div>
        </div>


    <!-- МОДАЛЬНОЕ ОКНО ОТЗЫВОВ О МОДЕРАТОРЕ -->
    <div class="modal" id="profile-modal">
        <div class="modal-content">
            <button class="close-btn" onclick="closeProfileModal()">✕</button>
            <div class="profile-header">
                <img id="modal-avatar" src="">
                <h2 id="modal-name" style="margin: 5px 0 0;">Ник</h2>
                <p id="modal-role"></p>
            </div>
            <h3 style="margin: 0 0 10px; font-size: 13px; opacity: 0.7; letter-spacing: 1px;">📋 ОТЗЫВЫ СОСТАВА:</h3>
            <div class="reviews-section" id="reviews-container"></div>
            <div class="review-form">
                <h3 style="margin: 0 0 10px; font-size: 13px; opacity: 0.7; letter-spacing: 1px;">✍️ ВАША ОЦЕНКА РАБОТЫ:</h3>
                <div class="star-rating-input" id="star-selector">
                    <span class="star-btn active" data-value="1" onclick="setFormRating(1)">★</span>
                    <span class="star-btn active" data-value="2" onclick="setFormRating(2)">★</span>
                    <span class="star-btn active" data-value="3" onclick="setFormRating(3)">★</span>
                    <span class="star-btn active" data-value="4" onclick="setFormRating(4)">★</span>
                    <span class="star-btn active" data-value="5" onclick="setFormRating(5)">★</span>
                </div>
                <textarea id="review-text" rows="3" placeholder="Напишите ваш подробный отзыв о качестве работы сотрудника..."></textarea>
                <button class="form-btn" onclick="submitForumReview()">Опубликовать вердикт</button>
            </div>
        </div>
    </div>

    <!-- ТВОЕ ОКНО ПОДАЧИ ОБРАЩЕНИЯ (ОБНОВИ КНОПКИ ВНУТРИ) -->
    <div id="ticket-modal" class="modal">
        <div class="modal-content">
            <!-- ✕ ИСПРАВЛЕНО: closeTicketModal вместо closeCreateTicketModal -->
            <button class="close-btn" onclick="closeTicketModal()">✕</button>
            
            <h2>■ ПОДАЧА НОВОГО ОБРАЩЕНИЯ</h2>
            
            <label>Категория жалобы:</label>
            <select id="ticket-type">
                <option value="user">👤 Жалоба на участника сервера</option>
                <option value="staff">🚨 Жалоба на администратора</option>
            </select>
    
            <label>Суть нарушения (описание):</label>
            <textarea id="ticket-text" rows="4" placeholder="тест"></textarea>
    
            <!-- 📷 ИСПРАВЛЕНО: убрали handleTicketFilesUpload, оставили чистый input -->
            <label class="file-label">
                <input type="file" id="ticket-photos" multiple accept="image/*" style="display:none;">
                📸 ПРИКРЕПИТЬ СКРИНШОТЫ
            </label>
    
            <!-- 🚀 ИСПРАВЛЕНО: submitForumTicket вместо submitNewTicket -->
            <button onclick="submitForumTicket()" style="background:var(--neon-blue); color:black;">ОТПРАВИТЬ ОБРАЩЕНИЕ МОДЕРАТОРАМ</button>
        </div>
    </div>

    <script>

        const API_URL = window.location.origin;
        let selectedStaffId = null;
        let currentSelectedRating = 5;
        let currentSection = "staff"; // Режимы: "staff", "tickets", "ticket_view"
        let activeTicketId = null;

        // 🎯 СУПЕР-ФИКС: Простой разбор кук без ломающих регулярных выражений
        function getCookie(name) {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${name}=`);
            if (parts.length === 2) {
                return decodeURIComponent(parts.pop().split(';').shift()).trim();
            }
            return undefined;
        }

        // 🎯 СУПЕР-ФИКС ИНТЕРФЕЙСА: Полная очистка системного мусора из строк
        function updateAuthInterface() {
            const authZone = document.getElementById("auth-zone");
            if (!authZone) return;
            
            let userName = getCookie("forum_user_name");
            let userAvatar = getCookie("forum_user_avatar");

            // Защита от системных склеек: если в куку пролез мусор через запятую, отсекаем его
            if (userName && userName.includes(",")) {
                userName = userName.split(",")[0].trim();
            }
            if (userAvatar && userAvatar.includes(",")) {
                userAvatar = userAvatar.split(",")[0].trim();
            }

            if (userName && userAvatar && userAvatar !== "undefined") {
                // Выводим кристально чистый ник и рабочую аватарку
                authZone.innerHTML = `
                    <div class="user-badge" style="display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.03); padding: 5px 12px; border-radius: 20px; border: 1px solid #333;">
                        <img src="${userAvatar}" onerror="this.src='https://i.ibb.co/4pSbxsh/user-avatar.png'" style="width: 26px; height: 26px; border-radius: 50%; border: 1px solid var(--neon-blue); object-fit: cover;">
                        <span style="font-size:12px; font-weight:bold; color: var(--text);">${userName}</span>
                        <a href="${API_URL}/api/forum/auth/logout" class="logout-btn" style="color: #ff3b30; text-decoration: none; font-size: 11px; margin-left: 5px; font-weight: bold;">✕ Выйти</a>
                    </div>
                `;
            } else {
                // Если гость — выводим кнопку с идеальной геометрией SVG
                authZone.innerHTML = `
                    <a href="${API_URL}/api/forum/auth/login" class="discord-btn">
                        <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16" style="display:inline-block; vertical-align:middle;">
                            <path d="M13.545 2.907a13.227 13.227 0 0 0-3.257-1.011.05.05 0 0 0-.052.025c-.141.25-.297.577-.406.833a12.212 12.212 0 0 0-3.658 0 8.258 8.258 0 0 0-.412-.833.051.051 0 0 0-.052-.025c-1.125.194-2.22.534-3.257 1.011a.041.041 0 0 0-.021.018C.356 6.024-.213 9.047.066 12.032a.04.04 0 0 0 .016.028a13.283 13.283 0 0 0 3.995 2.02a.05.05 0 0 0 .056-.018c.308-.42.582-.863.818-1.322a.05.05 0 0 0-.028-.069a8.726 8.726 0 0 1-1.247-.594a.05.05 0 0 1-.005-.085a6.052 6.052 0 0 0 .322-.252a.051.051 0 0 1 .053-.007c2.442 1.115 5.088 1.115 7.502 0a.051.051 0 0 1 .053.007c.114.086.221.17.322.252a.05.05 0 0 1-.005.085c-.392.234-.81.433-1.247.594a.05.05 0 0 0-.028.07c.24.46.513.903.819 1.32a.05.05 0 0 0 .056.019a13.21 13.21 0 0 0 4.001-2.02a.049.049 0 0 0 .016-.027c.385-3.418-.635-6.417-2.399-9.117a.042.042 0 0 0-.02-.019ZM5.14 9.473c-.785 0-1.431-.722-1.431-1.607 0-.885.632-1.607 1.43-1.607.807 0 1.443.73 1.432 1.607 0 .885-.625 1.607-1.431 1.607Zm4.515 0c-.785 0-1.43-.722-1.43-1.607 0-.885.632-1.607 1.43-1.607.807 0 1.443.73 1.431 1.607 0 .885-.624 1.607-1.43 1.607Z"/>
                        </svg>
                        Войти через Discord
                    </a>
                `;
            }
        }


        // Переключение разделов меню (Вкладки сверху)
        function switchSection(sectionName) {
            currentSection = sectionName;
            
            // Смена активного класса на кнопках навигации
            document.querySelectorAll(".nav-tab").forEach(tab => tab.classList.remove("active"));
            const targetTab = document.getElementById(`tab-${sectionName}`);
            if (targetTab) targetTab.classList.add("active");

            // Смена видимости экранов
            document.getElementById("section-staff").style.display = (sectionName === "staff") ? "block" : "none";
            document.getElementById("section-tickets").style.display = (sectionName === "tickets") ? "block" : "none";
            document.getElementById("section-ticket-view").style.display = (sectionName === "ticket_view") ? "block" : "none";

            // Автозагрузка данных для выбранной вкладки
            if (sectionName === "staff") loadStaffForum();
            if (sectionName === "tickets") loadTicketsList();
        }

        // --- ЛОГИКА ВКЛАДКИ 1: ПЕРСОНАЛ И ОТЗЫВЫ ---
        async function loadStaffForum() {
            const container = document.getElementById("staff-container");
            if (!container) return;
            container.textContent = "Синхронизация с серверами Discord...";
            
            try {
                const res = await fetch(`${API_URL}/api/forum/staff`);
                const staff = await res.json();
                container.textContent = "";
                
                if (!staff || staff.length === 0) {
                    container.innerHTML = "<div style='opacity:0.5;'>⚠️ Персонал не обнаружен. Проверьте DISCORD_BOT_TOKEN.</div>";
                    return;
                }
                
                staff.forEach(u => {
                    const card = document.createElement("div");
                    card.className = "card";
                    card.onclick = () => openProfileModal(u.id, u.name, u.avatar, u.role);
                    
                    const img = document.createElement("img");
                    img.src = u.avatar;
                    
                    const h3 = document.createElement("h3");
                    h3.textContent = u.name;
                    
                    const p = document.createElement("p");
                    p.textContent = u.role;
                    
                    const ratingDiv = document.createElement("div");
                    ratingDiv.className = "card-rating";
                    ratingDiv.innerHTML = `★ ${u.rating} <span style="opacity:0.4; font-size:10px; font-weight:normal; margin-left:2px;">(${u.reviews})</span>`;
                    
                    card.appendChild(img);
                    card.appendChild(h3);
                    card.appendChild(p);
                    card.appendChild(ratingDiv);
                    container.appendChild(card);
                });
            } catch (e) {
                container.textContent = "🔴 Ошибка подключения к облачному шлюзу FastAPI";
            }
        }

        function setFormRating(val) {
            currentSelectedRating = val;
            const stars = document.querySelectorAll("#star-selector .star-btn");
            stars.forEach(s => {
                const sVal = parseInt(s.getAttribute("data-value"));
                if (sVal <= val) s.classList.add("active");
                else s.classList.remove("active");
            });
        }

        async function openProfileModal(id, name, avatar, role) {
            selectedStaffId = id;
            setFormRating(5);
            
            document.getElementById("modal-avatar").src = avatar;
            document.getElementById("modal-name").textContent = name;
            document.getElementById("modal-role").textContent = role;
            
            const reviewsContainer = document.getElementById("reviews-container");
            reviewsContainer.textContent = "Подгрузка оценок из базы aiosqlite...";
            
            try {
                const res = await fetch(`${API_URL}/api/forum/reviews/${id}`);
                const reviews = await res.json();
                reviewsContainer.textContent = "";
                
                if (reviews.length === 0) {
                    reviewsContainer.innerHTML = "<div style='opacity:0.4; font-size:11px; text-align:center; padding:20px 0;'>У сотрудника нет оценок. Станьте первым!</div>";
                } else {
                    reviewsContainer.innerHTML = reviews.map(r => {
                        const starsGold = "★".repeat(r.rating) + "☆".repeat(5 - r.rating);
                        return `
                            <div class="review-item">
                                <div class="review-meta">
                                    <b>${r.author}</b>
                                    <span style="color:#ffcc00; font-weight:bold; font-family:monospace; font-size:11px;">${starsGold}</span>
                                    <span>${r.time}</span>
                                </div>
                                <div style="font-size:12px; margin-top:5px; opacity:0.85; line-height:1.4;">${r.text}</div>
                            </div>
                        `;
                    }).join("");
                }
            } catch (e) { reviewsContainer.textContent = "Ошибка загрузки реестра отзывов."; }
            document.getElementById("profile-modal").style.display = "flex";
        }

        function closeProfileModal() {
            document.getElementById("profile-modal").style.display = "none";
            document.getElementById("review-text").value = "";
        }

        async function submitForumReview() {
            const loggedName = getCookie("forum_user_name");
            if (!loggedName) return alert("🔒 Для публикации отзыва необходимо авторизоваться через аккаунт Discord!");
            
            const text = document.getElementById("review-text").value.trim();
            if (!text) return alert("Пожалуйста, напишите текст вашего вердикта!");
            
            try {
                const res = await fetch(`${API_URL}/api/forum/review`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ target_id: selectedStaffId, author: loggedName, text: text, rating: currentSelectedRating })
                });
                const data = await res.json();
                if (data.status === "ok") {
                    alert(data.message);
                    closeProfileModal();
                    loadStaffForum();
                } else { alert("Сбой: " + data.message); }
            } catch (e) { alert("Не удалось зафиксировать отзыв на сервере."); }
        }
        // --- ЛОГИКА ВКЛАДКИ 2: ОБРАЩЕНИЯ И ЖАЛОБЫ ---
        function openCreateTicketModal() {
            const loggedName = getCookie("forum_user_name");
            if (!loggedName) return alert("🔒 Подавать обращения могут только авторизованные пользователи через Discord!");
            document.getElementById("ticket-modal").style.display = "flex";
        }

        function closeTicketModal() {
            document.getElementById("ticket-modal").style.display = "none";
            document.getElementById("ticket-text").value = "";
            document.getElementById("ticket-photos").value = "";
        }

        async function submitForumTicket() {
            const type = document.getElementById("ticket-type").value;
            const text = document.getElementById("ticket-text").value.trim();
            const photoInput = document.getElementById("ticket-photos");

            if (!text) return alert("Пожалуйста, опишите суть вашего обращения!");
            if (photoInput.files.length > 5) return alert("Максимально разрешено прикрепить не более 5 скриншотов!");

            const formData = new FormData();
            formData.append("type", type);
            formData.append("text", text);
            
            for (let i = 0; i < photoInput.files.length; i++) {
                formData.append("photos", photoInput.files[i]);
            }

            try {
                const res = await fetch(`${API_URL}/api/forum/tickets/create`, {
                    method: "POST",
                    body: formData
                });
                const data = await res.json();
                if (data.status === "ok") {
                    alert(`Обращение успешно создано под номером POST_${data.ticket_id}!`);
                    closeTicketModal();
                    loadTicketsList();
                } else { alert("Ошибка создания обращения: " + data.message); }
            } catch (e) { alert("Сбой отправки обращения на сервер."); }
        }

        async function loadTicketsList() {
            const container = document.getElementById("tickets-container");
            if (!container) return;
            container.textContent = "Обновление реестра жалоб...";

            try {
                const res = await fetch(`${API_URL}/api/forum/tickets/list`);
                const tickets = await res.json();
                container.textContent = "";

                if (tickets.length === 0) {
                    container.innerHTML = "<div style='grid-column:1/-1; text-align:center; opacity:0.4; padding:40px 0;'>Реестр пуст. Обращений в систему пока не поступало.</div>";
                    return;
                }

                tickets.forEach(t => {
                    const box = document.createElement("div");
                    box.className = `ticket-row-box status-${t.status}`;
                    box.onclick = () => viewSpecificTicket(t.id);

                    let statusLabel = "⏳ На рассмотрении";
                    if (t.status === "processing") statusLabel = "⚙️ В работе у: " + t.moderator;
                    if (t.status === "approved") statusLabel = "✅ Одобрено: " + t.moderator;
                    if (t.status === "rejected") statusLabel = "❌ Отклонено: " + t.moderator;

                    box.innerHTML = `
                        <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                            <span class="t-badge">${t.type === "user" ? "👤 Жалоба на игрока" : "🚨 Жалоба на админа"}</span>
                            <span style="font-size:11px; opacity:0.4; font-family:monospace;">#POST_${t.id}</span>
                        </div>
                        <div style="font-size:13px; font-weight:bold; margin-bottom:12px; opacity:0.9; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;">${t.text}</div>
                        <div style="display:flex; justify-content:space-between; align-items:center; font-size:11px;">
                            <span style="opacity:0.5;">Отправитель: <b>${t.author}</b></span>
                            <span style="font-weight:bold;">${statusLabel}</span>
                        </div>
                    `;
                    container.appendChild(box);
                });
            } catch (e) { container.textContent = "Не удалось связаться с базой данных обращений."; }
        }
        // --- ПРОСМОТР КОНКРЕТНОГО ОБРАЩЕНИЯ ---
        async function viewSpecificTicket(id) {
            activeTicketId = id;
            switchSection("ticket_view");

            const textBlock = document.getElementById("view-text");
            const metaBlock = document.getElementById("view-meta");
            const gallery = document.getElementById("view-gallery");
            const actions = document.getElementById("view-actions");

            textBlock.textContent = "Загрузка параметров обращения...";
            gallery.innerHTML = "";
            actions.innerHTML = "";

            try {
                const res = await fetch(`${API_URL}/api/forum/tickets/get/${id}`);
                const t = await res.json();

                if (!t || t.error) {
                    textBlock.textContent = "🛑 Запрошенное обращение не найдено в базе данных.";
                    return;
                }

                textBlock.textContent = t.text;
                let statusLabel = "⏳ Ожидает рассмотрения";
                if (t.status === "processing") statusLabel = "⚙️ Взято в работу сотрудником: " + t.moderator;
                if (t.status === "approved") statusLabel = "✅ Данное обращение ОДОБРЕНО (" + t.moderator + ")";
                if (t.status === "rejected") statusLabel = "❌ Данное обращение ОТКЛОНЕНО (" + t.moderator + ")";

                metaBlock.innerHTML = `
                    ID Обращения: <b>#POST_${t.id}</b> | 
                    Тип: <b>${t.type === "user" ? "Жалоба на игрока" : "Жалоба на администратора"}</b><br>
                    Автор заявления: <b>${t.author}</b> | Дата: <b>${t.time}</b><br>
                    Текущий статус: <span style="color:var(--accent); font-weight:bold;">${statusLabel}</span>
                `;

                if (t.photos && t.photos.length > 0) {
                    gallery.innerHTML = t.photos.map(pUrl => `
                        <img src="${pUrl}" class="t-photo" onclick="window.open('${pUrl}', '_blank')" title='Кликните, чтобы открыть оригинал'>
                    `).join("");
                } else {
                    gallery.innerHTML = "<div style='opacity:0.3; font-size:12px;'>Доказательства в виде изображений отсутствуют.</div>";
                }

                if (t.status === "open") {
                    actions.innerHTML = `<button class="act-btn btn-work" onclick="updateTicketStatus('processing')">💼 Взять обращение в работу</button>`;
                } else if (t.status === "processing") {
                    actions.innerHTML = `
                        <button class="act-btn btn-approve" onclick="updateTicketStatus('approved')">✅ Одобрить обращение</button>
                        <button class="act-btn btn-reject" onclick="updateTicketStatus('rejected')">❌ Отклонить обращение</button>
                    `;
                } else {
                    actions.innerHTML = `<div style='opacity:0.4; font-size:12px; font-weight:bold;'>🔒 Дело закрыто модерацией. Изменение статуса недоступно.</div>`;
                }

            } catch (e) { textBlock.textContent = "Ошибка получения данных из файлового хранилища."; }
        }

        async function updateTicketStatus(newStatus) {
            try {
                const res = await fetch(`${API_URL}/api/forum/tickets/status`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ ticket_id: activeTicketId, status: newStatus })
                });
                const data = await res.json();
                if (data.status === "ok") {
                    alert(data.message);
                    viewSpecificTicket(activeTicketId);
                } else { alert("Отказ в доступе: " + data.message); }
            } catch (e) { alert("Сбой изменения статуса дела."); }
        }

        // Автозапуск дефолтной страницы при загрузке
        loadStaffForum();
        updateAuthInterface();
    </script>
</body>
</html>
