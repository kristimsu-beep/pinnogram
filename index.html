<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pinnogram Ultimate</title>
<style>
    :root { --bg: #121212; --panel: #1e1e1e; --text: white; --msg-in: #2a2a2a; --msg-out: #0088cc; --accent: #00aaff; }
    .light-theme { --bg: #f0f2f5; --panel: #ffffff; --text: #1c1e21; --msg-in: #e4e6eb; --msg-out: #0084ff; --accent: #0073e6; }
    * { box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; height: 100vh; margin: 0; transition: 0.3s; overflow: hidden; }

    /* Кнопки */
    button { background: var(--msg-out); color: white; border: none; padding: 12px 20px; border-radius: 12px; cursor: pointer; font-weight: bold; transition: 0.2s; }
    
    /* Исправленный блок кнопок: теперь идеально круглые */
    .controls button, .file-btn, .rec-btn { 
        width: 42px; /* Уменьшил до 42px, чтобы точно всё влезло на Xiaomi */
        height: 42px; 
        flex-shrink: 0; /* ЗАПРЕТ НА СПЛЮЩИВАНИЕ */
        padding: 0; 
        border-radius: 50% !important; 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        font-size: 18px; 
        border: none;
        cursor: pointer;
    }

    /* Фикс для аватарки в кнопках */
    #user-avatar-icon {
        width: 40px;
        height: 40px;
        flex-shrink: 0; 
        border-radius: 50%;
        object-fit: cover;
        border: 2px solid var(--accent);
    }

    #login-screen { margin: auto; background: var(--panel); padding: 30px; border-radius: 20px; text-align: center; width: 90%; max-width: 350px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
    #login-screen input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #444; background: #222; color: white; outline: none; }
    /* Контекстное меню сообщения */
    .context-menu {
        display: none;
        position: fixed;
        z-index: 10000;
        background: #1c1c1c;
        border: 1px solid #333;
        border-radius: 12px;
        padding: 5px;
        width: 170px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        animation: menuPop 0.2s ease-out;
    }
    
    @keyframes menuPop {
        from { opacity: 0; transform: scale(0.9); }
        to { opacity: 1; transform: scale(1); }
    }
    
    .menu-item {
        padding: 10px 12px;
        cursor: pointer;
        color: white;
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 14px;
        border-radius: 8px;
    }
    
    .menu-item:hover { background: rgba(255, 255, 255, 0.1); }
    
    /* Цитата ответа внутри сообщения */
    .reply-quote {
        background: rgba(0, 0, 0, 0.2);
        border-left: 3px solid var(--accent);
        padding: 4px 8px;
        margin-bottom: 6px;
        font-size: 12px;
        border-radius: 4px;
        cursor: pointer;
        text-overflow: ellipsis;
        overflow: hidden;
        white-space: nowrap;
    }

    #chat-screen { 
        display: none; 
        flex-direction: column; 
        width: 100%; 
        max-width: 600px; 
        /* dvh подстраивается под системные панели телефона */
        height: 100dvh; 
        /* Фиксируем, чтобы экран не "улетал" вверх */
        position: fixed; 
        top: 0;
        left: 50%;
        transform: translateX(-50%);
        background: var(--bg);
        padding: 10px;
        /* Учитываем вырез челки и жесты снизу */
        padding-top: env(safe-area-inset-top, 10px);
        padding-bottom: env(safe-area-inset-bottom, 15px);
        z-index: 100;
    }



    /* Пузыри сообщений */
    .msg { 
        padding: 10px 14px; 
        border-radius: 18px; 
        max-width: 75%; 
        font-size: 15px; 
        position: relative; 
        display: flex; 
        flex-direction: column; 
        box-shadow: 0 1px 2px rgba(0,0,0,0.2); 
        cursor: pointer;
        word-break: break-word; 
    }
    .msg-right { align-self: flex-end; background: var(--msg-out); color: white; border-bottom-right-radius: 4px; }
    .msg-left { align-self: flex-start; background: var(--msg-in); color: var(--text); border-bottom-left-radius: 4px; }
    .msg-row { display: flex; width: 100%; margin: 6px 0; gap: 8px; align-items: flex-end; }
    .msg-sender { font-size: 12px; font-weight: bold; margin-bottom: 2px; color: var(--accent); }
    .msg-time { font-size: 10px; opacity: 0.6; align-self: flex-end; margin-top: 4px; }
    .msg-text { display: block; line-height: 1.4; }

    /* Видео и фото */
    .msg video { 
        width: 220px; height: 220px; 
        object-fit: cover; 
        margin: 5px 0; 
        background: #000; 
        clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%); 
    }
    .msg img { max-width: 100%; border-radius: 12px; margin-top: 5px; }

    .emoji-bar { margin: 5px 0; display: flex; gap: 12px; font-size: 20px; user-select: none; padding-left: 5px; }
    .emoji-bar span { cursor: pointer; transition: 0.2s; }
    .emoji-bar span:hover { transform: scale(1.3); }

    /* Блок управления внизу */
    .controls { 
        margin-bottom: 10px; 
        display: flex; 
        gap: 6px; 
        width: 100%; 
        align-items: center; 
        padding: 0 5px; /* Боковые отступы, чтобы кнопки не улетали */
    }

    /* ФИНАЛЬНЫЙ ФИКС ТЕКСТОВОГО ПОЛЯ */
    .controls input { 
        flex: 1; 
        min-width: 0; /* Не дает текстовому полю вытеснять кнопки */
        padding: 12px 16px; 
        border-radius: 25px; 
        border: none; 
        background: var(--msg-in); 
        color: var(--text); 
        outline: none; 
        font-size: 16px; 
    }
    /* Стили для секретного окна админа */
       /* Стили для секретного окна админа - добавил перенос строк */
    #admin-panel {
        display: none;
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.95);
        color: #00ff00;
        padding: 20px;
        border-radius: 15px;
        border: 1px solid #00ff00;
        z-index: 20000;
        font-family: monospace;
        box-shadow: 0 0 20px rgba(0, 255, 0, 0.4);
        min-width: 280px;
        max-width: 90%; /* Чтобы не вылезало на узких экранах */
        word-wrap: break-word;
    }

    #chat { 
        flex: 1; 
        border: 1px solid rgba(255,255,255,0.05); 
        overflow-y: auto; 
        padding: 15px; 
        background: var(--panel); 
        border-radius: 15px; 
        display: flex; 
        flex-direction: column; 
        gap: 6px; 
        scroll-behavior: smooth; /* Плавный скролл */
    }

    #video-call-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:black; z-index:10000; }
    #remoteVideo {
        width: 100vw !important;
        height: 100vh !important;
        object-fit: cover;
        background: #000 !important;
        display: block !important;
        image-rendering: -webkit-optimize-contrast;
        backface-visibility: hidden;
        perspective: 1000;
        transform: translate3d(0,0,0); 
    }
    /* Добавляем отступ снизу для всего экрана, чтобы жесты смартфона ничего не перекрывали */
    #chat-screen {
        padding-bottom: env(safe-area-inset-bottom, 20px);
    }
    /* Боковая панель чатов */
    #sidebar {
        display: none; 
        position: fixed; 
        top: 0; left: 0; 
        width: 280px; height: 100%; 
        background: var(--panel); 
        z-index: 1200; 
        box-shadow: 5px 0 15px rgba(0,0,0,0.5); 
        padding: 20px; 
        border-right: 1px solid var(--accent);
        flex-direction: column;
    }
    
    /* Элемент списка контактов */
    .contact-item {
        padding: 12px; 
        margin-bottom: 8px; 
        background: var(--msg-in); 
        border-radius: 10px; 
        cursor: pointer; 
        transition: 0.2s;
        display: flex;
        align-items: center;
        gap: 10px;
    }
    .contact-item:hover { background: var(--accent); color: white; }
    .contact-active { border: 2px solid var(--accent); background: var(--msg-out); }
    /* Стили для галочек (is_read) */
    .msg-status {
        font-size: 12px;
        margin-left: 5px;
        color: rgba(255,255,255,0.5); /* Серая - доставлено */
    }
    .msg-status.read {
        color: #4fc3f7; /* Голубая - прочитано */
    }
    
    /* Стили для голосовых сообщений */
    .voice-msg {
        display: flex;
        align-items: center;
        gap: 12px;
        background: linear-gradient(135deg, #1d3557, #457b9d);
        padding: 10px 15px;
        border-radius: 20px 20px 20px 5px;
        min-width: 240px;
        color: white;
        box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }
    .play-btn {
        width: 36px; height: 36px;
        background: rgba(255,255,255,0.2);
        border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        cursor: pointer; font-size: 16px;
    }
    .voice-progress-wrap {
        flex: 1; display: flex; flex-direction: column; gap: 4px;
    }
    /* Симуляция волны (waveform) */
    .waveform {
        height: 20px; width: 100%;
        background: url('https://www.svgrepo.com/show/343167/waveform.svg') repeat-x;
        background-size: contain; opacity: 0.5;
        position: relative; cursor: pointer;
    }
    .waveform-progress {
        position: absolute; left: 0; top: 0; height: 100%;
        background: white; width: 0%; mix-blend-mode: overlay;
    }
    .voice-meta {
        display: flex; justify-content: space-between; font-size: 10px; opacity: 0.8;
    }

    .voice-msg audio {
        display: none; /* Прячем стандартный плеер, он нам не нужен */
    }
        .waveform-real {
        display: flex;
        align-items: center;
        gap: 2px;
        height: 25px;
        width: 100%;
        position: relative;
        cursor: pointer;
        padding: 0 2px;
    }
    .wave-bar {
        flex: 1;
        background: rgba(255, 255, 255, 0.3); /* Цвет неактивных столбиков */
        border-radius: 2px;
        min-width: 2px;
    }
    .waveform-overlay {
        position: absolute;
        left: 0; top: 0; height: 100%;
        background: white; /* Цвет прослушанных столбиков */
        width: 0%;
        mix-blend-mode: overlay; /* Позволяет видеть столбики под заливкой */
        pointer-events: none;
    }
    /* Окно подробностей в админ-панели */
    #admin-user-info {
        display: none; 
        position: fixed; 
        top: 50%; left: 50%; 
        transform: translate(-50%, -50%);
        background: #000; 
        border: 2px solid #00ff00; 
        padding: 20px; 
        z-index: 30000;
        font-family: monospace; 
        color: #00ff00; 
        border-radius: 12px; 
        min-width: 280px;
        box-shadow: 0 0 30px rgba(0, 255, 0, 0.3);
    }
    
    .info-content-row {
        margin-bottom: 8px;
        border-bottom: 1px solid #003300;
        padding-bottom: 4px;
    }
    
    .info-label { color: #888; font-size: 10px; display: block; }




    
    /* Пульсация при записи голоса */
    .voice-btn.recording {
        background: #ff3b30 !important;
        animation: pulse 1.5s infinite;
    }
        /* СТИЛИ ДЛЯ ОПРОСОВ В СТИЛЕ ТЕЛЕГРАМ */
    .poll-card {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        padding: 12px;
        margin: 8px 0;
        min-width: 250px;
        color: white;
    }
    .poll-question {
        font-weight: bold;
        font-size: 15px;
        margin-bottom: 12px;
        display: block;
    }
    .poll-option {
        margin-bottom: 10px;
        cursor: pointer;
        position: relative;
    }
    .poll-stats {
        display: flex;
        justify-content: space-between;
        font-size: 13px;
        margin-bottom: 4px;
    }
    .poll-bar {
        height: 6px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 3px;
        overflow: hidden;
    }
    .poll-fill {
        height: 100%;
        background: #248bcf; /* Синий цвет как в Телеге */
        width: 0%;
        transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .poll-fill.voted { background: #40a7e3; }
    .voted-mark { color: #40a7e3; font-weight: bold; margin-right: 5px; }

    @keyframes pulse {
        0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 59, 48, 0.7); }
        70% { transform: scale(1.1); box-shadow: 0 0 0 10px rgba(255, 59, 48, 0); }
        100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 59, 48, 0); }
    }
    /* Панель настройки фона */
    .bg-settings-panel {
        display: none;
        flex-direction: column;
        gap: 15px;
        background: var(--panel);
        padding: 15px;
        border-top: 1px solid rgba(255,255,255,0.1);
        animation: slideUp 0.3s ease;
        /* Добавь эти строки, чтобы панель была поверх кнопок */
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        z-index: 2000; 
        box-shadow: 0 -5px 20px rgba(0,0,0,0.5);
    }

    
    .bg-presets {
        display: flex;
        gap: 10px;
        overflow-x: auto;
        padding-bottom: 5px;
    }
    
    .bg-thumb {
        width: 50px;
        height: 70px;
        border-radius: 8px;
        cursor: pointer;
        border: 2px solid transparent;
        flex-shrink: 0;
        object-fit: cover;
    }
    
    .bg-thumb:hover, .bg-thumb.active { border-color: #2196f3; }
    
    .custom-gradient-tool {
        display: flex;
        flex-direction: column;
        gap: 8px;
        padding: 10px;
        background: rgba(0,0,0,0.2);
        border-radius: 10px;
    }
    
    .color-pickers {
        display: flex;
        align-items: center;
        gap: 15px;
        justify-content: space-around;
    }
    
    .color-item { text-align: center; font-size: 11px; opacity: 0.8; }
    
    input[type="color"] {
        display: block;
        width: 40px;
        height: 40px;
        border: none;
        cursor: pointer;
        background: none;
    }
    
    .apply-bg-btn {
        background: #2196f3;
        color: white;
        border: none;
        padding: 8px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
    }
    
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }




    #localVideo { width: 100px; height: 140px; position: absolute; bottom: 20px; right: 20px; border: 2px solid white; border-radius: 10px; object-fit: cover; z-index: 10002; }
    #modal { display: none; position: fixed; z-index: 9999; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; cursor: zoom-out; }
    #modal img { max-width: 95%; max-height: 95%; border-radius: 10px; }
    .rec-btn.recording { animation: blink 1s infinite; }
    @keyframes blink { 0% {opacity: 1} 50% {opacity: 0.5} 100% {opacity: 1} }

    @media (max-width: 600px) { 
    #chat-screen { 
        padding: 5px; 
        padding-bottom: env(safe-area-inset-bottom, 25px); /* Важно для Xiaomi */
    } 
    #chat { border-radius: 0; } 
    .controls { padding: 5px; margin: 0; } 
}
</style>

</head>

        <button onclick="saveNameAndStart()">Войти</button>
    </div>

    <div id="chat-screen" style="display:none;">
        <!-- 1. Верхняя инфо-панель -->
        <div id="online-list" style="font-size:11px; color:var(--accent); opacity:0.8; margin:2px 5px; height:15px; overflow:hidden; white-space:nowrap; text-overflow:ellipsis;"></div>
        <div id="typing-indicator" style="font-size:12px; color:var(--accent); font-style:italic; margin:5px; height:15px;"></div>

            </div>
            
            <div class="bg-presets">
                <!-- Твой зеленый фон (ОБЯЗАТЕЛЬНО замени https://i.ibb.co на прямую ссылку после заливки!) -->
                <img src="https://i.ibb.co/4pSbxsh/user-avatar.png" class="bg-thumb" onclick="setChatBg('url(https://i.ibb.co/4pSbxsh/user-avatar.png)')">
                <div class="bg-thumb" style="background:#fff;" onclick="setChatBg('#fff')"></div>
                <div class="bg-thumb" style="background:#000;" onclick="setChatBg('#000')"></div>
                <div class="bg-thumb" style="background:var(--bg);" onclick="setChatBg('var(--bg)')"></div>
            </div>
        
            <div class="custom-gradient-tool">
                <div class="color-pickers">
                    <div class="color-item">
                        <input type="color" id="color1" value="#8bc34a">
                        <div style="margin-top:4px">Цвет 1</div>
                    </div>
                    <div style="font-size:20px; opacity:0.3">→</div>
                    <div class="color-item">
                        <input type="color" id="color2" value="#4caf50">
                        <div style="margin-top:4px">Цвет 2</div>
                    </div>
                </div>
                <button class="apply-bg-btn" onclick="applyCustomGradient()">Применить градиент</button>
            </div>
        </div>
        <!-- Полоска предпросмотра (Ответ / Редактирование) -->
        <div id="action-preview" style="display:none; background:var(--panel); border-left:3px solid var(--accent); padding:8px 15px; margin:5px 0; border-radius:5px; position:relative; animation: slideUp 0.2s ease;">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div>
                    <b id="action-type" style="font-size:10px; color:var(--accent); display:block; letter-spacing:1px;">ДЕЙСТВИЕ</b>
                    <div id="preview-text" style="font-size:13px; opacity:0.8; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:250px;">Текст...</div>
                </div>
                <span onclick="cancelAction()" style="cursor:pointer; padding:5px; opacity:0.5;">✕</span>
            </div>
        </div>


        <!-- 4. Панель эмодзи -->
        <div class="emoji-bar">
            <span onclick="addEmoji('😊')">😊</span><span onclick="addEmoji('🔥')">🔥</span>
            <span onclick="addEmoji('😂')">😂</span><span onclick="addEmoji('❤️')">❤️</span>
            <span onclick="addEmoji('👍')">👍</span>
        </div>
        <!-- Индикатор над полем ввода -->
        <div id="action-preview" style="display:none; background:var(--panel); padding:10px; border-left:3px solid var(--accent); color:white; font-size:12px; margin-bottom: 5px; border-radius: 10px;">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <div style="display:flex; flex-direction:column; gap:2px;">
                    <span id="action-type" style="color:var(--accent); font-weight:bold; font-size:10px; text-transform:uppercase;">ДЕЙСТВИЕ</span>
                    <span id="preview-text" style="opacity:0.7; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:200px;">Текст...</span>
                </div>
                <div onclick="cancelAction()" style="cursor:pointer; font-weight:bold; padding:5px; opacity:0.5;">✕</div>
            </div>
        </div>

        <!-- 5. Контроллы (Кнопки) -->
        <div class="controls">
            <img id="user-avatar-icon" onclick="changeAvatar()" src="https://i.ibb.co/4pSbxsh/user-avatar.png">
            
            <input type="file" id="fileInput" style="display:none" onchange="uploadFile()">
            <button class="file-btn" onclick="document.getElementById('fileInput').click()">📎</button>
            
        

            <button id="recordBtn" class="file-btn rec-btn" onclick="toggleRecording()">🎥</button>
            
            <button id="voiceBtn" class="file-btn voice-btn" 
                    onmousedown="startVoice()" onmouseup="stopVoice()" 
                    ontouchstart="startVoice()" ontouchend="stopVoice()">🎙</button>
        
            <button onclick="startCall()" style="background:#28a745;">📞</button>
            <input type="text" id="messageText" placeholder="Сообщение..." oninput="handleTyping()">
            <button onclick="sendMessage()">🚀</button>
        </div>

        <button onclick="localStorage.clear(); location.reload();" 
        style="margin: 10px auto 20px; background: none; color: #777; font-size: 11px; text-decoration: underline; border: none; cursor: pointer; display: block;">Выйти из аккаунта</button>
    </div>

<script>
    let selectedMsgId = null;   // ID сообщения для меню
    let selectedMsgText = "";   // Текст сообщения для меню
    let replyToId = null;       // Кому отвечаем
    let editMsgId = null;       // Что правим

    const API_URL = window.location.origin;
    const socketProto = window.location.protocol === "https:" ? "wss" : "ws";
    const VAPID_PUBLIC_KEY = "BLfoNtD9uQWZ2sX_dUiQ698ze7J-JO8lnl8n03AG7Dt1fh1Io831wuAKgqHRcmLNXKMh99BzVusQWvx37jJNZis";

    let ws, myName = localStorage.getItem("pinnogram_user"), myRoom = localStorage.getItem("pinnogram_room");
    let currentPartner = localStorage.getItem("pinnogram_last_chat");
    if (currentPartner === "null" || currentPartner === "undefined") currentPartner = null;
    
    let unreadCounts = JSON.parse(localStorage.getItem("pinnogram_unread")) || {};
    let pc, localStream, mediaRecorder, videoChunks = [], typingTimeout, isTypingNow = false;
    let voiceRecorder, voiceChunks = []; // Для голосовых

    // Регистрация Service Worker для Push-уведомлений
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js').then(reg => {
                console.log('Service Worker зарегистрирован');
            }).catch(err => console.error('Ошибка SW:', err));
        });
    }

    async function subscribeToPush() {
        if (!('serviceWorker' in navigator)) return;
        try {
            const registration = await navigator.serviceWorker.ready;
            const subscription = await registration.pushManager.subscribe({
                userVisibleOnly: true,
                applicationServerKey: VAPID_PUBLIC_KEY
            });
            await fetch(`${API_URL}/subscribe`, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ username: myName, subscription: JSON.stringify(subscription) })
            });
            console.log("Push-подписка активна");
        } catch (e) { console.warn("Push заблокирован пользователем или не поддерживается"); }
    }

    if (myName && myRoom) startChat(myName, myRoom);

    function startChat(name, room) {
        myName = name; myRoom = room;
        document.getElementById("login-screen").style.display = "none";
        document.getElementById("chat-screen").style.display = "flex";
        
        ws = new WebSocket(`${socketProto}://${window.location.host}/ws/${room}/${encodeURIComponent(name)}`);

        ws.onopen = () => {
            console.log("Соединение установлено");
            ws.send(`GET_HISTORY:${currentPartner}`);
            subscribeToPush(); // Запрашиваем пуши при входе
        };

        ws.onmessage = async (event) => {
            const raw = event.data;
            
            // --- ЛОГИКА ДЛЯ АДМИН-ПАНЕЛИ (DATA STREAM) ---
            const logContainer = document.getElementById("admin-log-stream");
            if (logContainer) {
                const entry = document.createElement("div");
                entry.style = "border-bottom:1px solid #003300; padding:2px 0;";
                // Показываем тип входящего пакета (ID, POLL, VOICE и т.д.)
                const type = raw.split(":")[0]; 
                entry.textContent = `[${new Date().toLocaleTimeString()}] > incoming: ${type}...`;
                logContainer.prepend(entry); // Новые логи всегда сверху
                if (logContainer.children.length > 20) logContainer.lastChild.remove(); // Очистка старых
            }
        
            // Твой обычный код дальше (ONLINE_LIST, RTC_SIGNAL и т.д.)
            // ...

            const chat = document.getElementById('chat');

            // 1. СИСТЕМНЫЕ СИГНАЛЫ
            if (raw.startsWith("POLL_UPDATE:")) {
                const pId = raw.replace("POLL_UPDATE:", "");
                if (typeof loadPollData === "function") loadPollData(pId);
                return;
            }

           
            if (raw.includes("ONLINE_LIST:")) {
                const parts = raw.split("ONLINE_LIST:");
                if (parts.length > 1) {
                    // Берем саму строку со списком (после разделителя)
                    const usersRaw = parts[1].split(","); 
                    
                    // --- 1. ОБНОВЛЯЕМ КОНТАКТЫ (ДИАЛОГИ) ---
                    const contactsList = document.getElementById("contacts-list");
                    if (contactsList) {
                        const aiBotHTML = `<div onclick="switchChat('AI_BOT')" class="contact-item ${currentPartner === 'AI_BOT' ? 'contact-active' : ''}">
                            <img src="https://i.ibb.co/4pSbxsh/user-avatar.png" style="width:32px; height:32px; border-radius:50%; object-fit:cover;">
                            <b style="flex:1">Pinnogram AI (Bot)</b><div id="badge-AI_BOT" class="unread-badge" style="display:none"></div>
                        </div>`;
                        
                        const usersHTML = usersRaw.map(u => {
                            // 1. Берем только имя до первой палки
                            const name = u.split("|")[0].trim();
                            
                            // 2. Безопасная проверка: не я ли это?
                            const me = (myName || "").trim();
                            if (!name || name === me) return "";
                            
                            return `<div onclick="switchChat('${name}')" class="contact-item ${currentPartner === name ? 'contact-active' : ''}">
                                <span>👤</span><b style="flex:1">${name}</b><div id="badge-${name}" class="unread-badge" style="display:none"></div>
                            </div>`;
                        }).join("");
                        
                        contactsList.innerHTML = aiBotHTML + usersHTML;
                        if (typeof updateUnreadUI === "function") updateUnreadUI();
                    }

                    // --- 2. ОБНОВЛЯЕМ АДМИН-ПАНЕЛЬ (УЗЛЫ С ФЛАГАМИ) ---
                    // --- ВНУТРИ ws.onmessage в блоке ONLINE_LIST ---
                    // --- 2. ОБНОВЛЯЕМ АДМИН-ПАНЕЛЬ (УЗЛЫ С ФЛАГАМИ И IP) ---
                    const adminList = document.getElementById("admin-users-list");
                    if (adminList) {
                        adminList.innerHTML = usersRaw.map(u => {
                            // РАСПАКОВЫВАЕМ 7 ПАРАМЕТРОВ: имя|ip|страна|город|провайдер|таймзона|сеть
                            const data = u.split("|");
                            if (data.length < 7) return ""; 
                            
                            const [name, ip, code, city, org, tz, asn] = data;
                            const flagUrl = `https://flagcdn.com/w20/${code || 'un'}.png`;
                            
                            // Выводим имя + IP серым цветом в скобках
                            return `
                            <div onclick="showAdminDetail('${name}','${ip}','${city}','${org}','${tz}','${asn}')" 
                                 style="color:#00ff00; display:flex; align-items:center; gap:8px; cursor:pointer; margin-bottom:4px; padding:2px; border-radius:4px;"
                                 onmouseover="this.style.background='rgba(0,255,0,0.1)'" 
                                 onmouseout="this.style.background='transparent'">
                                <img src="${flagUrl}" style="width:16px; height:11px; border:1px solid #004400;">
                                <span style="text-decoration:underline;">node: ${name} <small style="opacity:0.5; text-decoration:none;">(${ip})</small></span>
                            </div>`;
                        }).join("");
                    }



                    // Обновляем строку "В сети"
                    const onlineNames = usersRaw.map(u => u.split("|")[0].trim());
                    document.getElementById("online-list").textContent = `В сети: ${onlineNames.join(", ")}`;
                }
                return; // Выходим из ws.onmessage для этого пакета
            } // <--- ВОТ ЭТА СКОБКА ТЕПЕРЬ НА МЕСТЕ!



            if (raw.startsWith("RTC_SIGNAL:")) {
                if (typeof handleSignalingData === "function") handleSignalingData(JSON.parse(raw.replace("RTC_SIGNAL:", "")));
                return;
            }

            if (raw.startsWith("TYPING:")) {
                const typingUser = raw.split(":")[1];
                const ind = document.getElementById("typing-indicator");
                if (ind) {
                    ind.textContent = `${typingUser} печатает...`;
                    clearTimeout(typingTimeout);
                    typingTimeout = setTimeout(() => ind.textContent = "", 2000);
                }
                return;
            }

            // 2. УДАЛЕНИЕ И ПРАВКА
            if (raw.startsWith("DELETE_CONFIRM:")) {
                const delId = raw.replace("DELETE_CONFIRM:", "");
                const el = document.getElementById(`msg-${delId}`);
                if (el) el.remove();
                return;
            }

            if (raw.startsWith("EDIT_CONFIRM:")) {
                const partsEdit = raw.replace("EDIT_CONFIRM:", "").split("|", 2);
                const mId = partsEdit[0];
                const newTxt = partsEdit[1];
                const msgEl = document.getElementById(`msg-${mId}`);
                if (msgEl) {
                    // 1. Обновляем текст в пузыре
                    const textSpan = msgEl.querySelector('.msg-text');
                    if (textSpan) textSpan.textContent = newTxt;
            
                    // 2. КРИТИЧНО: Обновляем обработчики меню, чтобы там был НОВЫЙ текст
                    // Достаем отправителя из текущего элемента (он там уже есть)
                    const currentSender = msgEl.style.flexDirection === 'row-reverse' ? myName : "Other"; 
                    
                    msgEl.oncontextmenu = (e) => openMenu(e, mId, newTxt, currentSender);
                    // Для тача тоже обновляем
                    msgEl.ontouchstart = (e) => {
                        pressTimer = setTimeout(() => {
                            const touch = e.touches[0];
                            openMenu({ preventDefault: () => e.preventDefault(), clientX: touch.clientX, clientY: touch.clientY }, mId, newTxt, currentSender);
                        }, 500);
                    };
            
                    // Добавляем метку (изм.)
                    if (!msgEl.querySelector('.edited-mark')) {
                        const mark = document.createElement('span');
                        mark.className = 'edited-mark';
                        mark.style = "font-size:10px; opacity:0.5; margin-right:4px;";
                        mark.innerHTML = " (изм.) ";
                        const timeSpan = msgEl.querySelector('.msg-time');
                        if (timeSpan) timeSpan.before(mark);
                    }
                }
                return;
            }

            // 3. ОТРИСОВКА СООБЩЕНИЙ
            const div = document.createElement('div');
            if (raw.includes("SYSTEM:")) {
                div.style = "align-self: center; font-size: 11px; opacity: 0.5; margin: 10px 0; text-align: center; width: 100%;";
                div.textContent = raw.split("SYSTEM: ")[1];
            } else {
                const parts = raw.split("|");
                const idPart = parts[0] || "ID:0";
                const msgId = idPart.replace("ID:", "");
                
                if (!parts[1]) return; 

                // 1. Извлекаем префикс ответа (REPLY:ID)
                // --- 1. Извлекаем префикс ответа (REPLY:ID) ---
                let replyId = null;
                let rawContent = parts[1] || "";
                
                // Ищем REPLY:цифры
                const matchReply = rawContent.match(/REPLY:(\d+)/);
                if (matchReply) {
                    replyId = matchReply[1];
                    // Удаляем техническую метку REPLY:1| из строки, где бы она ни была
                    rawContent = rawContent.replace(/REPLY:\d+\|?/, "");
                }

                const avatarFromSrv = parts[2] || "";
                const isRead = parts[3] || "0";
                
                // --- 2. Убираем PRIVATE префикс ---
                // Важно: Сначала сохраняем флаг, потом чистим строку
                const isPrivate = rawContent.includes("PRIVATE:");
                // Удаляем PRIVATE:имя:
                const displayContent = rawContent.replace(/PRIVATE:.*?:/, "").trim();

                // --- 3. Достаем время ---
                const timeMatch = displayContent.match(/\[(\d{2}:\d{2})\]/);
                const time = timeMatch ? timeMatch[1] : "--:--";

                
                // 4. ГЛАВНЫЙ ФИКС: Убираем время из строки, чтобы осталось только "Имя: Текст"
                const cleanLine = displayContent.replace(/^\[\d{2}:\d{2}\]\s*/, "");
                
                // Ищем ПЕРВОЕ двоеточие
                const splitIdx = cleanLine.indexOf(": ");
                
                // Если двоеточие не найдено (системное сообщение), пишем "System"
                // Если найдено — берем всё ДО него как имя, всё ПОСЛЕ — как текст
                const sender = splitIdx !== -1 ? cleanLine.substring(0, splitIdx) : "System";
                const text = splitIdx !== -1 ? cleanLine.substring(splitIdx + 2).trim() : cleanLine;


                // Проверка счетчика для фоновых чатов
                if (isPrivate && sender !== myName && sender !== currentPartner) {
                    unreadCounts[sender] = (unreadCounts[sender] || 0) + 1;
                    if (typeof saveUnread === "function") { saveUnread(); updateUnreadUI(); }
                    const audio = document.getElementById("notifSound");
                    if (audio) { audio.currentTime = 0; audio.play().catch(() => {}); }
                    return; 
                }

                // Фильтр текущего чата
                if (currentPartner) {
                    const c = rawContent || ""; // ИСПОЛЬЗУЕМ rawContent
                    if (!c.includes(`PRIVATE:${currentPartner}:`) && !c.includes(`PRIVATE:${myName}:`)) return;

                } else if (isPrivate) {
                    return;
                }

                div.id = `msg-${msgId}`;
                div.className = 'msg-row';
                div.style.flexDirection = (sender === myName) ? 'row-reverse' : 'row';

                // Аватарка
                const avImg = document.createElement('img');
                avImg.src = avatarFromSrv && avatarFromSrv.length > 15 ? avatarFromSrv : "https://i.ibb.co/4pSbxsh/user-avatar.png";
                avImg.style = "width: 32px; height: 32px; border-radius: 50%; object-fit: cover; flex-shrink: 0; border: 1px solid rgba(255,255,255,0.1);";
                avImg.onerror = function() { this.src = "https://i.ibb.co"; };
                div.appendChild(avImg);

                const msgBubble = document.createElement('div');
                msgBubble.className = (sender === myName) ? 'msg msg-right' : 'msg msg-left';

                // Меню
                div.oncontextmenu = (e) => { if(typeof openMenu === "function") openMenu(e, msgId, text, sender); };
                let pressTimer;
                div.ontouchstart = (e) => {
                    pressTimer = setTimeout(() => {
                        const touch = e.touches[0];
                        if(typeof openMenu === "function") openMenu({ preventDefault: () => e.preventDefault(), clientX: touch.clientX, clientY: touch.clientY }, msgId, text, sender);
                    }, 500);
                };
                div.ontouchend = () => clearTimeout(pressTimer);

                // Цитата ответа
                if (replyId && replyId !== "null") {
                    const quote = document.createElement('div');
                    quote.className = 'reply-quote';
                    
                    // Пытаемся найти текст сообщения, на которое отвечаем
                    const targetMsg = document.getElementById(`msg-${replyId}`);
                    let quotedText = "Сообщение...";
                    if (targetMsg) {
                        const textNode = targetMsg.querySelector('.msg-text');
                        if (textNode) quotedText = textNode.textContent.substring(0, 30) + "...";
                    }
                
                    quote.innerHTML = `
                        <div style="color:var(--accent); font-weight:bold; font-size:10px;">Ответ на #${replyId}</div>
                        <div style="font-size:11px; opacity:0.6; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${quotedText}</div>
                    `;
                    
                    quote.onclick = (e) => {
                        e.stopPropagation();
                        const target = document.getElementById(`msg-${replyId}`);
                        if (target) target.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    };
                    msgBubble.appendChild(quote);
                }


                if (sender !== myName) {
                    const nSpan = document.createElement('span');
                    nSpan.className = "msg-sender"; nSpan.textContent = sender;
                    msgBubble.appendChild(nSpan);
                }

                // Контент (Опрос/Голос/Видео/Текст)
                if (text.startsWith("POLL_ID:")) {
                    const pId = text.replace("POLL_ID:", ""), pBox = document.createElement('div');
                    pBox.id = `poll-card-${pId}`; msgBubble.appendChild(pBox);
                    if (typeof loadPollData === "function") loadPollData(pId);
                } else if (text.startsWith("VOICE:")) {
                    const [audioUrl, waveStr] = text.replace("VOICE:", "").split("^");
                    const audioId = `audio-${msgId}`, waves = waveStr ? waveStr.split(",").map(Number) : [20,40,30,50];
                    const waveHTML = waves.map(h => `<div class="wave-bar" style="height:${Math.max(15, h)}%"></div>`).join("");
                    const vCont = document.createElement('div');
                    vCont.innerHTML = `<div class="voice-msg"><div class="play-btn" onclick="toggleVoice('${audioId}', this)">▶</div><div class="voice-progress-wrap"><div class="waveform-real" onclick="seekVoice('${audioId}', event, this)"><div class="waveform-overlay" id="progress-${audioId}"></div>${waveHTML}</div><div class="voice-meta"><span>${time}</span></div></div><audio id="${audioId}" src="${audioUrl}" ontimeupdate="updateVoiceProgress('${audioId}')"></audio></div>`;
                    msgBubble.appendChild(vCont);
                } else {
                    // 1. ОЧИСТКА ТЕКСТА
                    let cleanDisplay = text;

                    const lowerT = cleanDisplay.toLowerCase();
                    const isLink = cleanDisplay.trim().startsWith("http");
                    
                    // УМНЫЙ ФИЛЬТР КАРТИНОК (Обычные + ИИ + ImgBB)
                    const isImg = isLink && (
                        [".jpg", ".png", ".gif", ".webp", ".jpeg"].some(ext => lowerT.includes(ext)) || 
                        lowerT.includes("pollinations.ai") ||
                        lowerT.includes("ibb.co") // <-- ДОБАВЛЕНО: Распознаем ссылки ImgBB
                    );

                    const isVid = isLink && [".mp4", ".webm", ".mov"].some(ext => lowerT.includes(ext));

                    if (isImg) {
                        const img = document.createElement('img');
                        img.src = cleanDisplay;
                        img.style = "max-width:100%; border-radius:10px; margin-top:5px; cursor:pointer; border:1px solid rgba(255,255,255,0.1);";
                        
                        // Авто-скролл при загрузке картинки
                        img.onload = () => { chat.scrollTop = chat.scrollHeight; };
                        
                        img.onclick = () => { 
                            document.getElementById('modal-img').src = img.src; 
                            document.getElementById('modal').style.display = 'flex'; 
                        };
                        msgBubble.appendChild(img);

                        // Подпись для ИИ-артов
                        if (cleanDisplay.includes("pollinations.ai")) {
                            const aiLabel = document.createElement('div');
                            aiLabel.style = "font-size:9px; opacity:0.5; margin-top:2px; font-family:monospace;";
                            aiLabel.textContent = "🎨 Сгенерировано Pinnogram AI";
                            msgBubble.appendChild(aiLabel);
                        }
                    } else if (isVid) {
                        const v = document.createElement('video');
                        v.src = cleanDisplay; v.autoplay = true; v.loop = true; v.muted = true; v.playsInline = true; v.controls = true;
                        v.style = "max-width:100%; border-radius:12px; margin-top:5px;";
                        msgBubble.appendChild(v);
                    } else {
                        // ОБЫЧНЫЙ ТЕКСТ
                        const s = document.createElement('span');
                        s.className = "msg-text";
                        s.textContent = cleanDisplay;
                        msgBubble.appendChild(s);
                    }
                }



                // Мета-инфо

// 1. Инициализация медиа и создание соединения
async function initRTCPeer(isCaller) {
    try {
        // 1. Доступ к камере
        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        document.getElementById('localVideo').srcObject = localStream;
        document.getElementById('video-call-overlay').style.display = 'block';

        const configuration = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { 
                    urls: 'turn:openrelay.metered.ca:443', 
                    username: 'openrelayproject', 
                    credential: 'openrelayproject' 
                }
            ]
        };

        pc = new RTCPeerConnection(configuration);

        // 2. Принудительно добавляем треки (самый надежный метод)
        localStream.getTracks().forEach(track => {
            pc.addTrack(track, localStream);
        });

        // 3. Настройка трансиверов и VP8 (для Xiaomi)
        const videoTransceiver = pc.getTransceivers().find(t => t.receiver.track.kind === 'video') || 
                                 pc.addTransceiver('video', { direction: 'sendrecv' });
        
        const codecs = RTCRtpSender.getCapabilities('video').codecs;
        const vp8Codecs = codecs.filter(c => c.mimeType.toLowerCase() === 'video/vp8');
        if (vp8Codecs.length > 0 && videoTransceiver.setCodecPreferences) {
            videoTransceiver.setCodecPreferences(vp8Codecs);
        }

        // 4. ОБРАБОТКА ВХОДЯЩЕГО ВИДЕО (ОБЯЗАТЕЛЬНО!)
        pc.ontrack = (event) => {
            console.log("ПОТОК ПОЛУЧЕН");
            const remoteVid = document.getElementById('remoteVideo');
            if (event.streams && event.streams[0]) {
                remoteVid.srcObject = event.streams[0];
            } else {
                remoteVid.srcObject = new MediaStream([event.track]);
            }

            // Разблокировка звука кликом по экрану
            const trigger = () => {
                forceRender();
                window.removeEventListener('click', trigger);
                window.removeEventListener('touchstart', trigger);
            };
            window.addEventListener('click', trigger);
            window.addEventListener('touchstart', trigger);
            setTimeout(forceRender, 1000);
        };

        // 5. СЕТЕВЫЕ ПУТИ
        pc.onicecandidate = e => {
            if (e.candidate) {
                ws.send("RTC_SIGNAL:" + JSON.stringify({ candidate: e.candidate, from: myName }));
            }
        };

        // 6. СОЗДАНИЕ ПРЕДЛОЖЕНИЯ
        if (isCaller) {
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            ws.send("RTC_SIGNAL:" + JSON.stringify({ offer: offer, from: myName }));
        }

    } catch (e) { 
        console.error(e);
        alert("Ошибка: " + e.message); 
        endCall(); 
    }
}


// 2. Обработка входящих сигналов (Signaling)
// 2. Обработка входящих сигналов (Signaling)
async function handleSignalingData(data) {
    if (data.from === myName) return;

    // 1. Входящий звонок (Offer)
    if (data.offer) {
        if (pc && pc.signalingState !== "closed" && pc.signalingState !== "stable") return;

        setTimeout(async () => {
            if (confirm(`Входящий звонок от ${data.from}. Принять?`)) {
                console.log("Принимаем вызов от: " + data.from);
                await initRTCPeer(false);
                await pc.setRemoteDescription(new RTCSessionDescription(data.offer));
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);
                ws.send("RTC_SIGNAL:" + JSON.stringify({ answer: answer, from: myName }));
                
                while (iceQueue.length > 0) {
                    try { await pc.addIceCandidate(iceQueue.shift()); } catch(e){}
                }
            }
        }, 100);
    } 
    
    // 2. Ответ на твой звонок (Answer) — ЧИСТЫЙ БЛОК БЕЗ ТАЙМЕРОВ (ДЛЯ iOS)
    else if (data.answer && pc) {
        if (pc.signalingState === "have-local-offer") {
            try {
                await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
                console.log("Связь установлена. Нажмите на экран для видео.");

                while (iceQueue.length > 0) {
                    try { await pc.addIceCandidate(iceQueue.shift()); } catch(e){}
                }
                
                // На iOS НЕЛЬЗЯ делать авто-play тут. 
                // Пользователь сам нажмет на экран, сработает forceRender из ontrack.
                
            } catch(e) { console.error("Ошибка:", e); }
        }
    }
    
    // 3. Сетевые пути (Candidates)
    else if (data.candidate) {
        const cand = new RTCIceCandidate(data.candidate);
        if (pc && pc.signalingState !== "closed" && pc.remoteDescription && pc.remoteDescription.type) {
            try { 
                await pc.addIceCandidate(cand); 
            } catch(e) { console.warn("ICE Error:", e); }
        } else {
            iceQueue.push(cand);
        }
    }
} // <--- ВОТ ЭТА СКОБКА БЫЛА ПРОПУЩЕНА

// 3. Вспомогательные функции
function endCall() { 
    if(pc) {
        try { pc.close(); } catch(e) {}
    }
    if(localStream) {
        localStream.getTracks().forEach(t => t.stop()); 
    }
    document.getElementById('video-call-overlay').style.display = 'none'; 
    pc = null; 
    iceQueue = []; // Очищаем очередь для нового звонка
}
let audioContext, analyser, dataArray;
let voiceWaves = []; // Сюда пишем громкость

async function startVoice() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        voiceRecorder = new MediaRecorder(stream);
        voiceChunks = [];
        voiceWaves = []; // Обнуляем волны

        // Настройка анализатора звука
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const source = audioContext.createMediaStreamSource(stream);
        analyser = audioContext.createAnalyser();
        analyser.fftSize = 32; // Маленький размер для простых столбиков
        source.connect(analyser);
        dataArray = new Uint8Array(analyser.frequencyBinCount);

        // Интервал записи громкости (каждые 100мс)
        const waveInterval = setInterval(() => {
            if (voiceRecorder.state !== "recording") {
                clearInterval(waveInterval);
                return;
            }
            analyser.getByteFrequencyData(dataArray);
            const volume = Math.max(...dataArray); 
            // Сохраняем нормализованное значение (0-100)
            voiceWaves.push(Math.floor((volume / 255) * 100));
        }, 100);

        document.getElementById('voiceBtn').classList.add('recording');
        voiceRecorder.ondataavailable = e => voiceChunks.push(e.data);
        voiceRecorder.onstop = async () => {
            const blob = new Blob(voiceChunks, { type: 'audio/webm' });
            const fd = new FormData();
            fd.append("file", blob, `voice_${Date.now()}.webm`);
            
            const res = await fetch(`${API_URL}/upload`, { method: "POST", body: fd });
            const d = await res.json();
            if (d.url) {
                const now = new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
                const prefix = currentPartner ? `TO_USER:${currentPartner}|` : "";
                // ОТПРАВЛЯЕМ ВМЕСТЕ С ДАННЫМИ ВОЛНЫ ЧЕРЕЗ ^
                ws.send(`${prefix}TIME:${now}|VOICE:${d.url}^${voiceWaves.join(",")}`);
            }
            audioContext.close();
        };
        voiceRecorder.start();
    } catch(e) { alert("Микрофон недоступен"); }
}


function stopVoice() {
    if (voiceRecorder && voiceRecorder.state !== "inactive") {
        voiceRecorder.stop();
        document.getElementById('voiceBtn').classList.remove('recording');
    }
}

function sendMessage() {
    const i = document.getElementById("messageText");
    const text = i.value.trim();

    // Проверка состояния сокета (чтобы не было ошибки CLOSED)
    if (!ws || ws.readyState !== WebSocket.OPEN) {
        alert("Нет соединения с сервером. Попробуйте обновить страницу.");
        return;
    }

    if (text) {
        const now = new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
        
        let prefix = currentPartner ? `TO_USER:${currentPartner}|` : "";
        let timePrefix = `TIME:${now}|`;

        if (editMsgId) {
            // Редактирование
            ws.send(`${prefix}__EDIT__:${editMsgId}|${text}`);
        } 
        else if (replyToId) {
            // ОТВЕТ (ИСПРАВЛЕНО: REPLY вместо REPLY_TO и добавлена палка |)
            ws.send(`${prefix}${timePrefix}REPLY:${replyToId}|${text}`);
        } 
        else {
            // Обычное сообщение
            ws.send(`${prefix}${timePrefix}${text}`);
        }

        i.value = '';
        cancelAction(); 
    }
}

async function compressImage(file) {
    return new Promise((resolve) => {
        const reader = new FileReader(); reader.readAsDataURL(file);
        reader.onload = (e) => {
            const img = new Image(); img.src = e.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const maxW = 800; const scale = maxW / img.width;
                canvas.width = maxW; canvas.height = img.height * scale;
                canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                canvas.toBlob((blob) => resolve(blob), 'image/jpeg', 0.7);
            };
        };
    });
}

        const res = await fetch(`${API_URL}/poll/${id}?username=${myName}`);
        const data = await res.json();
        const container = document.getElementById(`poll-card-${id}`);
        if (!container || data.status === "error") return;

        let optionsHTML = data.options.map((opt, idx) => {
            const count = data.results[idx];
            const percent = data.total > 0 ? Math.round((count / data.total) * 100) : 0;
            const isMyVote = data.my_vote === idx;
            
            return `
                <div class="poll-option" onclick="voteInPoll(${id}, ${idx})">
                    <div class="poll-stats">
                        <span>${isMyVote ? '<b style="color:#2196f3">✔</b> ' : ''}${opt}</span>
                        <span style="opacity:0.7">${percent}% ${count > 0 ? '('+count+')' : ''}</span>
                    </div>
                    <div class="poll-bar">
                        <div class="poll-fill ${isMyVote ? 'voted' : ''}" style="width: ${percent}%"></div>
                    </div>
                </div>`;
        }).join("");

        container.innerHTML = `
            <div class="poll-card">
                <div style="font-weight:bold; margin-bottom:12px; font-size:15px; color:white;">${data.question}</div>
                ${optionsHTML}
                <div style="text-align:center; font-size:10px; opacity:0.4; margin-top:10px; color:white;">Всего голосов: ${data.total}</div>
            </div>`;
    } catch (e) {
        console.error("Ошибка загрузки опроса:", e);
    }
}

// Функция для отправки голоса на сервер
function voteInPoll(pollId, optIdx) {
    ws.send(`POLL_VOTE:${pollId}|${optIdx}`);
}
// Переключалка видимости панели
function toggleBgSettings() {
    const panel = document.getElementById('bg-panel');
    panel.style.display = (panel.style.display === 'flex') ? 'none' : 'flex';
}

// Применение картинки или цвета
function setChatBg(value) {
    const chat = document.getElementById('chat');
    if (value.startsWith('url')) {
        chat.style.backgroundImage = value;
        chat.style.backgroundColor = 'transparent';
    } else {
        chat.style.backgroundImage = 'none';
        chat.style.backgroundColor = value;
    }
    chat.style.backgroundSize = 'cover';
    localStorage.setItem('pinnogram_chat_bg', value); // Сохраняем навсегда
}

// Сборка своего градиента
function applyCustomGradient() {
    const c1 = document.getElementById('color1').value;
    const c2 = document.getElementById('color2').value;
    const gradient = `linear-gradient(180deg, ${c1} 0%, ${c2} 100%)`;
    
    const chat = document.getElementById('chat');
    chat.style.backgroundImage = gradient;
    chat.style.backgroundColor = 'transparent';
    
    localStorage.setItem('pinnogram_chat_bg', gradient);
}

// ПРИ СТАРТЕ ЧАТА: Восстанавливаем фон
window.addEventListener('load', () => {
    const saved = localStorage.getItem('pinnogram_chat_bg');
    if (saved) {
        const chat = document.getElementById('chat');
        if (saved.startsWith('url') || saved.startsWith('linear')) {
            chat.style.backgroundImage = saved;
            chat.style.backgroundSize = 'cover';
        } else {
            chat.style.backgroundColor = saved;
        }
    }
});
// Открытие меню (ПК и Смартфон)
// 1. ОТКРЫТИЕ МЕНЮ
function openMenu(e, id, text, sender) {
    if (e.preventDefault) e.preventDefault();
    selectedMsgId = id;
    selectedMsgText = text;

    const menu = document.getElementById('msg-menu');
    menu.style.display = 'block';
    
    let x = e.clientX || (e.touches ? e.touches[0].clientX : 100);
    let y = e.clientY || (e.touches ? e.touches[0].clientY : 100);
    
    if (x + 180 > window.innerWidth) x -= 180;
    if (y + 200 > window.innerHeight) y -= 200;

    menu.style.left = x + 'px';
    menu.style.top = y + 'px';

    // Изменить - только для своих
    document.getElementById('edit-menu-btn').style.display = (sender === myName) ? 'flex' : 'none';

    // Настраиваем кнопку удаления
    const delBtn = document.getElementById('delete-menu-btn');
    if (sender === myName) {
        delBtn.textContent = "🗑 Удалить у всех";
        delBtn.style.color = "#ff4d4d";
    } else {
        delBtn.textContent = "👁 Скрыть у себя";
        delBtn.style.color = "#aaa";
    }
}

// 2. УДАЛЕНИЕ (ЕДИНАЯ ФУНКЦИЯ)
function confirmDelete() {
    const msgEl = document.getElementById(`msg-${selectedMsgId}`);
    const isMyMsg = msgEl && msgEl.style.flexDirection === 'row-reverse';

    if (isMyMsg) {
        if (!currentPartner) {
            alert("Нельзя удалить сообщения пользователей в общем чате!");
            document.getElementById('msg-menu').style.display = 'none';
            return;
        }
        if(confirm("Удалить сообщение у всех участников?")) {
            ws.send(`__DELETE__:${selectedMsgId}`);
        }
    } else {
        // Просто скрываем локально
        msgEl.style.transition = "0.3s";
        msgEl.style.opacity = "0";
        setTimeout(() => msgEl.remove(), 300);
    }
    document.getElementById('msg-menu').style.display = 'none';
}

// 3. ОСТАЛЬНЫЕ ФУНКЦИИ (Копирование, Ответ, Изменение)
function copyMsgText() {
    navigator.clipboard.writeText(selectedMsgText);
    document.getElementById('msg-menu').style.display = 'none';
}

function prepareReply() {
    replyToId = selectedMsgId;
    editMsgId = null;
    const msgEl = document.getElementById(`msg-${selectedMsgId}`);
    const actualText = msgEl ? msgEl.querySelector('.msg-text').textContent : selectedMsgText;
    showPreview("ОТВЕТ", actualText);
}

function prepareEdit() {
    editMsgId = selectedMsgId;
    replyToId = null;
    document.getElementById('messageText').value = selectedMsgText;
    showPreview("ИЗМЕНЕНИЕ", selectedMsgText);
}

function showPreview(type, text) {
    document.getElementById('action-type').textContent = type;
    document.getElementById('preview-text').textContent = text;
    document.getElementById('action-preview').style.display = 'block';
    document.getElementById('msg-menu').style.display = 'none';
    document.getElementById('messageText').focus();
}

function cancelAction() {
    editMsgId = null;
    replyToId = null;
    document.getElementById('action-preview').style.display = 'none';
    document.getElementById('messageText').value = "";
}

document.addEventListener('mousedown', (e) => {
    if (!e.target.closest('.context-menu')) {
        const menu = document.getElementById('msg-menu');
        if(menu) menu.style.display = 'none';
    }
});
// Глобальная функция для открытия досье пользователя
// ОБНОВЛЕННАЯ ФУНКЦИЯ ДОСЬЕ (на 6 параметров)
function showAdminDetail(name, ip, city, org, tz, asn) {
    const box = document.getElementById('admin-user-info');
    const content = document.getElementById('info-content');
    
    content.innerHTML = `
        <div class="info-content-row">
            <span class="info-label">IDENTIFIER (UID)</span>
            <b style="color:white; font-size:13px;">${name}</b>
        </div>
        <div class="info-content-row">
            <span class="info-label">NETWORK_ADDRESS (IPv4)</span>
            <span style="color:#00ff00;">${ip}</span>
        </div>
        <div class="info-content-row">
            <span class="info-label">GEOLOCATION_CITY</span>
            <span style="color:#00ff00;">${city || 'Private Node'}</span>
        </div>
        <div class="info-content-row">
            <span class="info-label">TIMEZONE (LOCAL)</span>
            <span style="color:#00ff00;">${tz || 'UTC'}</span>
        </div>
        <div class="info-content-row">
            <span class="info-label">ISP_PROVIDER_ORG</span>
            <span style="color:#00ff00;">${org || 'Unknown Network'}</span>
        </div>
        <div class="info-content-row">
            <span class="info-label">ASN_NETWORK_CODE</span>
            <span style="color:#00ff00;">${asn || 'N/A'}</span>
        </div>
        
        <div style="margin-top:20px; display:flex; gap:10px;">
            <button onclick="copyToClipboard('${ip}')" style="background:#1a1a1a; color:#00ff00; border:1px solid #00ff00; flex:1; font-size:10px; padding:8px; cursor:pointer; font-family:monospace; border-radius:5px;">COPY_IP</button>
            <button onclick="this.parentElement.parentElement.parentElement.style.display='none'" style="background:#333; color:white; border:none; flex:1; font-size:10px; padding:8px; cursor:pointer; font-family:monospace; border-radius:5px;">CLOSE</button>
        </div>
    `;
    
    box.style.display = 'block';
}


// Вспомогательная функция копирования
function copyToClipboard(text) {
    navigator.clipboard.writeText(text);
    const btn = event.target;
    btn.textContent = "COPIED_OK";
    setTimeout(() => btn.textContent = "COPY_IP", 1000);
}




</script>
    <!-- Вставь это перед </body> -->
<div id="msg-menu" class="context-menu">
    <div class="menu-item" onclick="prepareReply()">↩️ Ответ</div>
    <div class="menu-item" id="edit-menu-btn" onclick="prepareEdit()">✏️ Изменить</div>
    <div class="menu-item" onclick="copyMsgText()">📋 Копировать</div>
    <div id="delete-menu-btn" class="menu-item" onclick="confirmDelete()" style="border-top:1px solid #333; margin-top:5px; padding-top:10px;">🗑 Удалить</div>
</div>

</body>
