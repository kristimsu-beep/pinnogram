<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Pinnogram</title>
    <style>
        :root { --bg: #121212; --panel: #1e1e1e; --text: white; --msg-in: #2a2a2a; --msg-out: #0088cc; }
        .light-theme { --bg: #f0f2f5; --panel: #ffffff; --text: #1c1e21; --msg-in: #e4e6eb; --msg-out: #0084ff; }
        
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; transition: 0.3s; }
        #login-screen { background: #1e1e1e; padding: 40px; border-radius: 20px; text-align: center; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        #chat-screen { display: none; flex-direction: column; width: 450px; position: relative; }
        #chat { height: 500px; border: 1px solid #333; overflow-y: auto; padding: 15px; background: var(--panel); border-radius: 15px; display: flex; flex-direction: column; gap: 8px; }
        
        .msg { padding: 8px 12px; border-radius: 15px; max-width: 80%; font-size: 14px; position: relative; display: flex; flex-direction: column; cursor: pointer; }
        .msg-left { align-self: flex-start; background: var(--msg-in); border-bottom-left-radius: 2px; }
        .msg-right { align-self: flex-end; background: var(--msg-out); color: white; border-bottom-right-radius: 2px; }
        .msg-time { font-size: 10px; opacity: 0.6; align-self: flex-end; margin-top: 4px; }
        
        #typing-indicator { font-size: 12px; color: #00aaff; font-style: italic; height: 20px; margin: 5px 0 5px 10px; }
        .theme-btn { position: absolute; top: -40px; right: 0; cursor: pointer; background: #333; color: white; border: 1px solid #555; padding: 5px 10px; border-radius: 8px; }
        .emoji-bar { margin-bottom: 5px; display: flex; gap: 10px; font-size: 20px; user-select: none; }
        .emoji-bar span { cursor: pointer; transition: 0.2s; }
        .emoji-bar span:hover { transform: scale(1.3); }

        .controls { margin-top: 10px; display: flex; gap: 8px; width: 100%; align-items: center; }
        input { flex: 1; padding: 12px; border-radius: 10px; border: none; background: #222; color: white; outline: none; }
        .light-theme input { background: #eee; color: black; border: 1px solid #ccc; }
        
        button { padding: 10px 15px; border-radius: 10px; border: none; background: #0088cc; color: white; cursor: pointer; font-weight: bold; }
        .file-btn { background: #444; font-size: 18px; }
        /* Модальное окно для фото */
        #modal { display: none; position: fixed; z-index: 9999; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; cursor: zoom-out; }
        #modal img { max-width: 95%; max-height: 95%; border-radius: 10px; }

        /* Картинки в сообщениях */
        .msg img { width: 100%; max-width: 250px; border-radius: 10px; margin-top: 5px; cursor: zoom-in; display: block; }
        .msg-right img { border: 1px solid rgba(255,255,255,0.2); }

    </style>
</head>
<body>
    <div id="modal" onclick="this.style.display='none'">
    <img id="modal-img" src="" alt="Full view">
    </div>

    <audio id="notifSound" src="https://assets.mixkit.co"></audio>

    <div id="login-screen">
        <h2>Pinnogram</h2>
        <input type="text" id="nameInput" placeholder="Ваше имя..." autocomplete="off" style="width: 80%; padding: 10px; border-radius: 5px;">
        <br><br>
        <button onclick="saveNameAndStart()">Войти</button>
    </div>

    <div id="chat-screen">
        <button class="theme-btn" onclick="document.body.classList.toggle('light-theme')">🌓 Тема</button>
        <div id="chat"></div>
        <div id="typing-indicator"></div>
        
        <div class="emoji-bar">
            <span onclick="addEmoji('😊')">😊</span><span onclick="addEmoji('🔥')">🔥</span>
            <span onclick="addEmoji('😂')">😂</span><span onclick="addEmoji('❤️')">❤️</span>
            <span onclick="addEmoji('👍')">👍</span>
        </div>

        <div class="controls">
            <input type="file" id="fileInput" style="display:none" onchange="uploadFile()">
            <button class="file-btn" onclick="document.getElementById('fileInput').click()">📎</button>
            <input type="text" id="messageText" placeholder="Сообщение..." oninput="handleTyping()">
            <button onclick="sendMessage()">🚀</button>
        </div>
        <button onclick="localStorage.removeItem('pinnogram_user'); location.reload();" style="margin-top:15px; background:none; color:#555; font-size:10px; text-decoration: underline;">Сменить аккаунт</button>
    </div>

<script>
    let ws, 
        myName = localStorage.getItem("pinnogram_user"), 
        myRoom = localStorage.getItem("pinnogram_room"), 
        typingTimeout, 
        isTypingNow = false;

    const API_URL = "https://vye6dumplk.localto.net";
    const notifSound = new Audio("https://assets.mixkit.co");

    // АВТО-ВХОД: Если в памяти есть и имя, и комната — запускаем чат сразу
    if (myName && myRoom) {
        startChat(myName, myRoom);
    }

    function handleTyping() {
        if (!isTypingNow && ws?.readyState === 1) {
            isTypingNow = true; 
            ws.send("__TYPING__");
            setTimeout(() => { isTypingNow = false; }, 3000);
        }
    }

    async function uploadFile() {
        const fileInput = document.getElementById('fileInput');
        const file = fileInput.files[0];
        if (!file || !file.type.startsWith('image/')) return;

        const compressedFile = await compressImage(file);
        const formData = new FormData();
        formData.append("file", compressedFile, file.name);

        const res = await fetch(`${API_URL}/upload`, { method: "POST", body: formData });
        const data = await res.json();
        ws.send(data.url);
        fileInput.value = ''; // Очистка инпута после выбора
    }

    async function compressImage(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    const maxW = 800; 
                    const scale = maxW / img.width;
                    canvas.width = maxW; 
                    canvas.height = img.height * scale;
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    canvas.toBlob((blob) => resolve(blob), 'image/jpeg', 0.7);
                };
            };
        });
    }

    function startChat(name, room) {
        myName = name; 
        myRoom = room;
        
        document.getElementById("login-screen").style.display = "none";
        document.getElementById("chat-screen").style.display = "flex";
        
        // ВАЖНО: Подключаемся к комнате и передаем имя
        ws = new WebSocket(`ws://127.0.0.1:8000/ws/${room}/${encodeURIComponent(name)}`);

        ws.onmessage = (event) => {
            const raw = event.data;
            const chat = document.getElementById('chat');

            // 1. Обработка удаления
            if (raw.startsWith("DELETE_CONFIRM:")) {
                const id = raw.split(":")[1];
                document.getElementById(`msg-${id}`)?.remove();
                return;
            }

            // 2. Обработка статуса печати
            if (raw.startsWith("TYPING:")) {
                const typingUser = raw.split(":")[1];
                document.getElementById("typing-indicator").textContent = `${typingUser} печатает...`;
                clearTimeout(typingTimeout);
                typingTimeout = setTimeout(() => {
                    document.getElementById("typing-indicator").textContent = "";
                }, 2000);
                return;
            }

            // 3. Отрисовка сообщения
            const div = document.createElement('div');
            
            if (raw.startsWith("SYSTEM:")) {
                div.style.alignSelf = "center"; 
                div.style.fontSize = "11px"; 
                div.style.opacity = "0.5";
                div.textContent = raw.replace("SYSTEM: ", "");
            } else {
                // Парсим формат: ID:123|[12:00] User: Text
                const [idPart, content] = raw.split("|");
                const msgId = idPart.replace("ID:", "");
                const timeMatch = content.match(/\[(\d{2}:\d{2})\]/);
                const time = timeMatch ? timeMatch[1] : "--:--";
                
                const userAndText = content.replace(/^\[\d{2}:\d{2}\]\s*/, "");
                const [sender, ...textParts] = userAndText.split(": ");
                const text = textParts.join(": ");

                div.className = sender === myName ? 'msg msg-right' : 'msg msg-left';
                div.id = `msg-${msgId}`;
                
                <script>
    // --- НАСТРОЙКИ СЕРВЕРА ---
    // Твоя ссылка из Localtonet (без слэша в конце)
    const API_URL = "https://vye6dumplk.localto.net"; 

    // Автоматический расчет протоколов (ws/wss) для работы в интернете
    const socketProto = API_URL.startsWith("https") ? "wss" : "ws";
    const socketBase = API_URL.replace(/^https?:\/\//, "");

    let ws, 
        myName = localStorage.getItem("pinnogram_user"), 
        myRoom = localStorage.getItem("pinnogram_room"), 
        typingTimeout, 
        isTypingNow = false,
        mediaRecorder, 
        videoChunks = [];

    const notifSound = document.getElementById("notifSound");

    // АВТО-ВХОД
    if (myName && myRoom) {
        startChat(myName, myRoom);
    }

    function handleTyping() {
        if (!isTypingNow && ws?.readyState === 1) {
            isTypingNow = true; 
            ws.send("__TYPING__");
            setTimeout(() => { isTypingNow = false; }, 3000);
        }
    }

    async function uploadFile() {
        const fileInput = document.getElementById('fileInput');
        const file = fileInput.files[0];
        if (!file) return;
        const formData = new FormData();
        formData.append("file", file);
        const res = await fetch(`${API_URL}/upload`, { method: "POST", body: formData });
        const data = await res.json();
        ws.send(data.url);
        fileInput.value = '';
    }

    // ЛОГИКА ЗАПИСИ ПЯТИУГОЛЬНИКОВ
    async function toggleRecording() {
        const btn = document.getElementById("recordBtn");
        if (!mediaRecorder || mediaRecorder.state === "inactive") {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                mediaRecorder = new MediaRecorder(stream);
                videoChunks = [];
                mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) videoChunks.push(e.data); };
                mediaRecorder.onstop = async () => {
                    const videoBlob = new Blob(videoChunks, { type: 'video/mp4' });
                    await uploadVideo(videoBlob);
                    stream.getTracks().forEach(track => track.stop());
                };
                mediaRecorder.start();
                btn.classList.add("recording");
                btn.textContent = "🛑";
            } catch (err) { alert("Нет доступа к камере!"); }
        } else {
            mediaRecorder.stop();
            btn.classList.remove("recording");
            btn.textContent = "🎥";
        }
    }

    async function uploadVideo(blob) {
        const formData = new FormData();
        formData.append("file", blob, `video_${Date.now()}.mp4`);
        const res = await fetch(`${API_URL}/upload`, { method: "POST", body: formData });
        const data = await res.json();
        ws.send(data.url);
    }

    function startChat(name, room) {
        myName = name; myRoom = room;
        document.getElementById("login-screen").style.display = "none";
        document.getElementById("chat-screen").style.display = "flex";
        
        // ПОДКЛЮЧЕНИЕ ЧЕРЕЗ ТУННЕЛЬ
        ws = new WebSocket(`${socketProto}://${socketBase}/ws/${room}/${encodeURIComponent(name)}`);

        ws.onmessage = (event) => {
            const raw = event.data;
            const chat = document.getElementById('chat');

            if (raw.startsWith("DELETE_CONFIRM:")) {
                const id = raw.split(":")[1];
                document.getElementById(`msg-${id}`)?.remove();
                return;
            }

            if (raw.startsWith("TYPING:")) {
                const typingUser = raw.split(":")[1];
                document.getElementById("typing-indicator").textContent = `${typingUser} печатает...`;
                clearTimeout(typingTimeout);
                typingTimeout = setTimeout(() => document.getElementById("typing-indicator").textContent = "", 2000);
                return;
            }

            const div = document.createElement('div');
            if (raw.startsWith("SYSTEM:")) {
                div.style.alignSelf = "center"; div.style.fontSize = "11px"; div.style.opacity = "0.5";
                div.textContent = raw.replace("SYSTEM: ", "");
            } else {
                const [idPart, content] = raw.split("|");
                const msgId = idPart.replace("ID:", "");
                const timeMatch = content.match(/\[(\d{2}:\d{2})\]/);
                const time = timeMatch ? timeMatch[1] : "--:--";
                const userAndText = content.replace(/^\[\d{2}:\d{2}\]\s*/, "");
                const [sender, ...textParts] = userAndText.split(": ");
                const text = textParts.join(": ");

                div.className = sender === myName ? 'msg msg-right' : 'msg msg-left';
                div.id = `msg-${msgId}`;
                if (sender !== myName) notifSound.play().catch(() => {});

                // Распознавание фото и видео (пятиугольников)
                const isImg = text.match(/\.(jpg|jpeg|png|gif|webp)$/i);
                const isVideo = text.match(/\.(mp4|webm|mov)$/i);

                if (isImg) {
                    const img = document.createElement('img');
                    img.src = text;
                    img.onclick = () => { document.getElementById('modal-img').src = text; document.getElementById('modal').style.display = 'flex'; };
                    div.appendChild(img);
                } else if (isVideo) {
                    const video = document.createElement('video');
                    video.src = text; video.autoplay = true; video.loop = true; video.muted = true; video.playsInline = true;
                    video.onclick = () => video.muted = !video.muted;
                    div.appendChild(video);
                } else {
                    const txtSpan = document.createElement('span');
                    txtSpan.textContent = text;
                    div.appendChild(txtSpan);
                }
                
                const timeSpan = document.createElement('span');
                timeSpan.className = "msg-time"; timeSpan.textContent = time;
                div.appendChild(timeSpan);
                
                div.oncontextmenu = (e) => {
                    e.preventDefault();
                    if (sender === myName && confirm("Удалить сообщение?")) ws.send(`__DELETE__:${msgId}`);
                };
            }
            chat.appendChild(div);
            chat.scrollTo({ top: chat.scrollHeight, behavior: 'smooth' });
        };
    }

    function sendMessage() {
        const i = document.getElementById("messageText");
        if (i.value.trim() && ws) { ws.send(i.value); i.value = ''; }
    }

    function saveNameAndStart() {
        const n = document.getElementById("nameInput").value.trim();
        const r = prompt("ID комнаты (например: general):", "general")?.trim();
        if (n && r) { 
            localStorage.setItem("pinnogram_user", n); 
            localStorage.setItem("pinnogram_room", r); 
            startChat(n, r); 
        }
    }
    
    function addEmoji(emoji) {
        const i = document.getElementById("messageText");
        i.value += emoji; i.focus();
    }

    document.addEventListener("keypress", (e) => { if (e.key === "Enter") sendMessage(); });
</script>


</body>
</html>
