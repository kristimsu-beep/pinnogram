<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pinnogram Ultimate</title>
<style>
    :root { --bg: #121212; --panel: #1e1e1e; --text: white; --msg-in: #2a2a2a; --msg-out: #0088cc; --accent: #00aaff; }
    .light-theme { --bg: #f0f2f5; --panel: #ffffff; --text: #1c1e21; --msg-in: #e4e6eb; --msg-out: #0084ff; --accent: #0073e6; }
    * { box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; height: 100vh; margin: 0; transition: 0.3s; overflow: hidden; }

    /* Кнопки */
    button { background: var(--msg-out); color: white; border: none; padding: 12px 20px; border-radius: 12px; cursor: pointer; font-weight: bold; transition: 0.2s; }
    
    /* Исправленный блок кнопок: теперь идеально круглые */
    .controls button, .file-btn, .rec-btn { 
        width: 42px; /* Уменьшил до 42px, чтобы точно всё влезло на Xiaomi */
        height: 42px; 
        flex-shrink: 0; /* ЗАПРЕТ НА СПЛЮЩИВАНИЕ */
        padding: 0; 
        border-radius: 50% !important; 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        font-size: 18px; 
        border: none;
        cursor: pointer;
    }

    /* Фикс для аватарки в кнопках */
    #user-avatar-icon {
        width: 40px;
        height: 40px;
        flex-shrink: 0; 
        border-radius: 50%;
        object-fit: cover;
        border: 2px solid var(--accent);
    }

    #login-screen { margin: auto; background: var(--panel); padding: 30px; border-radius: 20px; text-align: center; width: 90%; max-width: 350px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
    #login-screen input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #444; background: #222; color: white; outline: none; }
    
    #chat-screen { 
    display: none; 
    flex-direction: column; 
    width: 100%; 
    max-width: 600px; 
    height: 100%; 
    position: relative; 
    padding: 10px;
    padding-bottom: env(safe-area-inset-bottom, 20px); /* ВОТ ЭТО ДОБАВЬ */
    }


    /* Пузыри сообщений */
    .msg { 
        padding: 10px 14px; 
        border-radius: 18px; 
        max-width: 75%; 
        font-size: 15px; 
        position: relative; 
        display: flex; 
        flex-direction: column; 
        box-shadow: 0 1px 2px rgba(0,0,0,0.2); 
        cursor: pointer;
        word-break: break-word; 
    }
    .msg-right { align-self: flex-end; background: var(--msg-out); color: white; border-bottom-right-radius: 4px; }
    .msg-left { align-self: flex-start; background: var(--msg-in); color: var(--text); border-bottom-left-radius: 4px; }
    .msg-row { display: flex; width: 100%; margin: 6px 0; gap: 8px; align-items: flex-end; }
    .msg-sender { font-size: 12px; font-weight: bold; margin-bottom: 2px; color: var(--accent); }
    .msg-time { font-size: 10px; opacity: 0.6; align-self: flex-end; margin-top: 4px; }
    .msg-text { display: block; line-height: 1.4; }

    /* Видео и фото */
    .msg video { 
        width: 220px; height: 220px; 
        object-fit: cover; 
        margin: 5px 0; 
        background: #000; 
        clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%); 
    }
    .msg img { max-width: 100%; border-radius: 12px; margin-top: 5px; }

    .emoji-bar { margin: 5px 0; display: flex; gap: 12px; font-size: 20px; user-select: none; padding-left: 5px; }
    .emoji-bar span { cursor: pointer; transition: 0.2s; }
    .emoji-bar span:hover { transform: scale(1.3); }

    /* Блок управления внизу */
    .controls { 
        margin-bottom: 10px; 
        display: flex; 
        gap: 6px; 
        width: 100%; 
        align-items: center; 
        padding: 0 5px; /* Боковые отступы, чтобы кнопки не улетали */
    }

    /* ФИНАЛЬНЫЙ ФИКС ТЕКСТОВОГО ПОЛЯ */
    .controls input { 
        flex: 1; 
        min-width: 0; /* Не дает текстовому полю вытеснять кнопки */
        padding: 12px 16px; 
        border-radius: 25px; 
        border: none; 
        background: var(--msg-in); 
        color: var(--text); 
        outline: none; 
        font-size: 16px; 
    }
    /* Стили для секретного окна админа */
       /* Стили для секретного окна админа - добавил перенос строк */
    #admin-panel {
        display: none;
        position: fixed;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.95);
        color: #00ff00;
        padding: 20px;
        border-radius: 15px;
        border: 1px solid #00ff00;
        z-index: 20000;
        font-family: monospace;
        box-shadow: 0 0 20px rgba(0, 255, 0, 0.4);
        min-width: 280px;
        max-width: 90%; /* Чтобы не вылезало на узких экранах */
        word-wrap: break-word;
    }

    #chat { 
        flex: 1; 
        border: 1px solid rgba(255,255,255,0.05); 
        overflow-y: auto; 
        padding: 15px; 
        background: var(--panel); 
        border-radius: 15px; 
        display: flex; 
        flex-direction: column; 
        gap: 6px; 
        scroll-behavior: smooth; /* Плавный скролл */
    }

    #video-call-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:black; z-index:10000; }
    #remoteVideo {
        width: 100vw !important;
        height: 100vh !important;
        object-fit: cover;
        background: #000 !important;
        display: block !important;
        image-rendering: -webkit-optimize-contrast;
        backface-visibility: hidden;
        perspective: 1000;
        transform: translate3d(0,0,0); 
    }
    /* Добавляем отступ снизу для всего экрана, чтобы жесты смартфона ничего не перекрывали */
    #chat-screen {
        padding-bottom: env(safe-area-inset-bottom, 20px);
    }
    /* Боковая панель чатов */
    #sidebar {
        display: none; 
        position: fixed; 
        top: 0; left: 0; 
        width: 280px; height: 100%; 
        background: var(--panel); 
        z-index: 1200; 
        box-shadow: 5px 0 15px rgba(0,0,0,0.5); 
        padding: 20px; 
        border-right: 1px solid var(--accent);
        flex-direction: column;
    }
    
    /* Элемент списка контактов */
    .contact-item {
        padding: 12px; 
        margin-bottom: 8px; 
        background: var(--msg-in); 
        border-radius: 10px; 
        cursor: pointer; 
        transition: 0.2s;
        display: flex;
        align-items: center;
        gap: 10px;
    }
    .contact-item:hover { background: var(--accent); color: white; }
    .contact-active { border: 2px solid var(--accent); background: var(--msg-out); }
    /* Стили для галочек (is_read) */
    .msg-status {
        font-size: 12px;
        margin-left: 5px;
        color: rgba(255,255,255,0.5); /* Серая - доставлено */
    }
    .msg-status.read {
        color: #4fc3f7; /* Голубая - прочитано */
    }
    
    /* Стили для голосовых сообщений */
    .voice-msg {
        display: flex;
        align-items: center;
        gap: 10px;
        background: rgba(0,0,0,0.1);
        padding: 8px;
        border-radius: 12px;
        min-width: 160px;
    }
    .voice-msg audio {
        height: 30px;
        width: 100%;
    }
    
    /* Пульсация при записи голоса */
    .voice-btn.recording {
        background: #ff3b30 !important;
        animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
        0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 59, 48, 0.7); }
        70% { transform: scale(1.1); box-shadow: 0 0 0 10px rgba(255, 59, 48, 0); }
        100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 59, 48, 0); }
    }



    #localVideo { width: 100px; height: 140px; position: absolute; bottom: 20px; right: 20px; border: 2px solid white; border-radius: 10px; object-fit: cover; z-index: 10002; }
    #modal { display: none; position: fixed; z-index: 9999; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; cursor: zoom-out; }
    #modal img { max-width: 95%; max-height: 95%; border-radius: 10px; }
    .rec-btn.recording { animation: blink 1s infinite; }
    @keyframes blink { 0% {opacity: 1} 50% {opacity: 0.5} 100% {opacity: 1} }

    @media (max-width: 600px) { 
    #chat-screen { 
        padding: 5px; 
        padding-bottom: env(safe-area-inset-bottom, 25px); /* Важно для Xiaomi */
    } 
    #chat { border-radius: 0; } 
    .controls { padding: 5px; margin: 0; } 
}
</style>

</head>
<body>
<!-- Кнопка МЕНЮ -->
<button onclick="toggleSidebar()" style="position:fixed; top:15px; left:15px; background:var(--panel); border:1px solid var(--accent); color:var(--accent); width:40px; height:40px; border-radius:50%; z-index:1100; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:20px;">☰</button>

<!-- БОКОВАЯ ПАНЕЛЬ -->
<div id="sidebar">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; margin-top:30px;">
        <h3 style="margin:0; color:var(--accent);">Диалоги</h3>
        <button onclick="toggleSidebar()" style="background:none; border:none; color:#777; font-size:20px; cursor:pointer;">✕</button>
    </div>
    
    <div onclick="switchChat(null)" id="global-chat-btn" class="contact-item contact-active">
        <span>🌐</span> <b>Общий чат</b>
    </div>
    
    <div style="font-size:11px; opacity:0.5; margin:15px 0 5px 5px; letter-spacing:1px;">ЛЮДИ ОНЛАЙН</div>
    <div id="contacts-list" style="overflow-y:auto; flex:1;">
        <!-- Сюда JS добавит людей -->
    </div>
    <button onclick="document.body.classList.toggle('light-theme')" 
            style="width:100%; margin-top:20px; padding:12px; background:var(--msg-in); border:1px solid var(--accent); color:var(--text); border-radius:10px; cursor:pointer; font-weight:bold;">
        🌓 Сменить тему
    </button>
</div>

<link rel="icon" href="data:,">

<!-- СЕКРЕТНОЕ ОКНО АДМИНА -->
<div id="admin-panel">
    <h3 style="margin:0 0 10px 0; color:#00ff00; border-bottom:1px solid #00ff00; padding-bottom:5px;">📡 NETWORK NODES</h3>
    <div id="admin-users-list" style="font-size:13px; line-height:1.6;">Загрузка данных...</div>
    <div style="font-size:10px; opacity:0.6; margin-top:15px;">Нажми Ctrl+B для закрытия</div>
</div>

<div id="video-call-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:black; z-index:10000;">
    <!-- Ссылка на видео должна быть с четким ID -->
    <video id="remoteVideo" autoplay playsinline style="width:100vw; height:100vh; object-fit:cover; position:absolute; top:0; left:0;"></video>
    <video id="localVideo" autoplay playsinline muted style="width:100px; height:140px; position:absolute; bottom:20px; right:20px; border:2px solid white; border-radius:10px; object-fit:cover; z-index:10005;"></video>
    
    <!-- Кнопка сброса ДОЛЖНА БЫТЬ ВИДИМОЙ -->
    <button onclick="endCall()" style="position:absolute; bottom:30px; left:50%; transform:translateX(-50%); background:red; width:70px; height:70px; border-radius:50% !important; z-index:10010; font-size:30px; border:none; color:white; cursor:pointer;">🛑</button>
</div>


    <div id="modal" onclick="this.style.display='none'"><img id="modal-img"></div>
    <audio id="notifSound" src="https://assets.mixkit.co/active_storage/sfx/2358/2358-preview.mp3"></audio>

    <div id="login-screen">
        <h2>Pinnogram</h2>
        <input type="text" id="nameInput" placeholder="Ваше имя...">
        <button onclick="saveNameAndStart()">Войти</button>
    </div>

        <div id="chat-screen">
        <div id="chat"></div>
        
        <div id="online-list" style="font-size:11px; color:var(--accent); opacity:0.8; margin:2px 5px; height:15px; overflow:hidden; white-space:nowrap; text-overflow:ellipsis;"></div>
        <div id="typing-indicator" style="font-size:12px; color:var(--accent); font-style:italic; margin:5px; height:15px;"></div>

        <div class="emoji-bar">
            <span onclick="addEmoji('😊')">😊</span><span onclick="addEmoji('🔥')">🔥</span>
            <span onclick="addEmoji('😂')">😂</span><span onclick="addEmoji('❤️')">❤️</span>
            <span onclick="addEmoji('👍')">👍</span>
        </div>
        <div class="controls">
            <img id="user-avatar-icon" onclick="changeAvatar()" src="https://i.ibb.co/4pSbxsh/user-avatar.png">
            
            <input type="file" id="fileInput" style="display:none" onchange="uploadFile()">
            <button class="file-btn" onclick="document.getElementById('fileInput').click()">📎</button>
            <button id="recordBtn" class="file-btn rec-btn" onclick="toggleRecording()">🎥</button>
            
            <!-- ДОБАВЬ ЭТУ КНОПКУ -->
            <button id="voiceBtn" class="file-btn voice-btn" 
                    onmousedown="startVoice()" onmouseup="stopVoice()" 
                    ontouchstart="startVoice()" ontouchend="stopVoice()">🎙</button>
        
            <button onclick="startCall()" style="background:#28a745;">📞</button>
            <input type="text" id="messageText" placeholder="Сообщение..." oninput="handleTyping()">
            <button onclick="sendMessage()">🚀</button>
        </div>
        </div>

        <button onclick="localStorage.clear(); location.reload();" 
        style="margin: 10px auto 20px; background: none; color: #777; font-size: 11px; text-decoration: underline; border: none; cursor: pointer; display: block;">Выйти из аккаунта</button>

    </div> <!-- Один закрывающий div для chat-screen -->
<script>
    const API_URL = window.location.origin;
    const socketProto = window.location.protocol === "https:" ? "wss" : "ws";
    const VAPID_PUBLIC_KEY = "BLfoNtD9uQWZ2sX_dUiQ698ze7J-JO8lnl8n03AG7Dt1fh1Io831wuAKgqHRcmLNXKMh99BzVusQWvx37jJNZis";

    let ws, myName = localStorage.getItem("pinnogram_user"), myRoom = localStorage.getItem("pinnogram_room");
    let currentPartner = localStorage.getItem("pinnogram_last_chat");
    if (currentPartner === "null" || currentPartner === "undefined") currentPartner = null;
    
    let unreadCounts = JSON.parse(localStorage.getItem("pinnogram_unread")) || {};
    let pc, localStream, mediaRecorder, videoChunks = [], typingTimeout, isTypingNow = false;
    let voiceRecorder, voiceChunks = []; // Для голосовых

    // Регистрация Service Worker для Push-уведомлений
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js').then(reg => {
                console.log('Service Worker зарегистрирован');
            }).catch(err => console.error('Ошибка SW:', err));
        });
    }

    async function subscribeToPush() {
        if (!('serviceWorker' in navigator)) return;
        try {
            const registration = await navigator.serviceWorker.ready;
            const subscription = await registration.pushManager.subscribe({
                userVisibleOnly: true,
                applicationServerKey: VAPID_PUBLIC_KEY
            });
            await fetch(`${API_URL}/subscribe`, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ username: myName, subscription: JSON.stringify(subscription) })
            });
            console.log("Push-подписка активна");
        } catch (e) { console.warn("Push заблокирован пользователем или не поддерживается"); }
    }

    if (myName && myRoom) startChat(myName, myRoom);

    function startChat(name, room) {
        myName = name; myRoom = room;
        document.getElementById("login-screen").style.display = "none";
        document.getElementById("chat-screen").style.display = "flex";
        
        ws = new WebSocket(`${socketProto}://${window.location.host}/ws/${room}/${encodeURIComponent(name)}`);

        ws.onopen = () => {
            console.log("Соединение установлено");
            ws.send(`GET_HISTORY:${currentPartner}`);
            subscribeToPush(); // Запрашиваем пуши при входе
        };

        ws.onmessage = async (event) => {
            const raw = event.data; // ВОТ ИСПРАВЛЕНИЕ: сначала объявляем raw
            const chat = document.getElementById('chat');

            // 1. ОБРАБОТКА СПИСКА ОНЛАЙН И КОНТАКТОВ
            if (raw.includes("ONLINE_LIST:")) {
                const parts = raw.split("ONLINE_LIST:");
                if (parts.length > 1) {
                    const users = parts[1].split(",");
                    const contactsList = document.getElementById("contacts-list");
                    
                    if (contactsList) {
                        contactsList.innerHTML = users.map(u => {
                            const name = u.split(" (")[0].trim();
                            if (!name || name === myName) return "";
                            const activeClass = (currentPartner === name) ? "contact-active" : "";
                            return `
                                <div onclick="switchChat('${name}')" class="contact-item ${activeClass}">
                                    <span>👤</span>
                                    <b style="flex:1">${name}</b>
                                    <div id="badge-${name}" class="unread-badge" style="display:none"></div>
                                </div>`;
                        }).join("");
                        updateUnreadUI(); 
                    }
                    const namesOnly = users.map(u => u.split(" (")[0]);
                    document.getElementById("online-list").textContent = `В сети: ${namesOnly.join(", ")}`;
                    const adminList = document.getElementById("admin-users-list");
                    if (adminList) adminList.innerHTML = users.map(u => `<div style="color:#00ff00;">> node: ${u}</div>`).join("");
                }
                return;
            }

            // 2. СИГНАЛЫ ЗВОНКА (RTC)
            if (raw.startsWith("RTC_SIGNAL:")) {
                handleSignalingData(JSON.parse(raw.replace("RTC_SIGNAL:", "")));
                return;
            }

            // 3. ПОДТВЕРЖДЕНИЕ УДАЛЕНИЯ
            if (raw.startsWith("DELETE_CONFIRM:")) {
                const delId = raw.split(":")[1];
                document.getElementById(`msg-${delId}`)?.remove();
                return;
            }

            // 4. ИНДИКАТОР ПЕЧАТИ
            if (raw.startsWith("TYPING:")) {
                const typingUser = raw.split(":")[1];
                document.getElementById("typing-indicator").textContent = `${typingUser} печатает...`;
                clearTimeout(typingTimeout);
                typingTimeout = setTimeout(() => document.getElementById("typing-indicator").textContent = "", 2000);
                return;
            }

            // 5. ОТРИСОВКА СООБЩЕНИЙ (С ГАЛОЧКАМИ И ГОЛОСОМ)
            const div = document.createElement('div');
            if (raw.includes("SYSTEM:")) {
                div.style = "align-self: center; font-size: 11px; opacity: 0.5; margin: 10px 0; text-align: center; width: 100%;";
                div.textContent = raw.split("SYSTEM: ")[1];
            } 
            else {
                const parts = raw.split("|");
                const idPart = parts[0] || "ID:0"; 
                const content = parts[1] || "";
                const avatarUrlFromSrv = parts[2] || "https://i.ibb.co";
                const isRead = parts[3] || "0"; // Читаем статус из Питера

                const isPrivate = content.includes("PRIVATE:");

                // Фильтр лички
                if (currentPartner) {
                    if (!content.includes(`PRIVATE:${currentPartner}:`) && !content.includes(`PRIVATE:${myName}:`)) return;
                } else {
                    if (isPrivate) return;
                }

                const displayContent = content.replace(/^PRIVATE:.*?:/, "");
                const msgId = idPart.replace("ID:", "");
                const timeMatch = displayContent.match(/\[(\d{2}:\d{2})\]/);
                const time = timeMatch ? timeMatch[1] : "--:--";
                const userAndText = displayContent.replace(/^\[\d{2}:\d{2}\]\s*/, "");
                const splitIdx = userAndText.indexOf(": ");
                const sender = userAndText.substring(0, splitIdx);
                const text = userAndText.substring(splitIdx + 2).trim();

                div.className = 'msg-row';
                div.id = `msg-${msgId}`;
                div.style.flexDirection = (sender === myName) ? 'row-reverse' : 'row';

                const avImg = document.createElement('img');
                avImg.src = avatarUrlFromSrv.length < 15 ? "https://i.ibb.co" : avatarUrlFromSrv;
                avImg.style = "width: 32px; height: 32px; border-radius: 50%; object-fit: cover; flex-shrink: 0;";
                div.appendChild(avImg);

                const msgBubble = document.createElement('div');
                msgBubble.className = (sender === myName) ? 'msg msg-right' : 'msg msg-left';
                
                if (sender !== myName) {
                    const nSpan = document.createElement('span');
                    nSpan.className = "msg-sender";
                    nSpan.textContent = sender;
                    msgBubble.appendChild(nSpan);
                }

                // ПРОВЕРКА НА ГОЛОСОВОЕ
                if (text.startsWith("VOICE:")) {
                    const audioUrl = text.replace("VOICE:", "");
                    msgBubble.innerHTML += `<div class="voice-msg">🎙<audio src="${audioUrl}" controls style="width:140px;height:30px"></audio></div>`;
                } else {
                    const lowerT = text.toLowerCase();
                    if ([".jpg", ".png", ".gif"].some(ext => lowerT.includes(ext))) {
                        msgBubble.innerHTML += `<img src="${text}" style="max-width:100%;border-radius:10px;margin-top:5px" onclick="window.open(this.src)">`;
                    } else if ([".mp4", ".webm"].some(ext => lowerT.includes(ext))) {
                        msgBubble.innerHTML += `<video src="${text}" controls style="max-width:100%;border-radius:10px"></video>`;
                    } else {
                        const s = document.createElement('span'); s.className="msg-text"; s.textContent=text; msgBubble.appendChild(s);
                    }
                }

                // ВРЕМЯ И ГАЛОЧКИ
                const tsWrap = document.createElement('div');
                tsWrap.style = "display:flex;align-items:center;justify-content:flex-end;gap:4px;margin-top:4px;";
                const ts = document.createElement('span'); ts.className="msg-time"; ts.textContent=time; tsWrap.appendChild(ts);

                if (sender === myName && currentPartner) {
                    const status = document.createElement('span');
                    status.className = isRead === "1" ? "msg-status read" : "msg-status";
                    status.textContent = isRead === "1" ? "✔✔" : "✔";
                    tsWrap.appendChild(status);
                }

// 1. Инициализация медиа и создание соединения
async function initRTCPeer(isCaller) {
    try {
        // 1. Доступ к камере
        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        document.getElementById('localVideo').srcObject = localStream;
        document.getElementById('video-call-overlay').style.display = 'block';

        const configuration = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { 
                    urls: 'turn:openrelay.metered.ca:443', 
                    username: 'openrelayproject', 
                    credential: 'openrelayproject' 
                }
            ]
        };

        pc = new RTCPeerConnection(configuration);

        // 2. Принудительно добавляем треки (самый надежный метод)
        localStream.getTracks().forEach(track => {
            pc.addTrack(track, localStream);
        });

        // 3. Настройка трансиверов и VP8 (для Xiaomi)
        const videoTransceiver = pc.getTransceivers().find(t => t.receiver.track.kind === 'video') || 
                                 pc.addTransceiver('video', { direction: 'sendrecv' });
        
        const codecs = RTCRtpSender.getCapabilities('video').codecs;
        const vp8Codecs = codecs.filter(c => c.mimeType.toLowerCase() === 'video/vp8');
        if (vp8Codecs.length > 0 && videoTransceiver.setCodecPreferences) {
            videoTransceiver.setCodecPreferences(vp8Codecs);
        }

        // 4. ОБРАБОТКА ВХОДЯЩЕГО ВИДЕО (ОБЯЗАТЕЛЬНО!)
        pc.ontrack = (event) => {
            console.log("ПОТОК ПОЛУЧЕН");
            const remoteVid = document.getElementById('remoteVideo');
            if (event.streams && event.streams[0]) {
                remoteVid.srcObject = event.streams[0];
            } else {
                remoteVid.srcObject = new MediaStream([event.track]);
            }

            // Разблокировка звука кликом по экрану
            const trigger = () => {
                forceRender();
                window.removeEventListener('click', trigger);
                window.removeEventListener('touchstart', trigger);
            };
            window.addEventListener('click', trigger);
            window.addEventListener('touchstart', trigger);
            setTimeout(forceRender, 1000);
        };

        // 5. СЕТЕВЫЕ ПУТИ
        pc.onicecandidate = e => {
            if (e.candidate) {
                ws.send("RTC_SIGNAL:" + JSON.stringify({ candidate: e.candidate, from: myName }));
            }
        };

        // 6. СОЗДАНИЕ ПРЕДЛОЖЕНИЯ
        if (isCaller) {
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            ws.send("RTC_SIGNAL:" + JSON.stringify({ offer: offer, from: myName }));
        }

    } catch (e) { 
        console.error(e);
        alert("Ошибка: " + e.message); 
        endCall(); 
    }
}


// 2. Обработка входящих сигналов (Signaling)
// 2. Обработка входящих сигналов (Signaling)
async function handleSignalingData(data) {
    if (data.from === myName) return;

    // 1. Входящий звонок (Offer)
    if (data.offer) {
        if (pc && pc.signalingState !== "closed" && pc.signalingState !== "stable") return;

        setTimeout(async () => {
            if (confirm(`Входящий звонок от ${data.from}. Принять?`)) {
                console.log("Принимаем вызов от: " + data.from);
                await initRTCPeer(false);
                await pc.setRemoteDescription(new RTCSessionDescription(data.offer));
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);
                ws.send("RTC_SIGNAL:" + JSON.stringify({ answer: answer, from: myName }));
                
                while (iceQueue.length > 0) {
                    try { await pc.addIceCandidate(iceQueue.shift()); } catch(e){}
                }
            }
        }, 100);
    } 
    
    // 2. Ответ на твой звонок (Answer) — ЧИСТЫЙ БЛОК БЕЗ ТАЙМЕРОВ (ДЛЯ iOS)
    else if (data.answer && pc) {
        if (pc.signalingState === "have-local-offer") {
            try {
                await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
                console.log("Связь установлена. Нажмите на экран для видео.");

                while (iceQueue.length > 0) {
                    try { await pc.addIceCandidate(iceQueue.shift()); } catch(e){}
                }
                
                // На iOS НЕЛЬЗЯ делать авто-play тут. 
                // Пользователь сам нажмет на экран, сработает forceRender из ontrack.
                
            } catch(e) { console.error("Ошибка:", e); }
        }
    }
    
    // 3. Сетевые пути (Candidates)
    else if (data.candidate) {
        const cand = new RTCIceCandidate(data.candidate);
        if (pc && pc.signalingState !== "closed" && pc.remoteDescription && pc.remoteDescription.type) {
            try { 
                await pc.addIceCandidate(cand); 
            } catch(e) { console.warn("ICE Error:", e); }
        } else {
            iceQueue.push(cand);
        }
    }
} // <--- ВОТ ЭТА СКОБКА БЫЛА ПРОПУЩЕНА

// 3. Вспомогательные функции
function endCall() { 
    if(pc) {
        try { pc.close(); } catch(e) {}
    }
    if(localStream) {
        localStream.getTracks().forEach(t => t.stop()); 
    }
    document.getElementById('video-call-overlay').style.display = 'none'; 
    pc = null; 
    iceQueue = []; // Очищаем очередь для нового звонка
}

        console.error("Ошибка загрузки:", e); 
        fileInput.value = ""; // Сбрасываем и при ошибке тоже
    }
}


async function compressImage(file) {
    return new Promise((resolve) => {
        const reader = new FileReader(); reader.readAsDataURL(file);
        reader.onload = (e) => {
            const img = new Image(); img.src = e.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const maxW = 800; const scale = maxW / img.width;
                canvas.width = maxW; canvas.height = img.height * scale;
                canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                canvas.toBlob((blob) => resolve(blob), 'image/jpeg', 0.7);
            };
        };
    });
}

// 2. Рисование красных ярлыков в боковом меню
function updateUnreadUI() {
    const items = document.querySelectorAll('.contact-item');
    items.forEach(item => {
        // Вырезаем имя из текста (убираем иконку 👤)
        const name = item.textContent.replace('👤 ', '').trim();
        const count = unreadCounts[name] || 0;
        
        let badge = item.querySelector('.unread-badge');
        if (count > 0) {
            if (!badge) {
                badge = document.createElement('span');
                badge.className = 'unread-badge';
                badge.style = "background:#ff3b30; color:white; border-radius:10px; padding:1px 6px; font-size:11px; margin-left:auto; font-weight:bold; box-shadow:0 0 5px rgba(0,0,0,0.3);";
                item.appendChild(badge);
            }
            badge.textContent = count;
        } else if (badge) {
            badge.remove();
        }
    });
}

// 3. Умное переключение чата с подгрузкой истории
function switchChat(partner) {
    currentPartner = partner;
    // Запоминаем выбор (чтобы не вылетало в общий чат при обновлении)
    localStorage.setItem("pinnogram_last_chat", partner); 
    
    const chat = document.getElementById('chat');
    chat.innerHTML = "<div style='text-align:center; opacity:0.3; margin-top:20px;'>Загрузка истории...</div>"; 

    // Просим у сервера историю именно для этого чата (партнер или null)
    ws.send(`GET_HISTORY:${partner}`);

    // Сбрасываем уведомления для этого человека
    if (partner && unreadCounts[partner]) {
        unreadCounts[partner] = 0;
        saveUnread();
        updateUnreadUI();
    }

    // Красивая подсветка активного диалога
    document.querySelectorAll('.contact-item').forEach(el => el.classList.remove('contact-active'));
    if (!partner) {
        document.getElementById('global-chat-btn').classList.add('contact-active');
    } else {
        // Ищем элемент по тексту и подсвечиваем
        Array.from(document.querySelectorAll('.contact-item'))
             .find(el => el.textContent.includes(partner))?.classList.add('contact-active');
    }
    
    toggleSidebar();
}
