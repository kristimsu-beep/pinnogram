<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pinnogram Ultimate</title>
<style>
    :root { --bg: #121212; --panel: #1e1e1e; --text: white; --msg-in: #2a2a2a; --msg-out: #0088cc; --accent: #00aaff; }
    .light-theme { --bg: #f0f2f5; --panel: #ffffff; --text: #1c1e21; --msg-in: #e4e6eb; --msg-out: #0084ff; --accent: #0073e6; }
    * { box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; height: 100vh; margin: 0; transition: 0.3s; overflow: hidden; }

    /* Контейнеры чата */
    #chat-screen { display: none; flex-direction: column; width: 100%; max-width: 600px; height: 100%; position: relative; padding: 10px; }
    #chat { flex: 1; overflow-y: auto; padding: 15px; background: var(--panel); border-radius: 15px; display: flex; flex-direction: column; gap: 8px; border: 1px solid rgba(255,255,255,0.05); }

    /* Сообщения (Telegram Style) */
    .msg-row { display: flex; gap: 10px; align-items: flex-end; width: 100%; margin-bottom: 4px; }
    .msg-row-out { flex-direction: row-reverse; }

    .msg { padding: 10px 14px; border-radius: 16px; max-width: 75%; font-size: 15px; position: relative; display: flex; flex-direction: column; box-shadow: 0 1px 2px rgba(0,0,0,0.15); word-break: break-word; cursor: pointer; }
    .msg-left { background: var(--msg-in); border-bottom-left-radius: 4px; }
    .msg-right { background: var(--msg-out); color: white; border-bottom-right-radius: 4px; }
    
    .msg-sender { font-size: 12px; font-weight: bold; margin-bottom: 2px; color: var(--accent); }
    .msg-time { font-size: 10px; opacity: 0.6; align-self: flex-end; margin-top: 4px; }

    /* Видео-кружки (clip-path удален для стабильности Xiaomi, заменен на border-radius) */
    .msg video { width: 200px; height: 200px; object-fit: cover; border-radius: 50% !important; border: 2px solid var(--accent); background: #000; }
    .msg img { max-width: 100%; border-radius: 10px; margin-top: 5px; }

    /* Интерфейс */
    .controls { margin-bottom: 10px; display: flex; gap: 8px; width: 100%; align-items: center; }
    .controls input { flex: 1; padding: 12px 16px; border-radius: 25px; border: none; background: var(--msg-in); color: var(--text); outline: none; }
    button { background: var(--msg-out); color: white; border: none; padding: 12px 20px; border-radius: 12px; cursor: pointer; font-weight: bold; }
    .file-btn, .rec-btn { width: 45px; height: 45px; border-radius: 50% !important; display: flex; align-items: center; justify-content: center; padding: 0; }

    /* Видеозвонок */
    #video-call-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:black; z-index:10000; }
    #remoteVideo { width: 100vw; height: 100vh; object-fit: cover; transform: translate3d(0,0,0); }
    #localVideo { width: 100px; height: 140px; position: absolute; bottom: 100px; right: 20px; border: 2px solid white; border-radius: 10px; object-fit: cover; }

    #modal { display: none; position: fixed; z-index: 9999; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; }
    .rec-btn.recording { animation: blink 1s infinite; background: red !important; }
    @keyframes blink { 0% {opacity: 1} 50% {opacity: 0.5} 100% {opacity: 1} }
</style>
</head>
<body>

<div id="video-call-overlay">
    <video id="remoteVideo" autoplay playsinline></video>
    <video id="localVideo" autoplay playsinline muted></video>
    <div style="position:absolute; top:20px; width:100%; text-align:center; color:white; font-size:12px;">Нажмите на экран для звука</div>
    <button onclick="endCall()" style="position:absolute; bottom:30px; left:50%; transform:translateX(-50%); background:red; width:70px; height:70px; border-radius:50% !important; font-size:30px;">🛑</button>
</div>

<div id="modal" onclick="this.style.display='none'"><img id="modal-img" style="max-width:90%"></div>
<audio id="notifSound" src="https://assets.mixkit.co"></audio>

<div id="login-screen" style="margin-top:100px; text-align:center;">
    <h2>Pinnogram</h2>
    <input type="text" id="nameInput" placeholder="Имя..." style="padding:10px; border-radius:10px;"><br><br>
    <button onclick="saveNameAndStart()">Войти</button>
</div>

<div id="chat-screen">
    <div id="chat"></div>
    <div id="online-list" style="font-size:11px; color:var(--accent); margin:5px;"></div>
    <div id="typing-indicator" style="font-size:12px; height:15px; margin:5px;"></div>
    <div class="controls">
        <img id="user-avatar-icon" onclick="changeAvatar()" src="https://www.w3schools.com" style="width:40px; height:40px; border-radius:50%; cursor:pointer; object-fit:cover;">
        <input type="file" id="fileInput" style="display:none" onchange="uploadFile()">
        <button class="file-btn" onclick="document.getElementById('fileInput').click()">📎</button>
        <button id="recordBtn" class="file-btn rec-btn" onclick="toggleRecording()">🎥</button>
        <button onclick="startCall()" style="background:#28a745;">📞</button>
        <input type="text" id="messageText" placeholder="Сообщение..." oninput="handleTyping()">
        <button onclick="sendMessage()">🚀</button>
    </div>
</div>

<script>
    const API_URL = window.location.origin;
    const socketProto = window.location.protocol === "https:" ? "wss" : "ws";
    let ws, myName = localStorage.getItem("pinnogram_user"), pc, localStream, iceQueue = [], mediaRecorder, videoChunks = [];

    if (myName) startChat(myName);

    function startChat(name) {
        myName = name;
        document.getElementById("login-screen").style.display = "none";
        document.getElementById("chat-screen").style.display = "flex";
        ws = new WebSocket(`${socketProto}://${window.location.host}/ws/general/${encodeURIComponent(name)}`);

        ws.onmessage = async (event) => {
            const raw = event.data;
            const chat = document.getElementById('chat');

            if (raw.startsWith("RTC_SIGNAL:")) { handleSignalingData(JSON.parse(raw.replace("RTC_SIGNAL:", ""))); return; }
            if (raw.startsWith("DELETE_CONFIRM:")) { document.getElementById(`msg-${raw.split(":")[1]}`)?.parentElement?.remove(); return; }
            if (raw.startsWith("TYPING:")) {
                document.getElementById("typing-indicator").textContent = `${raw.split(":")[1]} печатает...`;
                setTimeout(() => document.getElementById("typing-indicator").textContent = "", 2000);
                return;
            }
            if (raw.includes("ONLINE_LIST:")) {
                document.getElementById("online-list").textContent = "В сети: " + raw.split("ONLINE_LIST:")[1];
                return;
            }

            const parts = raw.split("|");
            const msgId = parts[0].replace("ID:","");
            const content = parts[1];
            const avatarUrl = parts[2] || "https://www.w3schools.com";

            const row = document.createElement('div');
            if (raw.includes("SYSTEM:")) {
                row.style = "align-self:center; font-size:11px; opacity:0.5; margin:5px;";
                row.textContent = raw.split("SYSTEM: ")[1];
            } else {
                const time = (content.match(/\[(\d{2}:\d{2})\]/) || ["","--:--"])[1];
                const userAndText = content.replace(/^\[\d{2}:\d{2}\]\s*/, "");
                const sender = userAndText.split(": ")[0];
                const text = userAndText.split(": ")[1];

                row.className = sender === myName ? 'msg-row msg-row-out' : 'msg-row';
                if (sender !== myName) {
                    const av = document.createElement('img'); av.src = avatarUrl;
                    av.style = "width:32px; height:32px; border-radius:50%; object-fit:cover;";
                    row.appendChild(av);
                }

                const msg = document.createElement('div');
                msg.className = sender === myName ? 'msg msg-right' : 'msg msg-left';
                msg.id = `msg-${msgId}`;
                
                if (sender !== myName) {
                    const sn = document.createElement('span'); sn.className="msg-sender"; sn.textContent=sender;
                    msg.appendChild(sn);
                    document.getElementById("notifSound").play().catch(()=>{});
                }

                const lt = text.toLowerCase();
                if ([".jpg",".jpeg",".png",".gif",".webp"].some(e => lt.includes(e))) {
                    const img = document.createElement('img'); img.src = text.trim();
                    img.onclick = () => { document.getElementById('modal-img').src=img.src; document.getElementById('modal').style.display='flex'; };
                    msg.appendChild(img);
                } else if ([".mp4",".webm",".mov"].some(e => lt.includes(e))) {
                    const v = document.createElement('video'); v.src = text.trim();
                    v.autoplay=true; v.loop=true; v.muted=true; v.playsInline=true; v.controls=true;
                    msg.appendChild(v);
                } else {
                    const tx = document.createElement('span'); tx.textContent = text;
                    msg.appendChild(tx);
                }

                const tm = document.createElement('span'); tm.className="msg-time"; tm.textContent=time;
                msg.appendChild(tm);
                row.appendChild(msg);

                row.oncontextmenu = (e) => {
                    e.preventDefault();
                    if (sender === myName && confirm("Удалить?")) ws.send(`__DELETE__:${msgId}`);
                };
            }
            chat.appendChild(row);
            chat.scrollTop = chat.scrollHeight;
        };
    }

    // --- WEBRTC CORE ---
    const forceRender = async () => {
        const vid = document.getElementById('remoteVideo');
        if (!vid || !vid.srcObject) return;
        try {
            vid.muted = false; await vid.play();
            vid.style.transform = "scale(1.02) translateZ(0)";
            setTimeout(() => vid.style.transform = "scale(1) translateZ(0)", 200);
        } catch (e) {}
    };

    async function initRTCPeer(isCaller) {
        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        document.getElementById('localVideo').srcObject = localStream;
        document.getElementById('video-call-overlay').style.display = 'block';

        pc = new RTCPeerConnection({ iceServers: [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'turn:openrelay.metered.ca:443', username: 'openrelayproject', credential: 'openrelayproject' }] });
        localStream.getTracks().forEach(t => pc.addTransceiver(t, { streams: [localStream], direction: 'sendrecv' }));

        pc.ontrack = (e) => {
            document.getElementById('remoteVideo').srcObject = e.streams[0];
            window.addEventListener('click', forceRender, {once:true});
            window.addEventListener('touchstart', forceRender, {once:true});
        };

        pc.onicecandidate = e => e.candidate && ws.send("RTC_SIGNAL:" + JSON.stringify({ candidate: e.candidate, from: myName }));

        if (isCaller) {
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            ws.send("RTC_SIGNAL:" + JSON.stringify({ offer, from: myName }));
        }
    }

    async function handleSignalingData(data) {
        if (data.from === myName) return;
        if (data.offer) {
            if (confirm("Вызов от " + data.from)) {
                await initRTCPeer(false);
                await pc.setRemoteDescription(new RTCSessionDescription(data.offer));
                const ans = await pc.createAnswer();
                await pc.setLocalDescription(ans);
                ws.send("RTC_SIGNAL:" + JSON.stringify({ answer: ans, from: myName }));
                while(iceQueue.length) pc.addIceCandidate(iceQueue.shift());
            }
        } else if (data.answer) {
            await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
            while(iceQueue.length) pc.addIceCandidate(iceQueue.shift());
        } else if (data.candidate) {
            const c = new RTCIceCandidate(data.candidate);
            if(pc && pc.remoteDescription) pc.addIceCandidate(c); else iceQueue.push(c);
        }
    }

    // --- AUTH & FILES ---
    async function saveNameAndStart() {
        const name = document.getElementById("nameInput").value.trim();
        const pass = localStorage.getItem("pinnogram_pass") || prompt("Пароль:");
        if (!name || !pass) return;
        const res = await fetch(`${API_URL}/auth`, { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify({ username: name, password: pass }) });
        const d = await res.json();
        if (d.status === "ok") {
            localStorage.setItem("pinnogram_user", name);
            localStorage.setItem("pinnogram_pass", pass);
            document.getElementById("user-avatar-icon").src = d.avatar || "https://www.w3schools.com";
            startChat(name);
        } else { alert(d.message); localStorage.removeItem("pinnogram_pass"); }
    }

    async function changeAvatar() {
        const inp = document.createElement('input'); inp.type = 'file'; inp.accept = 'image/*';
        inp.onchange = async () => {
            const blob = await compressImage(inp.files[0]);
            const fd = new FormData(); fd.append("file", blob, "avatar.jpg");
            const d = await (await fetch(`${API_URL}/upload`, {method:"POST", body:fd})).json();
            if (d.url) {
                document.getElementById("user-avatar-icon").src = d.url;
                await fetch(`${API_URL}/update_avatar`, { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify({ username: myName, avatar: d.url }) });
            }
        };
        inp.click();
    }

    function sendMessage() {
        const i = document.getElementById("messageText");
        if (!i.value.trim()) return;
        ws.send(`TIME:${new Date().toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'})}|${i.value}`);
        i.value = '';
    }

    async function uploadFile() {
        const f = document.getElementById('fileInput').files[0];
        if (!f) return;
        const blob = f.type.startsWith('image/') ? await compressImage(f) : f;
        const fd = new FormData(); fd.append("file", blob, f.name);
        const d = await (await fetch(`${API_URL}/upload`, {method:"POST", body:fd})).json();
        ws.send(d.url);
    }

    async function compressImage(f) {
        return new Promise(res => {
            const r = new FileReader(); r.readAsDataURL(f);
            r.onload = e => {
                const img = new Image(); img.src = e.target.result;
                img.onload = () => {
                    const cv = document.createElement('canvas'); const w = 800; const s = w/img.width;
                    cv.width = w; cv.height = img.height*s;
                    cv.getContext('2d').drawImage(img, 0, 0, w, cv.height);
                    cv.toBlob(b => res(b), 'image/jpeg', 0.7);
                };
            };
        });
    }

    async function toggleRecording() {
        const btn = document.getElementById("recordBtn");
        if (!mediaRecorder || mediaRecorder.state === "inactive") {
            const s = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            mediaRecorder = new MediaRecorder(s); videoChunks = [];
            mediaRecorder.ondataavailable = e => videoChunks.push(e.data);
            mediaRecorder.onstop = async () => {
                const fd = new FormData(); fd.append("file", new Blob(videoChunks, {type:'video/mp4'}), `v_${Date.now()}.mp4`);
                const d = await (await fetch(`${API_URL}/upload`, {method:"POST", body:fd})).json();
                ws.send(d.url);
                s.getTracks().forEach(t=>t.stop());
            };
            mediaRecorder.start(); btn.classList.add("recording"); btn.textContent="🛑";
        } else { mediaRecorder.stop(); btn.classList.remove("recording"); btn.textContent="🎥"; }
    }

    function handleTyping() { ws.send("__TYPING__"); }
    function addEmoji(e) { document.getElementById("messageText").value += e; }
    function endCall() { if(pc) pc.close(); localStream?.getTracks().forEach(t=>t.stop()); document.getElementById('video-call-overlay').style.display='none'; }
    function startCall() { initRTCPeer(true); }
    document.addEventListener("keypress", e => { if (e.key === "Enter") sendMessage(); });
</script>
</body>
</html>
