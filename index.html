<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pinnogram Ultimate</title>
<style>
    :root { --bg: #121212; --panel: #1e1e1e; --text: white; --msg-in: #2a2a2a; --msg-out: #0088cc; --accent: #00aaff; }
    .light-theme { --bg: #f0f2f5; --panel: #ffffff; --text: #1c1e21; --msg-in: #e4e6eb; --msg-out: #0084ff; --accent: #0073e6; }
    * { box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; display: flex; flex-direction: column; align-items: center; height: 100vh; margin: 0; transition: 0.3s; overflow: hidden; }

    /* Кнопки */
    button { background: var(--msg-out); color: white; border: none; padding: 12px 20px; border-radius: 12px; cursor: pointer; font-weight: bold; transition: 0.2s; }
    .controls button, .file-btn, .rec-btn { width: 45px; height: 45px; padding: 0; border-radius: 50% !important; display: flex; align-items: center; justify-content: center; }

    #login-screen { margin: auto; background: var(--panel); padding: 30px; border-radius: 20px; text-align: center; width: 90%; max-width: 350px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
    #login-screen input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #444; background: #222; color: white; outline: none; }
    
    #chat-screen { display: none; flex-direction: column; width: 100%; max-width: 600px; height: 100%; position: relative; padding: 10px; }
    #chat { flex: 1; border: 1px solid rgba(255,255,255,0.05); overflow-y: auto; padding: 15px; background: var(--panel); border-radius: 15px; display: flex; flex-direction: column; gap: 6px; }

    .msg { padding: 8px 12px; border-radius: 16px; max-width: 85%; font-size: 15px; position: relative; display: flex; flex-direction: column; box-shadow: 0 1px 2px rgba(0,0,0,0.15); cursor: pointer; }
    .msg-left { align-self: flex-start; background: var(--msg-in); border-bottom-left-radius: 4px; }
    .msg-right { align-self: flex-end; background: var(--msg-out); color: white; border-bottom-right-radius: 4px; }
    .msg-sender { font-size: 12px; font-weight: bold; margin-bottom: 2px; color: var(--accent); }
    .msg-time { font-size: 10px; opacity: 0.6; align-self: flex-end; margin-top: 4px; }

    .msg video { width: 200px; height: 200px; object-fit: cover; margin: 5px 0; background: #000; border-radius: 0 !important; clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%); }
    .msg img { max-width: 100%; border-radius: 10px; margin-top: 5px; }

    .emoji-bar { margin: 5px 0; display: flex; gap: 12px; font-size: 20px; user-select: none; padding-left: 5px; }
    .emoji-bar span { cursor: pointer; transition: 0.2s; }
    .emoji-bar span:hover { transform: scale(1.3); }

    .controls { margin-bottom: 10px; display: flex; gap: 8px; width: 100%; align-items: center; }
    .controls input[type="text"] { flex: 1; padding: 12px 16px; border-radius: 25px; border: none; background: var(--msg-in); color: var(--text); outline: none; font-size: 16px; }

    #video-call-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:black; z-index:10000; }
    #remoteVideo {
        width: 100vw !important;
        height: 100vh !important;
        object-fit: cover;
        background: #000 !important;
        display: block !important;
        /* ФИКС ДЛЯ XIAOMI: */
        image-rendering: -webkit-optimize-contrast;
        backface-visibility: hidden;
        perspective: 1000;
        transform: translate3d(0,0,0); /* Принудительный слой GPU */
    }






    #localVideo { 
        width: 100px; 
        height: 140px; 
        position: absolute; 
        bottom: 20px; 
        right: 20px; 
        border: 2px solid white; 
        border-radius: 10px; 
        object-fit: cover; 
        z-index: 10002; 
    }



    #modal { display: none; position: fixed; z-index: 9999; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; cursor: zoom-out; }
    #modal img { max-width: 95%; max-height: 95%; border-radius: 10px; }

    .rec-btn.recording { animation: blink 1s infinite; }
    @keyframes blink { 0% {opacity: 1} 50% {opacity: 0.5} 100% {opacity: 1} }

    @media (max-width: 600px) { #chat-screen { padding: 0; } #chat { border-radius: 0; } .controls { padding: 10px; margin: 0; } }
</style>
</head>
<body>
<div id="video-call-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:black; z-index:10000;">
    <!-- Ссылка на видео должна быть с четким ID -->
    <video id="remoteVideo" autoplay playsinline style="width:100vw; height:100vh; object-fit:cover; position:absolute; top:0; left:0;"></video>
    <video id="localVideo" autoplay playsinline muted style="width:100px; height:140px; position:absolute; bottom:20px; right:20px; border:2px solid white; border-radius:10px; object-fit:cover; z-index:10005;"></video>
    
    <!-- Кнопка сброса ДОЛЖНА БЫТЬ ВИДИМОЙ -->
    <button onclick="endCall()" style="position:absolute; bottom:30px; left:50%; transform:translateX(-50%); background:red; width:70px; height:70px; border-radius:50% !important; z-index:10010; font-size:30px; border:none; color:white; cursor:pointer;">🛑</button>
</div>


    <div id="modal" onclick="this.style.display='none'"><img id="modal-img"></div>
    <audio id="notifSound" src="https://assets.mixkit.co"></audio>

    <div id="login-screen">
        <h2>Pinnogram</h2>
        <input type="text" id="nameInput" placeholder="Ваше имя...">
        <button onclick="saveNameAndStart()">Войти</button>
    </div>

    <div id="chat-screen">
        <button class="theme-btn" style="position:absolute; top:-35px; right:10px; background:none; color:var(--accent); border:none; cursor:pointer;" onclick="document.body.classList.toggle('light-theme')">🌓 Тема</button>
        <div id="chat"></div>
        <!-- 1. Список тех, кто в комнате -->
        <div id="online-list" style="font-size:11px; color:var(--accent); opacity:0.8; margin:2px 5px; height:15px; overflow:hidden; white-space:nowrap; text-overflow:ellipsis;"></div>
        
        <!-- 2. Индикатор набора текста (НУЖЕН ДЛЯ JS) -->
        <div id="typing-indicator" style="font-size:12px; color:var(--accent); font-style:italic; margin:5px; height:15px;"></div>

        
        <div class="emoji-bar">
            <span onclick="addEmoji('😊')">😊</span><span onclick="addEmoji('🔥')">🔥</span>
            <span onclick="addEmoji('😂')">😂</span><span onclick="addEmoji('❤️')">❤️</span>
            <span onclick="addEmoji('👍')">👍</span>
        </div>

        <div class="controls">
            <input type="file" id="fileInput" style="display:none" onchange="uploadFile()">
            <button class="file-btn" onclick="document.getElementById('fileInput').click()">📎</button>
            <button id="recordBtn" class="file-btn rec-btn" onclick="toggleRecording()">🎥</button>
            <button onclick="startCall()" style="background:#28a745;">📞</button>
            <input type="text" id="messageText" placeholder="Сообщение..." oninput="handleTyping()">
            <button onclick="sendMessage()">🚀</button>
        </div>
        <button onclick="localStorage.clear(); location.reload();" style="margin-bottom:5px; background:none; color:#555; font-size:10px; text-decoration: underline; border:none; cursor:pointer;">Выйти</button>
    </div>

<script>
    const API_URL = window.location.origin;
    const socketProto = window.location.protocol === "https:" ? "wss" : "ws";
    let ws, myName = localStorage.getItem("pinnogram_user"), myRoom = localStorage.getItem("pinnogram_room");
    let pc, localStream, mediaRecorder, videoChunks = [], typingTimeout, isTypingNow = false;

    if (myName && myRoom) startChat(myName, myRoom);

    function startChat(name, room) {
        myName = name; myRoom = room;
        document.getElementById("login-screen").style.display = "none";
        document.getElementById("chat-screen").style.display = "flex";
        ws = new WebSocket(`${socketProto}://${window.location.host}/ws/${room}/${encodeURIComponent(name)}`);

ws.onmessage = async (event) => {
    const raw = event.data;
    const chat = document.getElementById('chat');
    if (raw.includes("ONLINE_LIST:")) {
        const parts = raw.split("ONLINE_LIST:");
        if (parts.length > 1) {
            const users = parts[1].split(",");
            const el = document.getElementById("online-list");
            if (el) {
                el.textContent = `В сети: ${users.join(", ")}`;
            }
            console.log("Обновлен список онлайн:", users);
        }
        return;
    }



    // 1. Сигналы звонка (WebRTC)
    if (raw.startsWith("RTC_SIGNAL:")) {
        handleSignalingData(JSON.parse(raw.replace("RTC_SIGNAL:", "")));
        return;
    }

    // 2. Подтверждение удаления
    if (raw.startsWith("DELETE_CONFIRM:")) {
        const delId = raw.split(":")[1];
        document.getElementById(`msg-${delId}`)?.remove();
        return;
    }

    // 3. Индикатор печати
    if (raw.startsWith("TYPING:")) {
        const typingUser = raw.split(":")[1];
        document.getElementById("typing-indicator").textContent = `${typingUser} печатает...`;
        clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => document.getElementById("typing-indicator").textContent = "", 2000);
        return;
    }

    const div = document.createElement('div');

    // 4. Системные сообщения (вход/выход)
    if (raw.includes("SYSTEM:")) {
        div.style.alignSelf = "center"; 
        div.style.fontSize = "11px"; 
        div.style.opacity = "0.5";
        div.style.margin = "10px 0";
        div.textContent = raw.split("SYSTEM: ")[1];
    } else {
        // 5. Обычные сообщения
        const [idPart, content] = raw.split("|");
        const msgId = idPart.replace("ID:", "");
        
        // Извлекаем время [HH:MM]
        const timeMatch = content.match(/\[(\d{2}:\d{2})\]/);
        const time = timeMatch ? timeMatch[1] : "--:--";
        
        // Извлекаем отправителя и текст
        const userAndText = content.replace(/^\[\d{2}:\d{2}\]\s*/, "");
        const splitIdx = userAndText.indexOf(": ");
        const sender = userAndText.substring(0, splitIdx);
        
        // --- ВОТ ЭТИ СТРОКИ ВАЖНО ВЕРНУТЬ ---
        const text = userAndText.substring(splitIdx + 2);
        const cleanText = text.trim();
        const lowerText = cleanText.toLowerCase();

        div.className = sender === myName ? 'msg msg-right' : 'msg msg-left';
        div.id = `msg-${msgId}`;

        if (sender !== myName) {
            const nSpan = document.createElement('span');
            nSpan.className = "msg-sender";
            nSpan.textContent = sender;
            div.appendChild(nSpan);
            document.getElementById("notifSound").play().catch(() => {});
        }

        // Улучшенная проверка на медиа (найдет расширение в любом месте ссылки)
        const isImg = [".jpg", ".jpeg", ".png", ".gif", ".webp", ".heic"].some(ext => lowerText.includes(ext));
        const isVideo = [".mp4", ".webm", ".mov", ".avi", ".ogg"].some(ext => lowerText.includes(ext));

        if (isImg) {
            const img = document.createElement('img');
            img.src = cleanText; 
            img.style.maxWidth = "100%";
            img.style.borderRadius = "10px";
            img.style.marginTop = "5px"; // Добавим отступ сверху
            img.onclick = () => { 
                document.getElementById('modal-img').src = cleanText; 
                document.getElementById('modal').style.display = 'flex'; 
            };
            div.appendChild(img);
        } else if (isVideo) {
            const v = document.createElement('video');
            v.src = cleanText;
            v.autoplay = true; v.loop = true; v.muted = true; v.playsInline = true;
            v.controls = true;
            v.style.maxWidth = "100%";
            v.style.borderRadius = "10px";
            v.onclick = () => v.muted = !v.muted;
            div.appendChild(v);
        } else {
            const s = document.createElement('span');
            s.textContent = text;
            div.appendChild(s);
        }


        const ts = document.createElement('span');
        ts.className = "msg-time";
        ts.textContent = time;
        div.appendChild(ts);
        div.oncontextmenu = (e) => {
            e.preventDefault();
            if (sender === myName && confirm("Удалить сообщение?")) ws.send(`__DELETE__:${msgId}`);
        };
    } // Закрывает else

    // --- ВОТ ЭТОГО НЕ ХВАТАЛО ---
    chat.appendChild(div); // Добавляем сообщение в чат
    setTimeout(() => { chat.scrollTop = chat.scrollHeight; }, 100); // Скролл вниз
}; // Закрывает ws.onmessage
} // Закрывает startChat


let iceQueue = []; 

// 1. Инициализация медиа и создание соединения
async function initRTCPeer(isCaller) {
    try {
        // Запрашиваем доступ к камере и микрофону
        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        document.getElementById('localVideo').srcObject = localStream;
        document.getElementById('video-call-overlay').style.display = 'block';

        // Конфигурация с TURN-сервером (для Android за NAT/4G)
        const configuration = {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { 
                    urls: 'turn:openrelay.metered.ca:443', 
                    username: 'openrelayproject', 
                    credential: 'openrelayproject' 
                }
            ]
        };

        pc = new RTCPeerConnection(configuration);

        // Настройка кодеков (VP8) — КЛЮЧЕВОЙ МОМЕНТ ДЛЯ ANDROID
        // Настройка кодеков специально для Android (Xiaomi/Samsung)
        localStream.getTracks().forEach(track => {
            const tc = pc.addTransceiver(track, { streams: [localStream] });
            if (track.kind === 'video') {
                const codecs = RTCRtpSender.getCapabilities('video').codecs;
                // VP8 — самый стабильный кодек для Android, H.264 часто дает черный экран
                const preferredCodecs = codecs.filter(c => 
                    c.mimeType === 'video/VP8' || 
                    c.mimeType === 'video/vp8'
                );
                if (preferredCodecs.length > 0) tc.setCodecPreferences(preferredCodecs);
            }
        });


        // Обработка входящего видео
        // Обработка входящего видео
                      pc.ontrack = (event) => {
            const remoteVid = document.getElementById('remoteVideo');
            console.log("Поток пришел. Xiaomi HyperOS Mode.");
        
            if (event.streams && event.streams[0]) {
                remoteVid.srcObject = event.streams[0];
            } else if (event.track) {
                remoteVid.srcObject = new MediaStream([event.track]);
            }
            remoteVid.muted = true;
        
            const forceRender = async () => {
                console.log("Xiaomi: Пробуем разморозить видео...");
                remoteVid.muted = false;
                
                try {
                    await new Promise(r => setTimeout(r, 150));
                    await remoteVid.play();
                    
                    remoteVid.style.transform = "scale(1.02) translateZ(0)";
                    remoteVid.style.filter = "contrast(1.1)";
                    remoteVid.style.width = "101vw";
                    
                    setTimeout(() => { 
                        remoteVid.style.transform = "scale(1.001) translateZ(0)";
                        remoteVid.style.filter = "contrast(1)";
                        remoteVid.style.width = "100vw";
                        console.log("Xiaomi: GPU принудительно перерисовал слой!");
                    }, 200);
                } catch (e) {
                    console.error("Xiaomi: Ошибка старта:", e);
                    const s = remoteVid.srcObject;
                    remoteVid.srcObject = null; 
                    setTimeout(() => { remoteVid.srcObject = s; }, 50);
                }
            };

            // Слушатели должны быть ЗДЕСЬ (снаружи forceRender)
            window.addEventListener('touchstart', forceRender, {once: true});
            window.addEventListener('click', forceRender, {once: true});
        }; // Конец ontrack


        pc.onicecandidate = e => {
            if (e.candidate) ws.send("RTC_SIGNAL:" + JSON.stringify({ candidate: e.candidate, from: myName }));
        };


        if (isCaller) {
            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            ws.send("RTC_SIGNAL:" + JSON.stringify({ offer: offer, from: myName }));
        }
    } catch (e) { 
        console.error(e);
        alert("Ошибка камеры: " + e.message); 
        endCall(); 
    }
}

// 2. Обработка входящих сигналов (Signaling)
async function handleSignalingData(data) {
    if (data.from === myName) return;

    // 1. Входящий звонок (Offer)
    if (data.offer) {
        // Если уже звоним или соединение стабильно — не прерываем
        if (pc && pc.signalingState !== "closed" && pc.signalingState !== "stable") return;

        // Используем setTimeout, чтобы браузер не блокировал confirm
        setTimeout(async () => {
            if (confirm(`Входящий звонок от ${data.from}. Принять?`)) {
                console.log("Принимаем входящий вызов от: " + data.from);
                
                await initRTCPeer(false); // Инициализация как получатель
                
                await pc.setRemoteDescription(new RTCSessionDescription(data.offer));
                const answer = await pc.createAnswer();
                await pc.setLocalDescription(answer);
                ws.send("RTC_SIGNAL:" + JSON.stringify({ answer: answer, from: myName }));
                
                // Разгружаем очередь кандидатов
                while (iceQueue.length > 0) {
                    try { await pc.addIceCandidate(iceQueue.shift()); } catch(e){}
                }
            }
        }, 100);
    } 
    
    // 2. Ответ на твой звонок (Answer)
    else if (data.answer && pc) {
        if (pc.signalingState === "have-local-offer") {
            try {
                await pc.setRemoteDescription(new RTCSessionDescription(data.answer));
                while (iceQueue.length > 0) {
                    try { await pc.addIceCandidate(iceQueue.shift()); } catch(e){}
                }
            } catch(e) { console.error("Ошибка установки Answer:", e); }
        }
    } 
    
    // 3. Сетевые пути (Candidates)
    else if (data.candidate) {
        const cand = new RTCIceCandidate(data.candidate);
        if (pc && pc.remoteDescription && pc.remoteDescription.type) {
            try { await pc.addIceCandidate(cand); } catch(e){}
        } else {
            iceQueue.push(cand);
        }
    }
}


// 3. Вспомогательные функции
function endCall() { 
    if(pc) pc.close(); 
    localStream?.getTracks().forEach(t => t.stop()); 
    document.getElementById('video-call-overlay').style.display = 'none'; 
    pc = null; 
}



function startCall() { initRTCPeer(true); }

function saveNameAndStart() {
    const n = document.getElementById("nameInput").value.trim();
    const r = prompt("ID комнаты:", "general") || "general";
    if (n) { localStorage.setItem("pinnogram_user", n); localStorage.setItem("pinnogram_room", r); startChat(n, r); }
}

function sendMessage() { 
    const i = document.getElementById("messageText"); 
    if(i.value.trim() && ws) { 
        // Получаем время: 14:30
        const now = new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
        
        // Отправляем сообщение в формате "TIME:14:30|Текст"
        ws.send(`TIME:${now}|${i.value}`); 
        i.value = ''; 
    } 
}


function handleTyping() { if(!isTypingNow && ws?.readyState===1){ isTypingNow=true; ws.send("__TYPING__"); setTimeout(()=>isTypingNow=false,3000); } }

function addEmoji(e) { const i = document.getElementById("messageText"); i.value += e; i.focus(); }

async function uploadFile() {
    const fileInput = document.getElementById('fileInput');
    // Добавь [0] вот сюда:
    let file = fileInput.files[0]; 
    if(!file) return;
    // ... остальной код без изменений
    if(file.type.startsWith('image/')) file = await compressImage(file);
    const fd = new FormData(); fd.append("file", file, file.name);
    const res = await fetch(`${API_URL}/upload`, {method:"POST", body:fd});
    const d = await res.json(); ws.send(d.url);
}

async function compressImage(file) {
    return new Promise((resolve) => {
        const reader = new FileReader(); reader.readAsDataURL(file);
        reader.onload = (e) => {
            const img = new Image(); img.src = e.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                const maxW = 800; const scale = maxW / img.width;
                canvas.width = maxW; canvas.height = img.height * scale;
                canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                canvas.toBlob((blob) => resolve(blob), 'image/jpeg', 0.7);
            };
        };
    });
}

async function toggleRecording() {
    const btn = document.getElementById("recordBtn");
    if (!mediaRecorder || mediaRecorder.state === "inactive") {
        const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        mediaRecorder = new MediaRecorder(stream); videoChunks = [];
        mediaRecorder.ondataavailable = e => videoChunks.push(e.data);
        mediaRecorder.onstop = async () => {
            const blob = new Blob(videoChunks, {type:'video/mp4'});
            const fd = new FormData(); fd.append("file", blob, `v_${Date.now()}.mp4`);
            const res = await fetch(`${API_URL}/upload`, {method:"POST", body:fd});
            const d = await res.json(); ws.send(d.url);
            stream.getTracks().forEach(t=>t.stop());
        };
        mediaRecorder.start(); btn.classList.add("recording"); btn.textContent="🛑";
    } else { mediaRecorder.stop(); btn.classList.remove("recording"); btn.textContent="🎥"; }
}
document.addEventListener("keypress", (e) => { if (e.key === "Enter") sendMessage(); });

</script>
</body>
</html>
