<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Pinnogram Ultimate</title>
    <style>
        :root { --bg: #121212; --panel: #1e1e1e; --text: white; --msg-in: #2a2a2a; --msg-out: #0088cc; }
        .light-theme { --bg: #f0f2f5; --panel: #ffffff; --text: #1c1e21; --msg-in: #e4e6eb; --msg-out: #0084ff; }
        
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; transition: 0.3s; }
        #login-screen { background: #1e1e1e; padding: 40px; border-radius: 20px; text-align: center; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        #chat-screen { display: none; flex-direction: column; width: 450px; position: relative; }
        #chat { height: 500px; border: 1px solid #333; overflow-y: auto; padding: 15px; background: var(--panel); border-radius: 15px; display: flex; flex-direction: column; gap: 8px; scroll-behavior: smooth; }
        
        .msg { padding: 8px 12px; border-radius: 15px; max-width: 80%; font-size: 14px; position: relative; display: flex; flex-direction: column; cursor: pointer; overflow-wrap: break-word; }
        .msg-left { align-self: flex-start; background: var(--msg-in); border-bottom-left-radius: 2px; }
        .msg-right { align-self: flex-end; background: var(--msg-out); color: white; border-bottom-right-radius: 2px; }
        .msg-time { font-size: 10px; opacity: 0.6; align-self: flex-end; margin-top: 4px; }
        
        .msg img { width: 100%; max-width: 250px; border-radius: 10px; margin-top: 5px; cursor: zoom-in; display: block; }
        
        /* ПЯТИУГОЛЬНИКИ */
        .msg video {
            width: 200px; height: 200px; background: black; object-fit: cover; margin-top: 5px;
            clip-path: polygon(50% 0%, 100% 38%, 82% 100%, 18% 100%, 0% 38%);
        }

        #typing-indicator { font-size: 12px; color: #00aaff; font-style: italic; height: 20px; margin: 5px 0 5px 10px; }
        .theme-btn { position: absolute; top: -40px; right: 0; cursor: pointer; background: #333; color: white; border: 1px solid #555; padding: 5px 10px; border-radius: 8px; font-size: 12px; }
        
        .emoji-bar { margin-bottom: 5px; display: flex; gap: 10px; font-size: 20px; user-select: none; }
        .emoji-bar span { cursor: pointer; transition: 0.2s; }
        .emoji-bar span:hover { transform: scale(1.3); }

        .controls { margin-top: 10px; display: flex; gap: 8px; width: 100%; align-items: center; }
        input[type="text"] { flex: 1; padding: 12px; border-radius: 10px; border: none; background: #222; color: white; outline: none; }
        button { padding: 10px 15px; border-radius: 10px; border: none; background: #0088cc; color: white; cursor: pointer; font-weight: bold; }
        .file-btn { background: #444; font-size: 18px; }
        
        .rec-btn { background: #ff4b2b; }
        .rec-btn.recording { animation: blink 1s infinite; }
        @keyframes blink { 0% {opacity: 1} 50% {opacity: 0.5} 100% {opacity: 1} }

        #modal { display: none; position: fixed; z-index: 9999; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); align-items: center; justify-content: center; cursor: zoom-out; }
        #modal img { max-width: 90%; max-height: 90%; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="modal" onclick="this.style.display='none'"><img id="modal-img"></div>
    <audio id="notifSound" src="https://assets.mixkit.co"></audio>

    <div id="login-screen">
        <h2>Pinnogram</h2>
        <input type="text" id="nameInput" placeholder="Ваше имя..." style="width: 250px;">
        <br><br>
        <button onclick="saveNameAndStart()">Войти</button>
    </div>

    <div id="chat-screen">
        <button class="theme-btn" onclick="document.body.classList.toggle('light-theme')">🌓 Тема</button>
        <div id="chat"></div>
        <div id="typing-indicator"></div>
        
        <div class="emoji-bar">
            <span onclick="addEmoji('😊')">😊</span><span onclick="addEmoji('🔥')">🔥</span>
            <span onclick="addEmoji('😂')">😂</span><span onclick="addEmoji('❤️')">❤️</span>
            <span onclick="addEmoji('👍')">👍</span>
        </div>

        <div class="controls">
            <input type="file" id="fileInput" style="display:none" onchange="uploadFile()">
            <button class="file-btn" onclick="document.getElementById('fileInput').click()">📎</button>
            <button id="recordBtn" class="file-btn rec-btn" onclick="toggleRecording()">🎥</button>
            <input type="text" id="messageText" placeholder="Сообщение..." oninput="handleTyping()">
            <button onclick="sendMessage()">🚀</button>
        </div>
        <button onclick="localStorage.clear(); location.reload();" style="margin-top:15px; background:none; color:#555; font-size:10px; text-decoration: underline; border:none; cursor:pointer;">Сменить аккаунт / Выйти</button>
    </div>

<script>
    // --- 1. CONFIG ---
    const API_URL = "https://c38f2478d07e20.lhr.life";
    const socketProto = API_URL.startsWith("https") ? "wss" : "ws";
    const socketBase = API_URL.replace(/^https?:\/\//, "");

    let ws, 
        myName = localStorage.getItem("pinnogram_user"), 
        myRoom = localStorage.getItem("pinnogram_room"),
        mediaRecorder, videoChunks = [], typingTimeout, isTypingNow = false;

    const notifSound = document.getElementById("notifSound");

    if (myName && myRoom) startChat(myName, myRoom);

    // --- 2. WEBSOCKET & CHAT ---
    function startChat(name, room) {
        myName = name; myRoom = room;
        document.getElementById("login-screen").style.display = "none";
        document.getElementById("chat-screen").style.display = "flex";
        
        // ПРАВИЛЬНОЕ МЕСТО ПОДКЛЮЧЕНИЯ:
        ws = new WebSocket(`${socketProto}://${socketBase}/ws/${room}/${encodeURIComponent(name)}`);

        ws.onmessage = (event) => {
            const raw = event.data;
            const chat = document.getElementById('chat');

            if (raw.startsWith("DELETE_CONFIRM:")) {
                const id = raw.split(":")[1];
                document.getElementById(`msg-${id}`)?.remove();
                return;
            }

            if (raw.startsWith("TYPING:")) {
                const user = raw.split(":")[1];
                document.getElementById("typing-indicator").textContent = `${user} печатает...`;
                clearTimeout(typingTimeout);
                typingTimeout = setTimeout(() => document.getElementById("typing-indicator").textContent = "", 2000);
                return;
            }

            const div = document.createElement('div');
            if (raw.startsWith("SYSTEM:")) {
                div.style.alignSelf = "center"; div.style.fontSize = "11px"; div.style.opacity = "0.5";
                div.textContent = raw.replace("SYSTEM: ", "");
            } else {
                const [idPart, content] = raw.split("|");
                const msgId = idPart.replace("ID:", "");
                const timeMatch = content.match(/\[(\d{2}:\d{2})\]/);
                const time = timeMatch ? timeMatch[1] : "--:--";
                const userAndText = content.replace(/^\[\d{2}:\d{2}\]\s*/, "");
                const [sender, ...textParts] = userAndText.split(": ");
                const text = textParts.join(": ");

                div.className = sender === myName ? 'msg msg-right' : 'msg msg-left';
                div.id = `msg-${msgId}`;
                if (sender !== myName) notifSound.play().catch(()=>{});

                const isImg = text.match(/\.(jpg|jpeg|png|gif|webp)$/i);
                const isVideo = text.match(/\.(mp4|webm|mov)$/i);

                if (isImg) {
                    const img = document.createElement('img'); img.src = text;
                    img.onclick = () => { document.getElementById('modal-img').src = text; document.getElementById('modal').style.display = 'flex'; };
                    div.appendChild(img);
                } else if (isVideo) {
                    const v = document.createElement('video'); v.src = text; v.autoplay = true; v.loop = true; v.muted = true; v.playsInline = true;
                    v.onclick = () => v.muted = !v.muted;
                    div.appendChild(v);
                } else {
                    const span = document.createElement('span'); span.textContent = text; div.appendChild(span);
                }
                
                const ts = document.createElement('span'); ts.className = "msg-time"; ts.textContent = time; div.appendChild(ts);

                div.oncontextmenu = (e) => {
                    e.preventDefault();
                    if (sender === myName && confirm("Удалить сообщение?")) ws.send(`__DELETE__:${msgId}`);
                };
            }
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        };
    }

    // --- 3. MEDIA ---
    async function uploadFile() {
        const fileInput = document.getElementById('fileInput');
        const file = fileInput.files[0];
        if (!file || !file.type.startsWith('image/')) return;
        const compressed = await compressImage(file);
        const formData = new FormData(); formData.append("file", compressed, file.name);
        const res = await fetch(`${API_URL}/upload`, { method: "POST", body: formData });
        const data = await res.json(); ws.send(data.url);
        fileInput.value = '';
    }

    async function compressImage(file) {
        return new Promise((resolve) => {
            const reader = new FileReader(); reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image(); img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const maxW = 800; const scale = maxW / img.width;
                    canvas.width = maxW; canvas.height = img.height * scale;
                    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                    canvas.toBlob((blob) => resolve(blob), 'image/jpeg', 0.7);
                };
            };
        });
    }

    async function toggleRecording() {
        const btn = document.getElementById("recordBtn");
        if (!mediaRecorder || mediaRecorder.state === "inactive") {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                mediaRecorder = new MediaRecorder(stream);
                videoChunks = [];
                mediaRecorder.ondataavailable = (e) => videoChunks.push(e.data);
                mediaRecorder.onstop = async () => {
                    const blob = new Blob(videoChunks, { type: 'video/mp4' });
                    const formData = new FormData(); formData.append("file", blob, `v_${Date.now()}.mp4`);
                    const res = await fetch(`${API_URL}/upload`, { method: "POST", body: formData });
                    const data = await res.json(); ws.send(data.url);
                    stream.getTracks().forEach(t => t.stop());
                };
                mediaRecorder.start(); btn.classList.add("recording"); btn.textContent = "🛑";
            } catch (err) { alert("Камера недоступна!"); }
        } else {
            mediaRecorder.stop(); btn.classList.remove("recording"); btn.textContent = "🎥";
        }
    }

    // --- 4. HELPERS ---
    function sendMessage() {
        const i = document.getElementById("messageText");
        if (i.value.trim() && ws) { ws.send(i.value); i.value = ''; }
    }

    function saveNameAndStart() {
        const n = document.getElementById("nameInput").value.trim();
        const r = prompt("ID комнаты:", "general") || "general";
        if (n && r) { 
            localStorage.setItem("pinnogram_user", n); 
            localStorage.setItem("pinnogram_room", r); 
            startChat(n, r); 
        }
    }

    function handleTyping() {
        if (!isTypingNow && ws?.readyState === 1) {
            isTypingNow = true; ws.send("__TYPING__");
            setTimeout(() => isTypingNow = false, 3000);
        }
    }

    function addEmoji(e) { const i = document.getElementById("messageText"); i.value += e; i.focus(); }
    document.addEventListener("keypress", (e) => { if (e.key === "Enter") sendMessage(); });
</script>
</body>
</html>
